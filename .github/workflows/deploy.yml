# Deploy Remotion + GUI + Gentle stack via Docker Compose
# Trigger: push to main, or manual workflow_dispatch
#
# Deploy runs only on: manual trigger, OR push when DEPLOY_ENABLED=true
# Required secrets (Settings > Secrets and variables > Actions):
#   DEPLOY_HOST     - SSH hostname or IP (e.g. 1.2.3.4 or myserver.com)
#   DEPLOY_USER     - SSH username (e.g. root, ubuntu)
#   DEPLOY_SSH_KEY  - Private SSH key for deployment
#   DEPLOY_PATH     - Path on server (e.g. /home/user/my-slides)
# Optional variable: DEPLOY_ENABLED=true to run deploy on push to main

name: Deploy Stack

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push app image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to remote
        if: github.event_name == 'workflow_dispatch' || vars.DEPLOY_ENABLED == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            git pull origin main || true
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
            export SLIDES_IMAGE=${{ env.REGISTRY }}/${{ github.repository }}:latest
            docker compose -f docker-compose.prod.yml pull app remotion
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
