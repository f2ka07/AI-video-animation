<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" role="img" aria-label="Five pillars of agentic architecture">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#faf8ff"/>
      <stop offset=".55" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f5f3ff"/>
    </linearGradient>
    <linearGradient id="pillarPurple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="pillarGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="pillarAmber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="pillarRed" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f87171"/>
      <stop offset="1" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="pillarCyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="coreBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#62c5ff"/>
      <stop offset="1" stop-color="#146eb4"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity=".12"/>
    </filter>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/>
    </marker>
    <style>
      .kicker{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:800;letter-spacing:.22em;fill:#7c3aed}
      .title{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:800;fill:#111827}
      .sub{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:500;fill:#6b7280}
      .panelTitle{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:20px;font-weight:800;fill:#334155}
      .panelSub{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:15px;font-weight:500;fill:#64748b}
      .mini{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:15px;font-weight:800;fill:#5b21b6}
      .nodeTextLight{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:15px;font-weight:800;fill:#ffffff}
      .nodeSubLight{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:12px;font-weight:600;fill:#f8fafc}
      .cardText{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:24px;font-weight:650;fill:#1e293b}
      .card{fill:#ffffff;stroke:#e9e5ff;stroke-width:1.2;filter:url(#shadow)}
      .hubLine{fill:none;stroke:#94a3b8;stroke-width:2.5;stroke-linecap:round;opacity:.85}
    </style>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <circle cx="1780" cy="120" r="220" fill="#8b5cf6" opacity=".05"/>
  <circle cx="120" cy="960" r="260" fill="#3b82f6" opacity=".05"/>
  <path d="M48 188 H1872" stroke="#e5e7eb" stroke-width="1"/>

  <text x="48" y="52" class="kicker" font-size="14">MODULE 01 - ARCHITECTURE</text>
  <text x="48" y="108" class="title" font-size="48">The Five Pillars of Agentic Architecture</text>
  <text x="48" y="152" class="sub" font-size="24">Planning, tools, memory, safety loops, and human oversight</text>

  <g id="diagram-panel">
    <rect x="72" y="220" width="640" height="780" rx="28" fill="#ffffff" stroke="#ede9fe" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="112" y="278" class="panelTitle">AGENT PIPELINE</text>
    <text x="112" y="308" class="panelSub">Five core components orchestrated in a loop</text>
    <circle cx="392" cy="560" r="72" fill="url(#coreBlue)" filter="url(#glow)"/>
    <text x="392" y="555" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#ffffff">LLM</text>
    <text x="392" y="578" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="600" fill="#ffffff">Reasoning core</text>
    <path class="hubLine" d="M392 488 L392 420" marker-end="url(#arrow)"/>
    <path class="hubLine" d="M328 560 L220 560" marker-end="url(#arrow)"/>
    <path class="hubLine" d="M456 560 L564 560" marker-end="url(#arrow)"/>
    <path class="hubLine" d="M348 620 L268 700" marker-end="url(#arrow)"/>
    <path class="hubLine" d="M436 620 L516 700" marker-end="url(#arrow)"/>
  </g>

  <g id="planner">
    <rect x="292" y="340" width="200" height="76" rx="18" fill="url(#pillarPurple)" filter="url(#shadow)"/>
    <text x="392" y="376" text-anchor="middle" class="nodeTextLight">Planning</text>
    <text x="392" y="398" text-anchor="middle" class="nodeSubLight">Goal decomposition</text>
  </g>

  <g id="tools">
    <rect x="108" y="522" width="200" height="76" rx="18" fill="url(#pillarGreen)" filter="url(#shadow)"/>
    <text x="208" y="558" text-anchor="middle" class="nodeTextLight">Tools</text>
    <text x="208" y="580" text-anchor="middle" class="nodeSubLight">APIs, code, search</text>
  </g>

  <g id="memory">
    <rect x="476" y="522" width="200" height="76" rx="18" fill="url(#pillarAmber)" filter="url(#shadow)"/>
    <text x="576" y="558" text-anchor="middle" class="nodeTextLight">Memory</text>
    <text x="576" y="580" text-anchor="middle" class="nodeSubLight">Short + long term</text>
  </g>

  <g id="environment">
    <rect x="148" y="704" width="200" height="76" rx="18" fill="url(#pillarRed)" filter="url(#shadow)"/>
    <text x="248" y="738" text-anchor="middle" class="nodeTextLight">Safety Loops</text>
    <text x="248" y="760" text-anchor="middle" class="nodeSubLight">Guardrails, policy</text>
  </g>

  <g id="evaluator">
    <rect x="436" y="704" width="200" height="76" rx="18" fill="url(#pillarCyan)" filter="url(#shadow)"/>
    <text x="536" y="734" text-anchor="middle" class="nodeTextLight">Human-in-the-Loop</text>
    <text x="536" y="758" text-anchor="middle" class="nodeSubLight">Escalation, oversight</text>
  </g>

  <rect x="744" y="220" width="2" height="780" fill="#e5e7eb"/>

  <g id="card-1">
    <rect class="card" x="792" y="280" width="1040" height="84" rx="20"/>
    <circle cx="836" cy="322" r="24" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/>
    <text x="836" y="330" text-anchor="middle" class="mini" font-size="18" fill="#5b21b6">1</text>
    <text x="884" y="330" class="cardText">First, planning - decompose goals into subtasks</text>
  </g>

  <g id="card-2">
    <rect class="card" x="792" y="384" width="1040" height="84" rx="20"/>
    <circle cx="836" cy="426" r="24" fill="#ecfdf5" stroke="#86efac" stroke-width="1.5"/>
    <text x="836" y="434" text-anchor="middle" class="mini" font-size="18" fill="#047857">2</text>
    <text x="884" y="434" class="cardText">Second, tools - APIs, code, and search engines</text>
  </g>

  <g id="card-3">
    <rect class="card" x="792" y="488" width="1040" height="84" rx="20"/>
    <circle cx="836" cy="530" r="24" fill="#fffbeb" stroke="#fcd34d" stroke-width="1.5"/>
    <text x="836" y="538" text-anchor="middle" class="mini" font-size="18" fill="#b45309">3</text>
    <text x="884" y="538" class="cardText">Third, memory - short-term and long-term retention</text>
  </g>

  <g id="card-4">
    <rect class="card" x="792" y="592" width="1040" height="84" rx="20"/>
    <circle cx="836" cy="634" r="24" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
    <text x="836" y="642" text-anchor="middle" class="mini" font-size="18" fill="#b91c1c">4</text>
    <text x="884" y="642" class="cardText">Fourth, safety loops - guardrails and policy checks</text>
  </g>

  <g id="card-5">
    <rect class="card" x="792" y="696" width="1040" height="96" rx="20" stroke="#a5f3fc" stroke-width="1.5"/>
    <circle cx="836" cy="744" r="24" fill="#ecfeff" stroke="#a5f3fc" stroke-width="1.5"/>
    <text x="836" y="752" text-anchor="middle" class="mini" font-size="18" fill="#0e7490">5</text>
    <text x="884" y="752" class="cardText">Fifth, human-in-the-loop - escalation and oversight</text>
  </g>

  <g opacity=".92">
    <rect x="1664" y="122" width="216" height="40" rx="20" fill="#111827"/>
    <circle cx="1690" cy="142" r="7" fill="#8b5cf6"/>
    <text x="1712" y="148" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="800" fill="#fff">pipeline mode</text>
  </g>
</svg>
