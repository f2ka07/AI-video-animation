<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" role="img" aria-label="Direct prompting vs agentic systems">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset=".58" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef5ff"/>
    </linearGradient>
    <linearGradient id="awsOrange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffb347"/>
      <stop offset="1" stop-color="#ff9900"/>
    </linearGradient>
    <linearGradient id="awsBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#62c5ff"/>
      <stop offset="1" stop-color="#146eb4"/>
    </linearGradient>
    <linearGradient id="dark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#26364f"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity=".12"/>
    </filter>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/>
    </marker>
    <style>
      .kicker{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:800;letter-spacing:.22em;fill:#5d89bd}
      .title{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:800;fill:#111827}
      .sub{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:500;fill:#6b7280}
      .panelTitle{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:20px;font-weight:800;fill:#334155}
      .panelSub{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:15px;font-weight:500;fill:#64748b}
      .mini{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:15px;font-weight:800;fill:#1e3a8a}
      .nodeTextLight{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:15px;font-weight:800;fill:#ffffff}
      .nodeTextDark{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:15px;font-weight:800;fill:#0f172a}
      .cardText{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:26px;font-weight:650;fill:#1e293b}
      .label{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:15px;font-weight:800;fill:#ffffff}
      .wire{fill:none;stroke:#ff9900;stroke-width:4;stroke-linecap:round;stroke-dasharray:9 13}
      .thin{fill:none;stroke:#146eb4;stroke-width:2.5;stroke-linecap:round;opacity:.4}
      .card{fill:#ffffff;stroke:#e5edf6;stroke-width:1.2;filter:url(#shadow)}
    </style>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <circle cx="1750" cy="140" r="240" fill="#146eb4" opacity=".05"/>
  <circle cx="140" cy="940" r="280" fill="#ff9900" opacity=".055"/>
  <path d="M48 188 H1872" stroke="#e5e7eb" stroke-width="1"/>

  <text x="48" y="52" class="kicker" font-size="14">AGENTIC AI FOR BEGINNERS</text>
  <text x="48" y="108" class="title" font-size="48">Direct Prompting vs Agentic Systems</text>
  <text x="48" y="152" class="sub" font-size="24">Understanding what we are leaving behind</text>

  <g id="architecture-panel">
    <rect x="72" y="220" width="640" height="780" rx="28" fill="#ffffff" stroke="#e6eef8" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="112" y="278" class="panelTitle">AGENTIC SYSTEM ARCHITECTURE</text>
    <text x="112" y="308" class="panelSub">Planner, memory, tools and verification loop</text>
    <path class="thin" d="M392 390 C300 390 220 455 220 540 C220 625 300 688 392 688 C483 688 564 625 564 540 C564 455 483 390 392 390Z"/>
    <g id="wire-loop">
      <path class="wire" d="M392 432 L228 510 L300 700 L484 700 L556 510 Z"/>
    </g>
  </g>

  <g id="prompt-in">
    <rect x="118" y="368" width="118" height="50" rx="25" fill="#f8fafc" stroke="#dbeafe" stroke-width="1.5"/>
    <text x="177" y="399" text-anchor="middle" class="nodeTextDark">Prompt in</text>
    <path d="M236 392 C268 392 282 408 304 426" fill="none" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  </g>

  <g id="agent-core">
    <path d="M392 348 L468 392 L468 478 L392 522 L316 478 L316 392 Z" fill="url(#dark)" filter="url(#shadow)"/>
    <circle cx="392" cy="435" r="42" fill="url(#awsBlue)" filter="url(#glow)"/>
    <path d="M376 435 h32 M392 419 v32 M370 412 l16 16 M414 412 l-16 16 M370 458 l16-16 M414 458 l-16-16" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
    <text x="392" y="548" text-anchor="middle" class="nodeTextLight">Agent Core</text>
  </g>

  <g id="planner">
    <rect x="98" y="458" width="140" height="82" rx="18" fill="url(#awsOrange)" filter="url(#shadow)"/>
    <path d="M138 502 h72 M142 486 h64 M148 518 h52" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
    <text x="168" y="564" text-anchor="middle" class="nodeTextLight">Planner</text>
  </g>

  <g id="tools">
    <rect x="446" y="458" width="140" height="82" rx="18" fill="url(#awsBlue)" filter="url(#shadow)"/>
    <circle cx="490" cy="499" r="14" fill="#fff" opacity=".92"/>
    <circle cx="542" cy="499" r="14" fill="#fff" opacity=".92"/>
    <path d="M504 499 H528" stroke="#fff" stroke-width="5"/>
    <text x="516" y="564" text-anchor="middle" class="nodeTextLight">Tools</text>
  </g>

  <g id="memory">
    <rect x="158" y="658" width="144" height="90" rx="18" fill="#1f2937" filter="url(#shadow)"/>
    <ellipse cx="230" cy="686" rx="40" ry="13" fill="#fff" opacity=".9"/>
    <path d="M190 686 v38 c0 9 18 16 40 16s40-7 40-16v-38" fill="none" stroke="#fff" stroke-width="5" opacity=".85"/>
    <text x="230" y="772" text-anchor="middle" class="nodeTextLight">Memory</text>
  </g>

  <g id="verifier">
    <rect x="382" y="658" width="144" height="90" rx="18" fill="#0f766e" filter="url(#shadow)"/>
    <path d="M454 676 l42 16 v28 c0 28-23 42-42 50-19-8-42-22-42-50v-28z" fill="#fff" opacity=".92"/>
    <path d="M438 718 l12 12 28-32" fill="none" stroke="#0f766e" stroke-width="6" stroke-linecap="round"/>
    <text x="454" y="772" text-anchor="middle" class="nodeTextLight">Verifier</text>
  </g>

  <rect x="744" y="220" width="2" height="780" fill="#e5e7eb"/>

  <g id="card-1">
    <rect class="card" x="792" y="300" width="1040" height="88" rx="20"/>
    <circle cx="836" cy="344" r="24" fill="#eef5ff" stroke="#dbeafe" stroke-width="1.5"/>
    <text x="836" y="352" text-anchor="middle" class="mini" font-size="18" fill="#1e40af">1</text>
    <text x="884" y="352" class="cardText">Single call inference. Input in, output out, interaction ends</text>
  </g>

  <g id="card-2">
    <rect class="card" x="792" y="408" width="1040" height="88" rx="20"/>
    <circle cx="836" cy="452" r="24" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
    <text x="836" y="460" text-anchor="middle" class="mini" font-size="18" fill="#9a3412">2</text>
    <text x="884" y="460" class="cardText">Single call systems have no memory between interactions</text>
  </g>

  <g id="card-3">
    <rect class="card" x="792" y="516" width="1040" height="88" rx="20"/>
    <circle cx="836" cy="560" r="24" fill="#eef5ff" stroke="#dbeafe" stroke-width="1.5"/>
    <text x="836" y="568" text-anchor="middle" class="mini" font-size="18" fill="#1e40af">3</text>
    <text x="884" y="568" class="cardText">They cannot plan across multiple steps or use external tools</text>
  </g>

  <g id="card-4">
    <rect class="card" x="792" y="624" width="1040" height="88" rx="20"/>
    <circle cx="836" cy="668" r="24" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
    <text x="836" y="676" text-anchor="middle" class="mini" font-size="18" fill="#9a3412">4</text>
    <text x="884" y="676" class="cardText">They cannot verify outputs or adapt based on feedback</text>
  </g>

  <g id="card-5">
    <rect class="card" x="792" y="732" width="1040" height="96" rx="20" stroke="#bbf7d0" stroke-width="1.5"/>
    <circle cx="836" cy="780" r="24" fill="#ecfdf5" stroke="#bbf7d0" stroke-width="1.5"/>
    <text x="836" y="788" text-anchor="middle" class="mini" font-size="18" fill="#047857">5</text>
    <text x="884" y="788" class="cardText">An agent is a system architecture that executes workflows</text>
  </g>

  <g id="workflow-badge" opacity=".92">
    <rect x="1676" y="122" width="196" height="40" rx="20" fill="#111827"/>
    <circle cx="1702" cy="142" r="7" fill="#ff9900"/>
    <text x="1724" y="148" class="label">workflow mode</text>
  </g>
</svg>
