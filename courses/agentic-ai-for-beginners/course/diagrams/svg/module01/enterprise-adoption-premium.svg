<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" role="img" aria-label="Enterprise adoption drivers">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0fdf9"/>
      <stop offset=".55" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eff6ff"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity=".1"/>
    </filter>
    <style>
      .kicker{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:800;letter-spacing:.22em;fill:#059669}
      .title{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:800;fill:#111827}
      .sub{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:500;fill:#6b7280}
      .pillarTitle{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:28px;font-weight:800;fill:#ffffff}
      .body{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:20px;font-weight:600;fill:#334155}
      .footer{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:700;fill:#1e293b}
    </style>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <circle cx="1700" cy="900" r="280" fill="#10b981" opacity=".05"/>
  <circle cx="200" cy="200" r="200" fill="#3b82f6" opacity=".05"/>
  <path d="M48 188 H1872" stroke="#e5e7eb" stroke-width="1"/>

  <text x="48" y="52" class="kicker" font-size="14">MODULE 01 - APPLICATION</text>
  <text x="48" y="108" class="title" font-size="48">Enterprise Adoption Drivers</text>
  <text x="48" y="152" class="sub" font-size="24">What pushes enterprises from pilots to production agentic systems</text>

  <g id="reliability">
    <rect x="80" y="260" width="560" height="620" rx="24" fill="#ffffff" stroke="#dbeafe" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="80" y="260" width="560" height="88" rx="24" fill="url(#blue)"/>
    <rect x="80" y="324" width="560" height="24" fill="url(#blue)"/>
    <text x="360" y="312" text-anchor="middle" class="pillarTitle">Reliability</text>
    <text x="120" y="400" class="body">Single-call systems are brittle</text>
    <text x="120" y="440" class="body">Checkpoints and retry logic</text>
    <text x="120" y="480" class="body">Verification at each step</text>
    <rect x="120" y="510" width="480" height="10" rx="5" fill="#e2e8f0"/>
    <rect x="120" y="510" width="400" height="10" rx="5" fill="#3b82f6"/>
    <rect x="120" y="540" width="480" height="10" rx="5" fill="#e2e8f0"/>
    <rect x="120" y="540" width="440" height="10" rx="5" fill="#3b82f6"/>
    <rect x="120" y="570" width="480" height="10" rx="5" fill="#e2e8f0"/>
    <rect x="120" y="570" width="420" height="10" rx="5" fill="#3b82f6"/>
    <text x="360" y="640" text-anchor="middle" class="body" font-weight="700" fill="#1e40af">Failure tolerance, not just accuracy</text>
  </g>

  <g id="traceability">
    <rect x="680" y="260" width="560" height="620" rx="24" fill="#ffffff" stroke="#bbf7d0" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="680" y="260" width="560" height="88" rx="24" fill="url(#green)"/>
    <rect x="680" y="324" width="560" height="24" fill="url(#green)"/>
    <text x="960" y="312" text-anchor="middle" class="pillarTitle">Traceability</text>
    <text x="720" y="400" class="body">Log every step and tool call</text>
    <text x="720" y="440" class="body">Audit memory access</text>
    <text x="720" y="480" class="body">Know what data was used</text>
    <rect x="720" y="510" width="480" height="10" rx="5" fill="#e2e8f0"/>
    <rect x="720" y="510" width="460" height="10" rx="5" fill="#10b981"/>
    <rect x="720" y="540" width="480" height="10" rx="5" fill="#e2e8f0"/>
    <rect x="720" y="540" width="430" height="10" rx="5" fill="#10b981"/>
    <rect x="720" y="570" width="480" height="10" rx="5" fill="#e2e8f0"/>
    <rect x="720" y="570" width="390" height="10" rx="5" fill="#10b981"/>
    <text x="960" y="640" text-anchor="middle" class="body" font-weight="700" fill="#047857">Non-negotiable for compliance</text>
  </g>

  <g id="integration">
    <rect x="1280" y="260" width="560" height="620" rx="24" fill="#ffffff" stroke="#ddd6fe" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="1280" y="260" width="560" height="88" rx="24" fill="url(#purple)"/>
    <rect x="1280" y="324" width="560" height="24" fill="url(#purple)"/>
    <text x="1560" y="312" text-anchor="middle" class="pillarTitle">Integration</text>
    <text x="1320" y="400" class="body">Connect to CRMs and ERPs</text>
    <text x="1320" y="440" class="body">Data warehouses and internal APIs</text>
    <text x="1320" y="480" class="body">External tools as first-class citizens</text>
    <rect x="1320" y="510" width="480" height="10" rx="5" fill="#e2e8f0"/>
    <rect x="1320" y="510" width="450" height="10" rx="5" fill="#8b5cf6"/>
    <rect x="1320" y="540" width="480" height="10" rx="5" fill="#e2e8f0"/>
    <rect x="1320" y="540" width="410" height="10" rx="5" fill="#8b5cf6"/>
    <rect x="1320" y="570" width="480" height="10" rx="5" fill="#e2e8f0"/>
    <rect x="1320" y="570" width="470" height="10" rx="5" fill="#8b5cf6"/>
    <text x="1560" y="640" text-anchor="middle" class="body" font-weight="700" fill="#5b21b6">Built for enterprise systems</text>
  </g>

  <text x="960" y="960" text-anchor="middle" class="footer">AI that executes workflows, manages processes, and operates</text>

  <g opacity=".92">
    <rect x="1676" y="122" width="196" height="40" rx="20" fill="#111827"/>
    <circle cx="1702" cy="142" r="7" fill="#10b981"/>
    <text x="1724" y="148" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="800" fill="#fff">production mode</text>
  </g>
</svg>
