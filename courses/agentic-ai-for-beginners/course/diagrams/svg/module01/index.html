<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Agentic AI Transition</title>
    <style>
      body {
        margin: 0;
        background: #020617;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        color: #e5e7eb;
      }

      .visual-wrapper {
        width: 960px;
        height: 540px;
        background: radial-gradient(circle at top left, #111827, #020617);
        border-radius: 24px;
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
        padding: 32px;
        box-sizing: border-box;
        position: relative;
        overflow: hidden;
      }

      .visual {
        width: 100%;
        height: 100%;
      }

      svg {
        width: 100%;
        height: 100%;
      }

      .part {
        transition:
          transform 0.4s ease,
          opacity 0.4s ease,
          filter 0.4s ease;
      }

      .link {
        transition:
          stroke 0.4s ease,
          stroke-dashoffset 0.4s linear;
      }

      /* Base idle */
      [data-phase="0"] .part {
        opacity: 0.9;
        filter: none;
      }

      /* Phase 1: chat era glowing */
      [data-phase="1"] .part-chat {
        transform: translateY(-4px);
        filter: drop-shadow(0 0 14px rgba(56, 189, 248, 0.9));
      }

      /* Phase 2: tools / APIs lighting and connections pulsing */
      @keyframes link-flow {
        from {
          stroke-dashoffset: 24;
        }
        to {
          stroke-dashoffset: 0;
        }
      }

      [data-phase="2"] .part-tools rect {
        transform: translateY(-2px);
        filter: drop-shadow(0 0 10px rgba(96, 165, 250, 0.9));
      }

      [data-phase="2"] .link-chat-tools {
        stroke: #38bdf8;
        stroke-dasharray: 4 4;
        animation: link-flow 0.6s linear infinite;
      }

      /* Phase 3: agent brain glowing + central pulse */
      @keyframes brain-pulse {
        0% {
          transform: scale(1);
          filter: drop-shadow(0 0 10px rgba(244, 114, 182, 0.9));
        }
        50% {
          transform: scale(1.05);
          filter: drop-shadow(0 0 18px rgba(244, 114, 182, 1));
        }
        100% {
          transform: scale(1);
          filter: drop-shadow(0 0 10px rgba(244, 114, 182, 0.9));
        }
      }

      [data-phase="3"] .part-agent {
        animation: brain-pulse 1.2s ease-in-out infinite;
      }

      [data-phase="3"] .link-tools-agent {
        stroke: #c4b5fd;
        stroke-dasharray: 4 4;
        animation: link-flow 0.6s linear infinite;
      }

      /* Phase 4: real-world effects glowing */
      [data-phase="4"] .part-actions rect {
        transform: translateY(-4px);
        filter: drop-shadow(0 0 16px rgba(34, 197, 94, 0.95));
      }

      [data-phase="4"] .link-agent-actions {
        stroke: #22c55e;
        stroke-dasharray: 4 4;
        animation: link-flow 0.5s linear infinite;
      }

      .phase-label {
        position: absolute;
        bottom: 12px;
        left: 20px;
        font-size: 11px;
        color: #9ca3af;
        pointer-events: none;
      }

      .controls {
        position: absolute;
        bottom: 12px;
        right: 20px;
        display: flex;
        gap: 8px;
        font-size: 11px;
      }

      .controls button {
        border-radius: 999px;
        border: 1px solid #4b5563;
        background: #020617;
        color: #e5e7eb;
        padding: 4px 10px;
        cursor: pointer;
      }

      .controls button:hover {
        border-color: #9ca3af;
      }
    </style>
  </head>

      <div class="phase-label">Phase: <span id="phase-value">0</span></div>
      <div class="controls">
        <button onclick="setPhase(0)">Idle</button>
        <button onclick="setPhase(1)">Chat</button>
        <button onclick="setPhase(2)">Tools</button>
        <button onclick="setPhase(3)">Agent</button>
        <button onclick="setPhase(4)">Actions</button>
      </div>
    </div>

    <script>
      function setPhase(n) {
        const root = document.getElementById("agentic-visual");
        root.dataset.phase = String(n);
        const label = document.getElementById("phase-value");
        if (label) label.textContent = String(n);
      }
