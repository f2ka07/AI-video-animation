<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" role="img" aria-label="Six core agent components">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset=".55" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f5f3ff"/>
    </linearGradient>
    <linearGradient id="p" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#a78bfa"/><stop offset="1" stop-color="#7c3aed"/></linearGradient>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#34d399"/><stop offset="1" stop-color="#059669"/></linearGradient>
    <linearGradient id="a" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fbbf24"/><stop offset="1" stop-color="#d97706"/></linearGradient>
    <linearGradient id="b" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#60a5fa"/><stop offset="1" stop-color="#2563eb"/></linearGradient>
    <linearGradient id="r" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f87171"/><stop offset="1" stop-color="#dc2626"/></linearGradient>
    <linearGradient id="c" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#22d3ee"/><stop offset="1" stop-color="#0891b2"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity=".1"/>
    </filter>
    <style>
      .kicker{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:800;letter-spacing:.22em;fill:#7c3aed}
      .title{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:800;fill:#111827}
      .sub{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:500;fill:#6b7280}
      .compTitle{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:16px;font-weight:800;fill:#ffffff}
      .compBody{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:13px;font-weight:600;fill:#334155}
      .cardText{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:24px;font-weight:650;fill:#1e293b}
      .card{fill:#ffffff;stroke:#e9e5ff;stroke-width:1.2;filter:url(#shadow)}
    </style>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <circle cx="1700" cy="900" r="240" fill="#8b5cf6" opacity=".05"/>
  <path d="M48 188 H1872" stroke="#e5e7eb" stroke-width="1"/>

  <text x="48" y="52" class="kicker" font-size="14">MODULE 02 - ARCHITECTURE</text>
  <text x="48" y="108" class="title" font-size="48">Six Core Agent Components</text>
  <text x="48" y="152" class="sub" font-size="24">The building blocks that make an agent more than a chatbot</text>

  <g id="components-panel">
    <rect x="72" y="220" width="640" height="780" rx="28" fill="#ffffff" stroke="#ede9fe" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="112" y="278" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="800" fill="#334155">AGENT ANATOMY</text>
    <text x="112" y="308" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="500" fill="#64748b">Six components - missing one makes the system incomplete</text>
  </g>

  <g id="planning">
    <rect x="100" y="340" width="188" height="200" rx="16" fill="#ffffff" stroke="#c4b5fd" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="100" y="340" width="188" height="44" rx="16" fill="url(#p)"/>
    <rect x="100" y="372" width="188" height="12" fill="url(#p)"/>
    <text x="194" y="368" text-anchor="middle" class="compTitle">Planning</text>
    <text x="120" y="410" class="compBody">Break goals into subtasks</text>
    <text x="120" y="434" class="compBody">Sequence logically</text>
    <text x="120" y="458" class="compBody">Adjust on failure</text>
  </g>

  <g id="tools">
    <rect x="308" y="340" width="188" height="200" rx="16" fill="#ffffff" stroke="#86efac" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="308" y="340" width="188" height="44" rx="16" fill="url(#g)"/>
    <rect x="308" y="372" width="188" height="12" fill="url(#g)"/>
    <text x="402" y="368" text-anchor="middle" class="compTitle">Tool Use</text>
    <text x="328" y="410" class="compBody">APIs and data access</text>
    <text x="328" y="434" class="compBody">Code interpreters</text>
    <text x="328" y="458" class="compBody">Enterprise connectors</text>
  </g>

  <g id="memory">
    <rect x="516" y="340" width="188" height="200" rx="16" fill="#ffffff" stroke="#fcd34d" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="516" y="340" width="188" height="44" rx="16" fill="url(#a)"/>
    <rect x="516" y="372" width="188" height="12" fill="url(#a)"/>
    <text x="610" y="368" text-anchor="middle" class="compTitle">Memory</text>
    <text x="536" y="410" class="compBody">Short-term working memory</text>
    <text x="536" y="434" class="compBody">Long-term persistence</text>
    <text x="536" y="458" class="compBody">Facts and preferences</text>
  </g>

  <g id="retrieval">
    <rect x="100" y="560" width="188" height="200" rx="16" fill="#ffffff" stroke="#93c5fd" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="100" y="560" width="188" height="44" rx="16" fill="url(#b)"/>
    <rect x="100" y="592" width="188" height="12" fill="url(#b)"/>
    <text x="194" y="588" text-anchor="middle" class="compTitle">Retrieval</text>
    <text x="120" y="630" class="compBody">Vector DB / search index</text>
    <text x="120" y="654" class="compBody">Ground in retrieved facts</text>
    <text x="120" y="678" class="compBody">Reduce hallucination</text>
  </g>

  <g id="safety">
    <rect x="308" y="560" width="188" height="200" rx="16" fill="#ffffff" stroke="#fca5a5" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="308" y="560" width="188" height="44" rx="16" fill="url(#r)"/>
    <rect x="308" y="592" width="188" height="12" fill="url(#r)"/>
    <text x="402" y="588" text-anchor="middle" class="compTitle">Safety</text>
    <text x="328" y="630" class="compBody">Content filters</text>
    <text x="328" y="654" class="compBody">Policy engines</text>
    <text x="328" y="678" class="compBody">Evaluation layers</text>
  </g>

  <g id="hitl">
    <rect x="516" y="560" width="188" height="200" rx="16" fill="#ffffff" stroke="#67e8f9" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="516" y="560" width="188" height="44" rx="16" fill="url(#c)"/>
    <rect x="516" y="592" width="188" height="12" fill="url(#c)"/>
    <text x="610" y="588" text-anchor="middle" class="compTitle">HITL</text>
    <text x="536" y="630" class="compBody">Escalation mechanisms</text>
    <text x="536" y="654" class="compBody">Pause and present state</text>
    <text x="536" y="678" class="compBody">Human oversight</text>
  </g>

  <rect x="744" y="220" width="2" height="780" fill="#e5e7eb"/>

  <g id="card-1">
    <rect class="card" x="792" y="240" width="1040" height="84" rx="20"/>
    <circle cx="836" cy="282" r="24" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/>
    <text x="836" y="290" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#5b21b6">1</text>
    <text x="884" y="290" class="cardText">Planning: decompose goals, sequence subtasks, adjust when things break</text>
  </g>
  <g id="card-2">
    <rect class="card" x="792" y="340" width="1040" height="84" rx="20"/>
    <circle cx="836" cy="382" r="24" fill="#ecfdf5" stroke="#86efac" stroke-width="1.5"/>
    <text x="836" y="390" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#047857">2</text>
    <text x="884" y="390" class="cardText">Tool use: APIs, code, search, CRMs - bridge reasoning to reality</text>
  </g>
  <g id="card-3">
    <rect class="card" x="792" y="440" width="1040" height="84" rx="20"/>
    <circle cx="836" cy="482" r="24" fill="#eef2ff" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="836" y="490" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#1d4ed8">3</text>
    <text x="884" y="490" class="cardText">Retrieval and grounding: vector search anchors responses in facts</text>
  </g>
  <g id="card-4">
    <rect class="card" x="792" y="540" width="1040" height="84" rx="20"/>
    <circle cx="836" cy="582" r="24" fill="#fffbeb" stroke="#fcd34d" stroke-width="1.5"/>
    <text x="836" y="590" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#b45309">4</text>
    <text x="884" y="590" class="cardText">Memory: working context plus long-term facts across sessions</text>
  </g>
  <g id="card-5">
    <rect class="card" x="792" y="640" width="1040" height="84" rx="20"/>
    <circle cx="836" cy="682" r="24" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
    <text x="836" y="690" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#b91c1c">5</text>
    <text x="884" y="690" class="cardText">Safety and policy: guardrails, filters, evaluation - core architecture</text>
  </g>
  <g id="card-6">
    <rect class="card" x="792" y="740" width="1040" height="96" rx="20" stroke="#a5f3fc" stroke-width="1.5"/>
    <circle cx="836" cy="788" r="24" fill="#ecfeff" stroke="#a5f3fc" stroke-width="1.5"/>
    <text x="836" y="796" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#0e7490">6</text>
    <text x="884" y="796" class="cardText">Human-in-the-loop: escalation, oversight without sacrificing autonomy</text>
  </g>

  <g opacity=".92">
    <rect x="1664" y="122" width="216" height="40" rx="20" fill="#111827"/>
    <circle cx="1690" cy="142" r="7" fill="#8b5cf6"/>
    <text x="1712" y="148" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="800" fill="#fff">anatomy mode</text>
  </g>
</svg>
