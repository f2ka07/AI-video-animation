<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" role="img" aria-label="Real workloads require agent loops">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0fdf9"/>
      <stop offset=".55" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eff6ff"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="slate" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#94a3b8"/>
      <stop offset="1" stop-color="#475569"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity=".1"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/>
    </marker>
    <style>
      .kicker{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:800;letter-spacing:.22em;fill:#059669}
      .title{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:800;fill:#111827}
      .sub{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:500;fill:#6b7280}
      .flowTitle{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:800;fill:#ffffff}
      .flowStep{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:15px;font-weight:600;fill:#334155}
      .flowStepLight{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:14px;font-weight:700;fill:#ffffff}
      .cardText{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:24px;font-weight:650;fill:#1e293b}
      .card{fill:#ffffff;stroke:#dbeafe;stroke-width:1.2;filter:url(#shadow)}
      .flowLine{fill:none;stroke:#94a3b8;stroke-width:2.5;stroke-linecap:round}
    </style>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <circle cx="200" cy="200" r="200" fill="#3b82f6" opacity=".05"/>
  <circle cx="1700" cy="900" r="260" fill="#10b981" opacity=".05"/>
  <path d="M48 188 H1872" stroke="#e5e7eb" stroke-width="1"/>

  <text x="48" y="52" class="kicker" font-size="14">MODULE 02 - APPLICATION</text>
  <text x="48" y="108" class="title" font-size="48">Real Workloads Need Loops</text>
  <text x="48" y="152" class="sub" font-size="24">Support and research workflows are multi-step, not single-call</text>

  <g id="workloads-panel">
    <rect x="72" y="220" width="640" height="780" rx="28" fill="#ffffff" stroke="#dbeafe" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="112" y="278" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="800" fill="#334155">WORKLOAD FLOWS</text>
    <text x="112" y="308" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="500" fill="#64748b">Enterprise processes require coordination and verification</text>
  </g>

  <g id="support-flow">
    <rect x="100" y="340" width="584" height="300" rx="20" fill="#f8fafc" stroke="#bfdbfe" stroke-width="1.5"/>
    <rect x="100" y="340" width="584" height="56" rx="20" fill="url(#blue)"/>
    <rect x="100" y="380" width="584" height="16" fill="url(#blue)"/>
    <text x="392" y="374" text-anchor="middle" class="flowTitle">Support Automation</text>
    <rect x="130" y="420" width="120" height="40" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="190" y="446" text-anchor="middle" class="flowStep">Ticket in</text>
    <path class="flowLine" d="M250 440 H280" marker-end="url(#arrow)"/>
    <rect x="280" y="420" width="120" height="40" rx="10" fill="url(#blue)"/>
    <text x="340" y="446" text-anchor="middle" class="flowStepLight">CRM lookup</text>
    <path class="flowLine" d="M400 440 H430" marker-end="url(#arrow)"/>
    <rect x="430" y="420" width="120" height="40" rx="10" fill="url(#blue)"/>
    <text x="490" y="446" text-anchor="middle" class="flowStepLight">KB search</text>
    <path class="flowLine" d="M550 440 H580" marker-end="url(#arrow)"/>
    <rect x="130" y="490" width="120" height="40" rx="10" fill="url(#blue)"/>
    <text x="190" y="516" text-anchor="middle" class="flowStepLight">Draft reply</text>
    <path class="flowLine" d="M250 510 H430" marker-end="url(#arrow)"/>
    <rect x="430" y="490" width="220" height="40" rx="10" fill="url(#green)"/>
    <text x="540" y="516" text-anchor="middle" class="flowStepLight">Route or resolve</text>
    <text x="392" y="580" text-anchor="middle" class="flowStep" font-weight="700" fill="#1e40af">Loop: tools + memory + optional HITL</text>
  </g>

  <g id="research-flow">
    <rect x="100" y="670" width="584" height="300" rx="20" fill="#f8fafc" stroke="#bbf7d0" stroke-width="1.5"/>
    <rect x="100" y="670" width="584" height="56" rx="20" fill="url(#green)"/>
    <rect x="100" y="710" width="584" height="16" fill="url(#green)"/>
    <text x="392" y="704" text-anchor="middle" class="flowTitle">Research Workflow</text>
    <rect x="130" y="750" width="130" height="40" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="195" y="776" text-anchor="middle" class="flowStep">Request</text>
    <path class="flowLine" d="M260 770 H290" marker-end="url(#arrow)"/>
    <rect x="290" y="750" width="150" height="40" rx="10" fill="url(#green)"/>
    <text x="365" y="776" text-anchor="middle" class="flowStepLight">Query sources</text>
    <path class="flowLine" d="M440 770 H470" marker-end="url(#arrow)"/>
    <rect x="470" y="750" width="150" height="40" rx="10" fill="url(#green)"/>
    <text x="545" y="776" text-anchor="middle" class="flowStepLight">Synthesize</text>
    <rect x="130" y="820" width="150" height="40" rx="10" fill="url(#green)"/>
    <text x="205" y="846" text-anchor="middle" class="flowStepLight">Check consistency</text>
    <path class="flowLine" d="M280 840 H430" marker-end="url(#arrow)"/>
    <rect x="430" y="820" width="220" height="40" rx="10" fill="url(#slate)"/>
    <text x="540" y="846" text-anchor="middle" class="flowStepLight">Flag conflicts for review</text>
    <text x="392" y="920" text-anchor="middle" class="flowStep" font-weight="700" fill="#047857">Loop: multi-step + grounding + safety</text>
  </g>

  <rect x="744" y="220" width="2" height="780" fill="#e5e7eb"/>

  <g id="card-1">
    <rect class="card" x="792" y="280" width="1040" height="84" rx="20"/>
    <circle cx="836" cy="322" r="24" fill="#eef5ff" stroke="#dbeafe" stroke-width="1.5"/>
    <text x="836" y="330" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#1e40af">1</text>
    <text x="884" y="330" class="cardText">Support: ticket in, CRM history, knowledge base, response, escalation</text>
  </g>
  <g id="card-2">
    <rect class="card" x="792" y="384" width="1040" height="84" rx="20"/>
    <circle cx="836" cy="426" r="24" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
    <text x="836" y="434" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#9a3412">2</text>
    <text x="884" y="434" class="cardText">That is not one call - it is a loop with tools, memory, and handoff</text>
  </g>
  <g id="card-3">
    <rect class="card" x="792" y="488" width="1040" height="84" rx="20"/>
    <circle cx="836" cy="530" r="24" fill="#ecfdf5" stroke="#bbf7d0" stroke-width="1.5"/>
    <text x="836" y="538" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#047857">3</text>
    <text x="884" y="538" class="cardText">Research: query sources, synthesize, verify consistency, flag conflicts</text>
  </g>
  <g id="card-4">
    <rect class="card" x="792" y="592" width="1040" height="84" rx="20"/>
    <circle cx="836" cy="634" r="24" fill="#eef5ff" stroke="#dbeafe" stroke-width="1.5"/>
    <text x="836" y="642" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#1e40af">4</text>
    <text x="884" y="642" class="cardText">Enterprises adopt agents because workloads are multi-step processes</text>
  </g>
  <g id="card-5">
    <rect class="card" x="792" y="696" width="1040" height="96" rx="20" stroke="#bbf7d0" stroke-width="1.5"/>
    <circle cx="836" cy="744" r="24" fill="#ecfdf5" stroke="#bbf7d0" stroke-width="1.5"/>
    <text x="836" y="752" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#047857">5</text>
    <text x="884" y="752" class="cardText">The shift from demos to workloads is the shift from single calls to loops</text>
  </g>

  <g opacity=".92">
    <rect x="1664" y="122" width="216" height="40" rx="20" fill="#111827"/>
    <circle cx="1690" cy="142" r="7" fill="#10b981"/>
    <text x="1712" y="148" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="800" fill="#fff">workload mode</text>
  </g>
</svg>
