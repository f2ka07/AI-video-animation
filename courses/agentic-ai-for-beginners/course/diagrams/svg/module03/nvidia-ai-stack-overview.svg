<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700">
  <g id="main">
    <rect width="1200" height="700" fill="#f8fafc"/>
    <text x="600" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="600" fill="#1e293b">NVIDIA AI Platform Stack</text>
    <text x="600" y="70" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#64748b">Five layers from hardware to application</text>
    <text x="120" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Your code</text>
    <text x="120" y="540" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Silicon</text>
    <line x1="130" y1="170" x2="130" y2="510" stroke="#cbd5e1" stroke-width="2"/>
    <polygon points="130,520 125,510 135,510" fill="#cbd5e1"/>
    <text x="600" y="630" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#475569">Unified platform: each layer designed to work with the others</text>
    <text x="600" y="660" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Reduce complexity, let engineers focus on applications</text>
  </g>
  <g id="section-1">
    <rect x="200" y="100" width="800" height="80" rx="10" fill="#8b5cf6" stroke="#7c3aed" stroke-width="2"/>
    <text x="600" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#ffffff">Layer 5: Application</text>
    <text x="600" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#e9d5ff">Your agentic system: planning, tools, memory, safety</text>
  </g>
  <g id="section-2">
    <rect x="200" y="200" width="800" height="80" rx="10" fill="#3b82f6" stroke="#2563eb" stroke-width="2"/>
    <text x="600" y="235" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#ffffff">Layer 4: Model + Runtime Surfaces</text>
    <text x="400" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#dbeafe">NeMo (training/customization)</text>
    <text x="800" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#dbeafe">NIM (deployment containers)</text>
  </g>
  <g id="section-3">
    <rect x="200" y="300" width="800" height="80" rx="10" fill="#06b6d4" stroke="#0891b2" stroke-width="2"/>
    <text x="600" y="335" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#ffffff">Layer 3: Inference Serving</text>
    <text x="600" y="360" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#cffafe">Triton Inference Server: batching, versioning, scheduling</text>
  </g>
  <g id="section-4">
    <rect x="200" y="400" width="800" height="80" rx="10" fill="#10b981" stroke="#059669" stroke-width="2"/>
    <text x="600" y="435" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#ffffff">Layer 2: Acceleration</text>
    <text x="400" y="460" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#d1fae5">CUDA / cuDNN / cuBLAS</text>
    <text x="800" y="460" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#d1fae5">TensorRT (optimization)</text>
    <rect x="200" y="500" width="800" height="80" rx="10" fill="#64748b" stroke="#475569" stroke-width="2"/>
    <text x="600" y="535" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#ffffff">Layer 1: Hardware</text>
    <text x="350" y="560" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#e2e8f0">H100 / Blackwell GPUs</text>
    <text x="600" y="560" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#e2e8f0">NVLink / InfiniBand</text>
    <text x="850" y="560" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#e2e8f0">HBM Memory</text>
  </g>
</svg>
