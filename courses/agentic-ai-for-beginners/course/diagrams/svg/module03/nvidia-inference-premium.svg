<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" role="img" aria-label="Inference pipeline for agentic AI">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eff6ff"/>
      <stop offset=".55" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f0fdf4"/>
    </linearGradient>
    <linearGradient id="nvGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#86efac"/>
      <stop offset="1" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity=".1"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/>
    </marker>
    <style>
      .kicker{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:800;letter-spacing:.22em;fill:#1d4ed8}
      .title{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:800;fill:#111827}
      .sub{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:500;fill:#6b7280}
      .nodeTitle{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:14px;font-weight:800;fill:#ffffff}
      .nodeSub{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:11px;font-weight:600;fill:#f8fafc}
      .flowLine{fill:none;stroke:#94a3b8;stroke-width:2.5;stroke-linecap:round}
      .card{fill:#ffffff;stroke:#dbeafe;stroke-width:1.2;filter:url(#shadow)}
      .agentTag{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:13px;font-weight:700;fill:#334155}
    </style>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <circle cx="200" cy="880" r="240" fill="#3b82f6" opacity=".05"/>
  <path d="M48 188 H1872" stroke="#e5e7eb" stroke-width="1"/>

  <text x="48" y="52" class="kicker" font-size="14">MODULE 03 - APPLICATION</text>
  <text x="48" y="108" class="title" font-size="48">Inference for Agentic Workloads</text>
  <text x="48" y="152" class="sub" font-size="24">TensorRT optimizes, Triton serves, NIM packages - self-hosted production path</text>

  <g id="pipeline-panel">
    <rect x="72" y="220" width="640" height="780" rx="28" fill="#ffffff" stroke="#dbeafe" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="112" y="278" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="800" fill="#334155">PRODUCTION INFERENCE PATH</text>
    <text x="112" y="308" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="500" fill="#64748b">Optimized model to deployed endpoint</text>
  </g>

  <g id="agent-loop">
    <rect x="100" y="340" width="584" height="88" rx="16" fill="#f8fafc" stroke="#c4b5fd" stroke-width="1.5"/>
    <text x="392" y="374" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="800" fill="#5b21b6">Agent workload</text>
    <text x="392" y="402" text-anchor="middle" class="agentTag">Multiple model calls per interaction - latency-sensitive loops</text>
  </g>

  <g id="tensorrt">
    <rect x="108" y="468" width="112" height="64" rx="14" fill="url(#nvGreen)" filter="url(#shadow)"/>
    <text x="164" y="496" text-anchor="middle" class="nodeTitle">TensorRT</text>
    <text x="164" y="516" text-anchor="middle" class="nodeSub">Optimize</text>
    <path class="flowLine" d="M220 500 H244" marker-end="url(#arrow)"/>
  </g>

  <g id="triton">
    <rect x="248" y="456" width="130" height="88" rx="14" fill="url(#blue)" filter="url(#shadow)"/>
    <text x="313" y="488" text-anchor="middle" class="nodeTitle">Triton</text>
    <text x="313" y="508" text-anchor="middle" class="nodeSub">Serve at scale</text>
    <text x="313" y="526" text-anchor="middle" class="nodeSub">Batch + schedule</text>
    <path class="flowLine" d="M378 500 H402" marker-end="url(#arrow)"/>
  </g>

  <g id="nim">
    <rect x="406" y="468" width="112" height="64" rx="14" fill="#8b5cf6" filter="url(#shadow)"/>
    <text x="462" y="496" text-anchor="middle" class="nodeTitle">NIM</text>
    <text x="462" y="516" text-anchor="middle" class="nodeSub">Deploy</text>
    <path class="flowLine" d="M518 500 H542" marker-end="url(#arrow)"/>
  </g>

  <g id="endpoint">
    <rect x="546" y="468" width="112" height="64" rx="14" fill="#1e293b" filter="url(#shadow)"/>
    <text x="602" y="496" text-anchor="middle" class="nodeTitle">Endpoint</text>
    <text x="602" y="516" text-anchor="middle" class="nodeSub">Prod API</text>
  </g>

  <g id="compare-api">
    <rect x="100" y="590" width="268" height="360" rx="16" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
    <text x="234" y="628" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="800" fill="#991b1b">Third-party API</text>
    <text x="124" y="668" class="agentTag">Their latency</text>
    <text x="124" y="698" class="agentTag">Their rate limits</text>
    <text x="124" y="728" class="agentTag">Their pricing</text>
    <text x="124" y="758" class="agentTag">Their availability</text>
    <text x="124" y="808" class="agentTag" fill="#b91c1c">Less control for enterprise</text>
  </g>

  <g id="compare-self">
    <rect x="388" y="590" width="268" height="360" rx="16" fill="#ecfdf5" stroke="#86efac" stroke-width="1.5"/>
    <text x="522" y="628" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="800" fill="#15803d">NVIDIA stack</text>
    <text x="412" y="668" class="agentTag">Your infrastructure</text>
    <text x="412" y="698" class="agentTag">Cost predictability</text>
    <text x="412" y="728" class="agentTag">Compliance control</text>
    <text x="412" y="758" class="agentTag">Supported upgrade path</text>
    <text x="412" y="808" class="agentTag" fill="#15803d">Built for agentic inference</text>
  </g>

  <rect x="744" y="220" width="2" height="780" fill="#e5e7eb"/>

  <g id="card-1">
    <rect class="card" x="792" y="280" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="328" r="24" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/>
    <text x="836" y="336" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#5b21b6">1</text>
    <foreignObject x="884" y="296" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Agents are latency-sensitive, compute-intensive, and operationally complex</div>
    </foreignObject>
  </g>
  <g id="card-2">
    <rect class="card" x="792" y="392" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="440" r="24" fill="#ecfdf5" stroke="#86efac" stroke-width="1.5"/>
    <text x="836" y="448" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#15803d">2</text>
    <foreignObject x="884" y="408" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">TensorRT optimizes the model; Triton handles serving at scale</div>
    </foreignObject>
  </g>
  <g id="card-3">
    <rect class="card" x="792" y="504" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="552" r="24" fill="#eef2ff" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="836" y="560" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#1d4ed8">3</text>
    <foreignObject x="884" y="520" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">NIM packages everything: pull, run, and get a production-ready inference endpoint</div>
    </foreignObject>
  </g>
  <g id="card-4">
    <rect class="card" x="792" y="616" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="664" r="24" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
    <text x="836" y="672" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#9a3412">4</text>
    <foreignObject x="884" y="632" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Self-hosted stack vs third-party APIs: control, compliance, and cost predictability</div>
    </foreignObject>
  </g>
  <g id="card-5">
    <rect class="card" x="792" y="728" width="1040" height="96" rx="20" stroke="#86efac" stroke-width="1.5"/>
    <circle cx="836" cy="776" r="24" fill="#ecfdf5" stroke="#86efac" stroke-width="1.5"/>
    <text x="836" y="784" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#15803d">5</text>
    <foreignObject x="884" y="744" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">For many enterprises, a supported platform beats fragile open-source chains</div>
    </foreignObject>
  </g>

  <g opacity=".92">
    <rect x="1644" y="122" width="236" height="40" rx="20" fill="#111827"/>
    <circle cx="1670" cy="142" r="7" fill="#3b82f6"/>
    <text x="1692" y="148" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="800" fill="#fff">inference mode</text>
  </g>
</svg>
