<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" role="img" aria-label="Enterprise workload examples and pipeline constraints">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ecfeff"/>
      <stop offset=".55" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eff6ff"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity=".1"/>
    </filter>
    <style>
      .kicker{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:800;letter-spacing:.22em;fill:#0369a1}
      .title{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:800;fill:#111827}
      .sub{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:500;fill:#6b7280}
      .boxTitle{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:17px;font-weight:800;fill:#ffffff}
      .boxBody{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:13px;font-weight:600;fill:#f0f9ff}
      .constraintLabel{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:14px;font-weight:700;fill:#334155}
      .card{fill:#ffffff;stroke:#bae6fd;stroke-width:1.2;filter:url(#shadow)}
    </style>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <circle cx="200" cy="880" r="240" fill="#0891b2" opacity=".05"/>
  <path d="M48 188 H1872" stroke="#e5e7eb" stroke-width="1"/>

  <text x="48" y="52" class="kicker" font-size="14">MODULE 04 - APPLICATION</text>
  <text x="48" y="108" class="title" font-size="48">Enterprise Workload Matrix</text>
  <text x="48" y="152" class="sub" font-size="24">Real enterprise patterns and the latency-accuracy-cost tradeoffs that shape them</text>

  <g id="workloads-panel">
    <rect x="72" y="220" width="640" height="780" rx="28" fill="#ffffff" stroke="#bae6fd" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="112" y="278" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="800" fill="#334155">ENTERPRISE WORKLOADS</text>
    <text x="112" y="308" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="500" fill="#64748b">Pipeline-driven, not single-call</text>
  </g>

  <g id="workload-knowledge">
    <rect x="108" y="340" width="268" height="130" rx="16" fill="url(#blue)" filter="url(#shadow)"/>
    <text x="242" y="378" text-anchor="middle" class="boxTitle">Knowledge</text>
    <text x="242" y="404" text-anchor="middle" class="boxBody">Policy Q&amp;A</text>
    <text x="242" y="426" text-anchor="middle" class="boxBody">Retrieve + ground + answer</text>
    <text x="242" y="448" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="600" fill="#dbeafe">1000s of queries/day</text>
  </g>
  <g id="workload-support">
    <rect x="408" y="340" width="268" height="130" rx="16" fill="#0891b2" filter="url(#shadow)"/>
    <text x="542" y="378" text-anchor="middle" class="boxTitle">Support</text>
    <text x="542" y="404" text-anchor="middle" class="boxBody">Customer tickets</text>
    <text x="542" y="426" text-anchor="middle" class="boxBody">CRM + tools + HITL routing</text>
    <text x="542" y="448" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="600" fill="#cffafe">Latency-sensitive</text>
  </g>
  <g id="workload-research">
    <rect x="108" y="490" width="268" height="130" rx="16" fill="#0ea5e9" filter="url(#shadow)"/>
    <text x="242" y="528" text-anchor="middle" class="boxTitle">Research</text>
    <text x="242" y="554" text-anchor="middle" class="boxBody">Market analytics</text>
    <text x="242" y="576" text-anchor="middle" class="boxBody">Multi-source synthesis</text>
    <text x="242" y="598" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="600" fill="#e0f2fe">Accuracy over speed</text>
  </g>
  <g id="workload-document">
    <rect x="408" y="490" width="268" height="130" rx="16" fill="#0f766e" filter="url(#shadow)"/>
    <text x="542" y="528" text-anchor="middle" class="boxTitle">Document</text>
    <text x="542" y="554" text-anchor="middle" class="boxBody">Contract review</text>
    <text x="542" y="576" text-anchor="middle" class="boxBody">Clauses + memory + audit</text>
    <text x="542" y="598" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="600" fill="#ccfbf1">Traceability critical</text>
  </g>

  <g id="constraints-triangle">
    <rect x="100" y="660" width="584" height="300" rx="16" fill="#f8fafc" stroke="#bae6fd" stroke-width="1.5"/>
    <text x="392" y="698" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="800" fill="#0369a1">PIPELINE CONSTRAINTS</text>
    <text x="392" y="724" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="500" fill="#64748b">Rarely optimize all three at once</text>
    <polygon points="392,760 300,880 484,880" fill="none" stroke="#0891b2" stroke-width="2.5"/>
    <text x="392" y="778" text-anchor="middle" class="constraintLabel" fill="#0e7490">Latency</text>
    <text x="278" y="900" text-anchor="middle" class="constraintLabel">Accuracy</text>
    <text x="506" y="900" text-anchor="middle" class="constraintLabel">Cost</text>
    <text x="392" y="930" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="600" fill="#475569">Batching, caching, model selection, hardware allocation</text>
  </g>

  <rect x="744" y="220" width="2" height="780" fill="#e5e7eb"/>

  <g id="card-1">
    <rect class="card" x="792" y="280" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="328" r="24" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="836" y="336" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#1d4ed8">1</text>
    <foreignObject x="884" y="296" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Real enterprise patterns: knowledge, support, research, and document workflows</div>
    </foreignObject>
  </g>
  <g id="card-2">
    <rect class="card" x="792" y="392" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="440" r="24" fill="#ecfeff" stroke="#67e8f9" stroke-width="1.5"/>
    <text x="836" y="448" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#0e7490">2</text>
    <foreignObject x="884" y="408" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Knowledge: retrieve policy docs, ground the model, handle thousands of queries per day</div>
    </foreignObject>
  </g>
  <g id="card-3">
    <rect class="card" x="792" y="504" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="552" r="24" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="836" y="560" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#1d4ed8">3</text>
    <foreignObject x="884" y="520" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Support: CRM history, tool execution, policy checks, route complex cases to humans</div>
    </foreignObject>
  </g>
  <g id="card-4">
    <rect class="card" x="792" y="616" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="664" r="24" fill="#ecfeff" stroke="#67e8f9" stroke-width="1.5"/>
    <text x="836" y="672" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#0e7490">4</text>
    <foreignObject x="884" y="632" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Research and documents: multi-source queries, consistency checks, contract review with memory</div>
    </foreignObject>
  </g>
  <g id="card-5">
    <rect class="card" x="792" y="728" width="1040" height="96" rx="20" stroke="#67e8f9" stroke-width="1.5"/>
    <circle cx="836" cy="776" r="24" fill="#ecfeff" stroke="#67e8f9" stroke-width="1.5"/>
    <text x="836" y="784" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#0e7490">5</text>
    <foreignObject x="884" y="744" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Every pipeline faces latency-accuracy-cost tradeoffs - rarely optimize all three</div>
    </foreignObject>
  </g>

  <g opacity=".92">
    <rect x="1664" y="122" width="216" height="40" rx="20" fill="#111827"/>
    <circle cx="1690" cy="142" r="7" fill="#0891b2"/>
    <text x="1712" y="148" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="800" fill="#fff">workload mode</text>
  </g>
</svg>
