<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" role="img" aria-label="Business drivers for deployment decisions">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7ed"/>
      <stop offset=".55" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fdba74"/>
      <stop offset="1" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="slate" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#64748b"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity=".1"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/>
    </marker>
    <style>
      .kicker{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:800;letter-spacing:.22em;fill:#c2410c}
      .title{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:800;fill:#111827}
      .sub{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:500;fill:#6b7280}
      .panelTitle{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:20px;font-weight:800;fill:#334155}
      .panelSub{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:15px;font-weight:500;fill:#64748b}
      .driverLabel{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:14px;font-weight:800;fill:#ffffff}
      .driverSub{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:12px;font-weight:600;fill:#f8fafc}
      .targetLabel{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:15px;font-weight:800;fill:#0f172a}
      .targetSub{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:12px;font-weight:600;fill:#64748b}
      .card{fill:#ffffff;stroke:#fed7aa;stroke-width:1.2;filter:url(#shadow)}
      .arrowLine{fill:none;stroke:#94a3b8;stroke-width:2.5;stroke-linecap:round}
    </style>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <circle cx="1700" cy="900" r="240" fill="#f97316" opacity=".05"/>
  <path d="M48 188 H1872" stroke="#e5e7eb" stroke-width="1"/>

  <text x="48" y="52" class="kicker" font-size="14">MODULE 05 - APPLICATION</text>
  <text x="48" y="108" class="title" font-size="48">Business Drivers for Deployment</text>
  <text x="48" y="152" class="sub" font-size="24">Matching deployment choice to velocity, flexibility, compliance, and latency needs</text>

  <g id="drivers-panel">
    <rect x="72" y="220" width="640" height="780" rx="28" fill="#ffffff" stroke="#fed7aa" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="112" y="278" class="panelTitle">BUSINESS DRIVERS</text>
    <text x="112" y="308" class="panelSub">What pushes teams toward each deployment model</text>
  </g>

  <g id="driver-hub">
    <text x="392" y="360" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="700" fill="#94a3b8">Driver</text>
    <text x="560" y="360" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="700" fill="#94a3b8">Deployment</text>
  </g>

  <g id="driver-velocity">
    <rect x="100" y="380" width="180" height="64" rx="14" fill="url(#orange)" filter="url(#shadow)"/>
    <text x="190" y="410" text-anchor="middle" class="driverLabel">Velocity</text>
    <text x="190" y="430" text-anchor="middle" class="driverSub">Speed to prototype</text>
    <path class="arrowLine" d="M280 412 H340" marker-end="url(#arrow)"/>
    <rect x="340" y="380" width="344" height="64" rx="14" fill="#ffedd5" stroke="#fdba74" stroke-width="1.5"/>
    <text x="512" y="410" text-anchor="middle" class="targetLabel" fill="#9a3412">SaaS</text>
    <text x="512" y="430" text-anchor="middle" class="targetSub">Working prototype in days</text>
  </g>

  <g id="driver-flexibility">
    <rect x="100" y="500" width="180" height="64" rx="14" fill="#64748b" filter="url(#shadow)"/>
    <text x="190" y="530" text-anchor="middle" class="driverLabel">Flexibility</text>
    <text x="190" y="550" text-anchor="middle" class="driverSub">Custom models, scale</text>
    <path class="arrowLine" d="M280 532 H340" marker-end="url(#arrow)"/>
    <rect x="340" y="500" width="344" height="64" rx="14" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="512" y="530" text-anchor="middle" class="targetLabel">Cloud GPU</text>
    <text x="512" y="550" text-anchor="middle" class="targetSub">Scale peaks, variable workloads</text>
  </g>

  <g id="driver-compliance">
    <rect x="100" y="620" width="180" height="64" rx="14" fill="url(#slate)" filter="url(#shadow)"/>
    <text x="190" y="650" text-anchor="middle" class="driverLabel">Compliance</text>
    <text x="190" y="670" text-anchor="middle" class="driverSub">Data sovereignty</text>
    <path class="arrowLine" d="M280 652 H340" marker-end="url(#arrow)"/>
    <rect x="340" y="620" width="344" height="64" rx="14" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="512" y="650" text-anchor="middle" class="targetLabel">On-Premises</text>
    <text x="512" y="670" text-anchor="middle" class="targetSub">Compute stays with the data</text>
  </g>

  <g id="driver-latency">
    <rect x="100" y="740" width="180" height="64" rx="14" fill="#f59e0b" filter="url(#shadow)"/>
    <text x="190" y="770" text-anchor="middle" class="driverLabel">Latency</text>
    <text x="190" y="790" text-anchor="middle" class="driverSub">Autonomy, edge ops</text>
    <path class="arrowLine" d="M280 772 H340" marker-end="url(#arrow)"/>
    <rect x="340" y="740" width="344" height="64" rx="14" fill="#fef3c7" stroke="#fcd34d" stroke-width="1.5"/>
    <text x="512" y="770" text-anchor="middle" class="targetLabel" fill="#78350f">Edge</text>
    <text x="512" y="790" text-anchor="middle" class="targetSub">Robots, vehicles, remote sites</text>
  </g>

  <g id="blockers-note">
    <rect x="100" y="860" width="584" height="100" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="392" y="896" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="800" fill="#475569">Enterprise blockers</text>
    <text x="392" y="922" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="600" fill="#64748b">Procurement friction, compliance limits, safety guardrails, integration debt</text>
    <text x="392" y="944" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="600" fill="#64748b">For leaders: deployment is risk, cost, and organizational readiness</text>
  </g>

  <rect x="744" y="220" width="2" height="780" fill="#e5e7eb"/>

  <g id="card-1">
    <rect class="card" x="792" y="280" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="328" r="24" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
    <text x="836" y="336" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#c2410c">1</text>
    <foreignObject x="884" y="296" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Connect deployment and integration to business drivers - not just infrastructure, but organizational constraints</div>
    </foreignObject>
  </g>
  <g id="card-2">
    <rect class="card" x="792" y="392" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="440" r="24" fill="#ffedd5" stroke="#fdba74" stroke-width="1.5"/>
    <text x="836" y="448" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#9a3412">2</text>
    <foreignObject x="884" y="408" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">SaaS for velocity: startups choose it for speed, accepting vendor lock-in for early exploration</div>
    </foreignObject>
  </g>
  <g id="card-3">
    <rect class="card" x="792" y="504" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="552" r="24" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="836" y="560" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#475569">3</text>
    <foreignObject x="884" y="520" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Cloud for flexibility: custom models and optimizations without capital expense of owned hardware</div>
    </foreignObject>
  </g>
  <g id="card-4">
    <rect class="card" x="792" y="616" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="664" r="24" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="836" y="672" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#334155">4</text>
    <foreignObject x="884" y="632" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">On-prem for compliance and sovereignty: when data cannot leave the organization, bring compute to the data</div>
    </foreignObject>
  </g>
  <g id="card-5">
    <rect class="card" x="792" y="728" width="1040" height="96" rx="20" stroke="#fdba74" stroke-width="1.5"/>
    <circle cx="836" cy="776" r="24" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
    <text x="836" y="784" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#c2410c">5</text>
    <foreignObject x="884" y="744" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Edge for latency and autonomy - plus enterprise blockers like procurement, compliance, and integration debt</div>
    </foreignObject>
  </g>

  <g opacity=".92">
    <rect x="1664" y="122" width="216" height="40" rx="20" fill="#111827"/>
    <circle cx="1690" cy="142" r="7" fill="#f97316"/>
    <text x="1712" y="148" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="800" fill="#fff">drivers mode</text>
  </g>
</svg>
