<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" role="img" aria-label="Enterprise adoption curve from pilot to platform">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0fdf9"/>
      <stop offset=".55" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eff6ff"/>
    </linearGradient>
    <linearGradient id="emerald" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity=".1"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/>
    </marker>
    <style>
      .kicker{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:800;letter-spacing:.22em;fill:#059669}
      .title{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:800;fill:#111827}
      .sub{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:500;fill:#6b7280}
      .panelTitle{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:20px;font-weight:800;fill:#334155}
      .panelSub{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:15px;font-weight:500;fill:#64748b}
      .stageTitle{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:14px;font-weight:800;fill:#ffffff}
      .stageBody{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:11px;font-weight:600;fill:#334155}
      .stageBodyLight{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:11px;font-weight:600;fill:#ede9fe}
      .axisLabel{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:12px;font-weight:600;fill:#64748b}
      .card{fill:#ffffff;stroke:#bbf7d0;stroke-width:1.2;filter:url(#shadow)}
    </style>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <circle cx="1700" cy="900" r="260" fill="#10b981" opacity=".05"/>
  <circle cx="200" cy="200" r="200" fill="#3b82f6" opacity=".05"/>
  <path d="M48 188 H1872" stroke="#e5e7eb" stroke-width="1"/>

  <text x="48" y="52" class="kicker" font-size="14">MODULE 06 - APPLICATION</text>
  <text x="48" y="108" class="title" font-size="48">Enterprise Adoption Curve</text>
  <text x="48" y="152" class="sub" font-size="24">From pilot to platform standardization - and the blockers that slow adoption</text>

  <g id="adoption-axis">
    <rect x="72" y="220" width="640" height="780" rx="28" fill="#ffffff" stroke="#bbf7d0" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="112" y="278" class="panelTitle">ADOPTION STAGES</text>
    <text x="112" y="308" class="panelSub">The path from pilot to platform</text>
    <line x1="120" y1="860" x2="660" y2="860" stroke="#cbd5e1" stroke-width="3"/>
    <polygon points="660,860 650,855 650,865" fill="#cbd5e1"/>
    <text x="120" y="890" class="axisLabel">Time / Investment</text>
    <text x="660" y="890" text-anchor="end" class="axisLabel">Maturity</text>
    <line x1="248" y1="900" x2="248" y2="872" stroke="#64748b" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="248" y="918" text-anchor="middle" class="axisLabel">Most enterprises here</text>
  </g>

  <g id="stage-pilot">
    <rect x="120" y="680" width="118" height="120" rx="12" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)"/>
    <text x="179" y="712" text-anchor="middle" class="stageBody" font-weight="800" fill="#0f172a">1. Pilot</text>
    <text x="132" y="736" class="stageBody">Proof of concept</text>
    <text x="132" y="754" class="stageBody">Single use case</text>
    <text x="132" y="772" class="stageBody">Small team</text>
    <circle cx="179" cy="860" r="8" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="2"/>
    <path fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)" d="M238 740 H268"/>
  </g>

  <g id="stage-integration">
    <rect x="278" y="640" width="118" height="160" rx="12" fill="#dbeafe" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
    <text x="337" y="672" text-anchor="middle" class="stageBody" font-weight="800" fill="#1e3a8a">2. Integration</text>
    <text x="290" y="696" class="stageBody">Production data</text>
    <text x="290" y="714" class="stageBody">Security reviews</text>
    <text x="290" y="732" class="stageBody">Compliance</text>
    <text x="290" y="758" class="stageBody" font-weight="700" fill="#1e40af">Most friction here</text>
    <circle cx="337" cy="860" r="8" fill="#2563eb"/>
    <path fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)" d="M396 720 H426"/>
  </g>

  <g id="stage-scale">
    <rect x="436" y="590" width="118" height="210" rx="12" fill="#d1fae5" stroke="#059669" stroke-width="2" filter="url(#shadow)"/>
    <text x="495" y="622" text-anchor="middle" class="stageBody" font-weight="800" fill="#047857">3. Scale Out</text>
    <text x="448" y="646" class="stageBody">More users</text>
    <text x="448" y="664" class="stageBody">More use cases</text>
    <text x="448" y="682" class="stageBody">Higher volume</text>
    <text x="448" y="708" class="stageBody">Monitoring, SLAs</text>
    <text x="448" y="726" class="stageBody">Support processes</text>
    <circle cx="495" cy="860" r="8" fill="#10b981"/>
    <path fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)" d="M554 680 H584"/>
  </g>

  <g id="stage-platform">
    <rect x="594" y="520" width="118" height="280" rx="12" fill="#8b5cf6" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)"/>
    <text x="653" y="552" text-anchor="middle" class="stageTitle">4. Platform</text>
    <text x="606" y="576" class="stageBodyLight">Shared infrastructure</text>
    <text x="606" y="594" class="stageBodyLight">Reusable components</text>
    <text x="606" y="612" class="stageBodyLight">Governance frameworks</text>
    <text x="606" y="644" class="stageBodyLight">AI is how the org</text>
    <text x="606" y="662" class="stageBodyLight">operates</text>
    <text x="606" y="688" class="stageBodyLight" font-size="10">(Rare but destination)</text>
    <circle cx="653" cy="860" r="8" fill="#8b5cf6"/>
  </g>

  <rect x="744" y="220" width="2" height="780" fill="#e5e7eb"/>

  <g id="card-1">
    <rect class="card" x="792" y="280" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="328" r="24" fill="#ecfdf5" stroke="#86efac" stroke-width="1.5"/>
    <text x="836" y="336" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#15803d">1</text>
    <foreignObject x="884" y="296" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Understanding use cases is necessary - adoption also happens in stages from pilot to platform</div>
    </foreignObject>
  </g>

  <g id="card-2">
    <rect class="card" x="792" y="392" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="440" r="24" fill="#eef5ff" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="836" y="448" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#1d4ed8">2</text>
    <foreignObject x="884" y="408" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Pilot: limited proof-of-concept to validate feasibility - time-boxed, many never progress further</div>
    </foreignObject>
  </g>

  <g id="card-3">
    <rect class="card" x="792" y="504" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="552" r="24" fill="#ecfdf5" stroke="#86efac" stroke-width="1.5"/>
    <text x="836" y="560" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#15803d">3</text>
    <foreignObject x="884" y="520" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Integration connects production data and workflows - security, compliance, most friction occurs here</div>
    </foreignObject>
  </g>

  <g id="card-4">
    <rect class="card" x="792" y="616" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="664" r="24" fill="#fffbeb" stroke="#fcd34d" stroke-width="1.5"/>
    <text x="836" y="672" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#b45309">4</text>
    <foreignObject x="884" y="632" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Scale out expands users, use cases, and volume - requires monitoring, SLAs, and organizational maturity</div>
    </foreignObject>
  </g>

  <g id="card-5">
    <rect class="card" x="792" y="728" width="1040" height="96" rx="20" stroke="#86efac" stroke-width="1.5"/>
    <circle cx="836" cy="776" r="24" fill="#ecfdf5" stroke="#86efac" stroke-width="1.5"/>
    <text x="836" y="784" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#15803d">5</text>
    <foreignObject x="884" y="744" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Platform standardization is the destination - blockers include ROI, data quality, integration, and governance gaps</div>
    </foreignObject>
  </g>

  <g opacity=".92">
    <rect x="1664" y="122" width="216" height="40" rx="20" fill="#111827"/>
    <circle cx="1690" cy="142" r="7" fill="#10b981"/>
    <text x="1712" y="148" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="800" fill="#fff">adoption mode</text>
  </g>
</svg>
