<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" role="img" aria-label="Enterprise agentic AI use case grid">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0fdf9"/>
      <stop offset=".55" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eff6ff"/>
    </linearGradient>
    <linearGradient id="emerald" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity=".1"/>
    </filter>
    <style>
      .kicker{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:800;letter-spacing:.22em;fill:#059669}
      .title{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:800;fill:#111827}
      .sub{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:500;fill:#6b7280}
      .panelTitle{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:20px;font-weight:800;fill:#334155}
      .panelSub{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:15px;font-weight:500;fill:#64748b}
      .cellTitle{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:13px;font-weight:800;fill:#ffffff}
      .cellBody{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:11px;font-weight:600;fill:#334155}
      .cellDriver{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:10px;font-weight:700;fill:#64748b}
      .footerHint{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:12px;font-weight:600;fill:#64748b}
      .card{fill:#ffffff;stroke:#bbf7d0;stroke-width:1.2;filter:url(#shadow)}
    </style>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <circle cx="1700" cy="900" r="260" fill="#10b981" opacity=".05"/>
  <circle cx="200" cy="200" r="200" fill="#3b82f6" opacity=".05"/>
  <path d="M48 188 H1872" stroke="#e5e7eb" stroke-width="1"/>

  <text x="48" y="52" class="kicker" font-size="14">MODULE 06 - ARCHITECTURE</text>
  <text x="48" y="108" class="title" font-size="48">Industry Use Case Grid</text>
  <text x="48" y="152" class="sub" font-size="24">Where agentic AI deploys today: knowledge, operations, research, documents, and beyond</text>

  <g id="grid-panel">
    <rect x="72" y="220" width="640" height="780" rx="28" fill="#ffffff" stroke="#bbf7d0" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="112" y="278" class="panelTitle">ENTERPRISE USE CASES</text>
    <text x="112" y="308" class="panelSub">Multi-step, tool-intensive, integration required</text>
    <text x="392" y="960" text-anchor="middle" class="footerHint">Common pattern: enterprise integration + tool orchestration</text>
  </g>

  <g id="usecase-knowledge">
    <rect x="100" y="340" width="176" height="200" rx="12" fill="#ffffff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
    <rect x="100" y="340" width="176" height="40" rx="12" fill="url(#blue)"/>
    <rect x="100" y="372" width="176" height="8" fill="url(#blue)"/>
    <text x="188" y="366" text-anchor="middle" class="cellTitle">Knowledge</text>
    <text x="112" y="404" class="cellBody">Surface institutional</text>
    <text x="112" y="422" class="cellBody">knowledge on demand</text>
    <text x="112" y="448" class="cellBody">Retrieve, synthesize,</text>
    <text x="112" y="466" class="cellBody">cite sources</text>
    <text x="188" y="520" text-anchor="middle" class="cellDriver">Driver: Efficiency</text>
  </g>

  <g id="usecase-customer">
    <rect x="292" y="340" width="176" height="200" rx="12" fill="#ffffff" stroke="#059669" stroke-width="2" filter="url(#shadow)"/>
    <rect x="292" y="340" width="176" height="40" rx="12" fill="url(#emerald)"/>
    <rect x="292" y="372" width="176" height="8" fill="url(#emerald)"/>
    <text x="380" y="366" text-anchor="middle" class="cellTitle">Customer Ops</text>
    <text x="304" y="404" class="cellBody">Triage, respond,</text>
    <text x="304" y="422" class="cellBody">route tickets</text>
    <text x="304" y="448" class="cellBody">CRM integration</text>
    <text x="304" y="466" class="cellBody">Policy enforcement</text>
    <text x="380" y="520" text-anchor="middle" class="cellDriver">Driver: Scalability</text>
  </g>

  <g id="usecase-research">
    <rect x="484" y="340" width="176" height="200" rx="12" fill="#ffffff" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)"/>
    <rect x="484" y="340" width="176" height="40" rx="12" fill="#8b5cf6"/>
    <rect x="484" y="372" width="176" height="8" fill="#8b5cf6"/>
    <text x="572" y="366" text-anchor="middle" class="cellTitle">Research</text>
    <text x="496" y="404" class="cellBody">Query multiple</text>
    <text x="496" y="422" class="cellBody">sources</text>
    <text x="496" y="448" class="cellBody">Cross-reference,</text>
    <text x="496" y="466" class="cellBody">generate reports</text>
    <text x="572" y="520" text-anchor="middle" class="cellDriver">Driver: Speed</text>
  </g>

  <g id="usecase-documents">
    <rect x="100" y="560" width="176" height="200" rx="12" fill="#ffffff" stroke="#d97706" stroke-width="2" filter="url(#shadow)"/>
    <rect x="100" y="560" width="176" height="40" rx="12" fill="#f59e0b"/>
    <rect x="100" y="592" width="176" height="8" fill="#f59e0b"/>
    <text x="188" y="586" text-anchor="middle" class="cellTitle">Documents</text>
    <text x="112" y="624" class="cellBody">Extract, compare,</text>
    <text x="112" y="642" class="cellBody">flag anomalies</text>
    <text x="112" y="668" class="cellBody">Contracts, invoices,</text>
    <text x="112" y="686" class="cellBody">regulatory filings</text>
    <text x="188" y="740" text-anchor="middle" class="cellDriver">Driver: Processing</text>
  </g>

  <g id="usecase-data">
    <rect x="292" y="560" width="176" height="200" rx="12" fill="#ffffff" stroke="#0891b2" stroke-width="2" filter="url(#shadow)"/>
    <rect x="292" y="560" width="176" height="40" rx="12" fill="#06b6d4"/>
    <rect x="292" y="592" width="176" height="8" fill="#06b6d4"/>
    <text x="380" y="586" text-anchor="middle" class="cellTitle">Data Workflows</text>
    <text x="304" y="624" class="cellBody">Monitor pipelines</text>
    <text x="304" y="642" class="cellBody">Diagnose failures</text>
    <text x="304" y="668" class="cellBody">Suggest fixes,</text>
    <text x="304" y="686" class="cellBody">routine maintenance</text>
    <text x="380" y="740" text-anchor="middle" class="cellDriver">Driver: Reliability</text>
  </g>

  <g id="usecase-adjacent">
    <rect x="484" y="560" width="176" height="200" rx="12" fill="#ffffff" stroke="#64748b" stroke-width="2" filter="url(#shadow)"/>
    <rect x="484" y="560" width="176" height="40" rx="12" fill="#64748b"/>
    <rect x="484" y="592" width="176" height="8" fill="#64748b"/>
    <text x="572" y="586" text-anchor="middle" class="cellTitle">Adjacent</text>
    <text x="496" y="624" class="cellBody">Robotics coordination</text>
    <text x="496" y="642" class="cellBody">Simulation at scale</text>
    <text x="496" y="668" class="cellBody">Physical + simulated</text>
    <text x="496" y="686" class="cellBody">environments</text>
    <text x="572" y="740" text-anchor="middle" class="cellDriver">Driver: Autonomy</text>
  </g>

  <rect x="744" y="220" width="2" height="780" fill="#e5e7eb"/>

  <g id="card-1">
    <rect class="card" x="792" y="280" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="328" r="24" fill="#ecfdf5" stroke="#86efac" stroke-width="1.5"/>
    <text x="836" y="336" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#15803d">1</text>
    <foreignObject x="884" y="296" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Agentic AI deploys across enterprise settings where workflows are multi-step and tool-intensive</div>
    </foreignObject>
  </g>

  <g id="card-2">
    <rect class="card" x="792" y="392" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="440" r="24" fill="#eef5ff" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="836" y="448" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#1d4ed8">2</text>
    <foreignObject x="884" y="408" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Knowledge management surfaces trapped institutional knowledge with RAG at enterprise scale</div>
    </foreignObject>
  </g>

  <g id="card-3">
    <rect class="card" x="792" y="504" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="552" r="24" fill="#ecfdf5" stroke="#86efac" stroke-width="1.5"/>
    <text x="836" y="560" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#15803d">3</text>
    <foreignObject x="884" y="520" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Customer operations triage tickets, draft responses, and integrate with CRM - not a simple chatbot</div>
    </foreignObject>
  </g>

  <g id="card-4">
    <rect class="card" x="792" y="616" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="664" r="24" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/>
    <text x="836" y="672" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#5b21b6">4</text>
    <foreignObject x="884" y="632" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Research and analysis automates gathering, cross-referencing, and structured report generation</div>
    </foreignObject>
  </g>

  <g id="card-5">
    <rect class="card" x="792" y="728" width="1040" height="96" rx="20" stroke="#86efac" stroke-width="1.5"/>
    <circle cx="836" cy="776" r="24" fill="#ecfdf5" stroke="#86efac" stroke-width="1.5"/>
    <text x="836" y="784" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#15803d">5</text>
    <foreignObject x="884" y="744" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Documents, data workflows, and adjacent domains share the same agentic pattern - that is what makes them agentic</div>
    </foreignObject>
  </g>

  <g opacity=".92">
    <rect x="1644" y="122" width="236" height="40" rx="20" fill="#111827"/>
    <circle cx="1670" cy="142" r="7" fill="#10b981"/>
    <text x="1692" y="148" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="800" fill="#fff">enterprise mode</text>
  </g>
</svg>
