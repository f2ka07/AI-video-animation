<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" role="img" aria-label="Enterprise value drivers for agentic AI">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0fdf9"/>
      <stop offset=".55" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eff6ff"/>
    </linearGradient>
    <linearGradient id="emerald" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity=".1"/>
    </filter>
    <style>
      .kicker{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:800;letter-spacing:.22em;fill:#059669}
      .title{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:800;fill:#111827}
      .sub{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:500;fill:#6b7280}
      .panelTitle{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:20px;font-weight:800;fill:#334155}
      .panelSub{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:15px;font-weight:500;fill:#64748b}
      .driverLabel{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:14px;font-weight:800;fill:#334155}
      .hint{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:13px;font-weight:600;fill:#64748b}
      .card{fill:#ffffff;stroke:#bbf7d0;stroke-width:1.2;filter:url(#shadow)}
    </style>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <circle cx="1700" cy="900" r="260" fill="#10b981" opacity=".05"/>
  <circle cx="200" cy="200" r="200" fill="#3b82f6" opacity=".05"/>
  <path d="M48 188 H1872" stroke="#e5e7eb" stroke-width="1"/>

  <text x="48" y="52" class="kicker" font-size="14">MODULE 06 - CONCEPT</text>
  <text x="48" y="108" class="title" font-size="48">Enterprise Value Drivers</text>
  <text x="48" y="152" class="sub" font-size="24">Why enterprises buy agentic AI: automation, speed, consistency, traceability, scale</text>

  <g id="spider-panel">
    <rect x="72" y="220" width="640" height="780" rx="28" fill="#ffffff" stroke="#bbf7d0" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="112" y="278" class="panelTitle">VALUE DRIVER ANALYSIS</text>
    <text x="112" y="308" class="panelSub">Which driver applies to this use case?</text>
    <circle cx="392" cy="540" r="150" fill="none" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="392" cy="540" r="112" fill="none" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="392" cy="540" r="74" fill="none" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="392" cy="540" r="36" fill="none" stroke="#e2e8f0" stroke-width="1"/>
    <polygon points="392,415 496,462 452,613 332,613 288,462" fill="#10b981" fill-opacity="0.18" stroke="#059669" stroke-width="2"/>
    <text x="392" y="544" text-anchor="middle" class="hint">Center = Low</text>
    <text x="392" y="430" text-anchor="middle" class="hint">Edge = High</text>
    <rect x="152" y="880" width="480" height="48" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="392" y="910" text-anchor="middle" class="hint" fill="#334155">Ask: Which driver justifies this use case?</text>
  </g>

  <g id="driver-automation">
    <line x1="392" y1="540" x2="392" y2="400" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="392" cy="400" r="6" fill="#2563eb"/>
    <text x="392" y="382" text-anchor="middle" class="driverLabel" fill="#2563eb">Automation</text>
  </g>

  <g id="driver-speed">
    <line x1="392" y1="540" x2="508" y2="468" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="508" cy="468" r="6" fill="#10b981"/>
    <text x="548" y="462" text-anchor="middle" class="driverLabel" fill="#059669">Speed</text>
  </g>

  <g id="driver-consistency">
    <line x1="392" y1="540" x2="456" y2="628" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="456" cy="628" r="6" fill="#8b5cf6"/>
    <text x="520" y="640" text-anchor="middle" class="driverLabel" fill="#7c3aed">Consistency</text>
  </g>

  <g id="driver-traceability">
    <line x1="392" y1="540" x2="328" y2="628" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="328" cy="628" r="6" fill="#f59e0b"/>
    <text x="264" y="640" text-anchor="middle" class="driverLabel" fill="#d97706">Traceability</text>
  </g>

  <g id="driver-scalability">
    <line x1="392" y1="540" x2="276" y2="468" stroke="#e2e8f0" stroke-width="1"/>
    <circle cx="276" cy="468" r="6" fill="#ef4444"/>
    <text x="236" y="462" text-anchor="middle" class="driverLabel" fill="#dc2626">Scalability</text>
  </g>

  <rect x="744" y="220" width="2" height="780" fill="#e5e7eb"/>

  <g id="card-1">
    <rect class="card" x="792" y="280" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="328" r="24" fill="#ecfdf5" stroke="#86efac" stroke-width="1.5"/>
    <text x="836" y="336" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#15803d">1</text>
    <foreignObject x="884" y="296" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Enterprises buy AI for operational problems that matter - not because it is new or interesting</div>
    </foreignObject>
  </g>

  <g id="card-2">
    <rect class="card" x="792" y="392" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="440" r="24" fill="#eef5ff" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="836" y="448" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#1d4ed8">2</text>
    <foreignObject x="884" y="408" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Automation replaces manual, repetitive work with systems that run continuously</div>
    </foreignObject>
  </g>

  <g id="card-3">
    <rect class="card" x="792" y="504" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="552" r="24" fill="#ecfdf5" stroke="#86efac" stroke-width="1.5"/>
    <text x="836" y="560" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#15803d">3</text>
    <foreignObject x="884" y="520" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Speed accelerates processes that previously took days or weeks - research, compliance, onboarding</div>
    </foreignObject>
  </g>

  <g id="card-4">
    <rect class="card" x="792" y="616" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="664" r="24" fill="#fffbeb" stroke="#fcd34d" stroke-width="1.5"/>
    <text x="836" y="672" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#b45309">4</text>
    <foreignObject x="884" y="632" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Consistency ensures the same quality every time; traceability creates audit trails for regulated processes</div>
    </foreignObject>
  </g>

  <g id="card-5">
    <rect class="card" x="792" y="728" width="1040" height="96" rx="20" stroke="#86efac" stroke-width="1.5"/>
    <circle cx="836" cy="776" r="24" fill="#ecfdf5" stroke="#86efac" stroke-width="1.5"/>
    <text x="836" y="784" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#15803d">5</text>
    <foreignObject x="884" y="744" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Scalability handles volume human teams cannot - ask which driver applies; if none, the use case is not ready</div>
    </foreignObject>
  </g>

  <g opacity=".92">
    <rect x="1676" y="122" width="196" height="40" rx="20" fill="#111827"/>
    <circle cx="1702" cy="142" r="7" fill="#10b981"/>
    <text x="1724" y="148" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="800" fill="#fff">value mode</text>
  </g>
</svg>
