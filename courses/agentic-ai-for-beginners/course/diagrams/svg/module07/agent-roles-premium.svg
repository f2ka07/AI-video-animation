<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" role="img" aria-label="Four roles in agentic architecture">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5f3ff"/>
      <stop offset=".55" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eff6ff"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity=".1"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-violet" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8b5cf6"/>
    </marker>
    <style>
      .kicker{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:800;letter-spacing:.22em;fill:#7c3aed}
      .title{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:800;fill:#111827}
      .sub{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:500;fill:#6b7280}
      .panelTitle{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:20px;font-weight:800;fill:#334155}
      .panelSub{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:15px;font-weight:500;fill:#64748b}
      .nodeTextLight{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:14px;font-weight:800;fill:#ffffff}
      .nodeTextDark{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:14px;font-weight:800;fill:#0f172a}
      .nodeSubLight{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:11px;font-weight:600;fill:#f8fafc}
      .nodeSubDark{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:11px;font-weight:600;fill:#334155}
      .flowLine{fill:none;stroke:#94a3b8;stroke-width:2;stroke-linecap:round}
      .returnLine{fill:none;stroke:#8b5cf6;stroke-width:2;stroke-dasharray:6 4}
      .card{fill:#ffffff;stroke:#ede9fe;stroke-width:1.2;filter:url(#shadow)}
    </style>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <circle cx="1760" cy="130" r="220" fill="#8b5cf6" opacity=".06"/>
  <circle cx="130" cy="950" r="260" fill="#3b82f6" opacity=".05"/>
  <path d="M48 188 H1872" stroke="#e5e7eb" stroke-width="1"/>

  <text x="48" y="52" class="kicker" font-size="14">MODULE 07 - CONCEPT</text>
  <text x="48" y="108" class="title" font-size="48">Four Roles in Agentic Systems</text>
  <text x="48" y="152" class="sub" font-size="24">Planner, executor, router, and orchestrator - how work flows through the pipeline</text>

  <g id="roles-panel">
    <rect x="72" y="220" width="640" height="780" rx="28" fill="#ffffff" stroke="#ede9fe" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="112" y="278" class="panelTitle">ROLE PIPELINE</text>
    <text x="112" y="308" class="panelSub">Goal in, structured dispatch, verified output</text>
  </g>

  <g id="goal">
    <rect x="302" y="340" width="180" height="44" rx="22" fill="#f8fafc" stroke="#c4b5fd" stroke-width="1.5"/>
    <text x="392" y="368" text-anchor="middle" class="nodeTextDark">Goal</text>
    <path class="flowLine" d="M392 384 L392 408" marker-end="url(#arrow)"/>
  </g>

  <g id="orchestrator">
    <rect x="142" y="412" width="500" height="56" rx="14" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
    <text x="392" y="438" text-anchor="middle" class="nodeTextDark" fill="#5b21b6">Orchestrator</text>
    <text x="392" y="456" text-anchor="middle" class="nodeSubDark">Control loop: invoke, dispatch, retry, state</text>
    <path class="flowLine" d="M392 468 L392 492" marker-end="url(#arrow-violet)"/>
  </g>

  <g id="planner">
    <rect x="172" y="496" width="440" height="52" rx="12" fill="url(#purple)" filter="url(#shadow)"/>
    <text x="392" y="520" text-anchor="middle" class="nodeTextLight">Planner</text>
    <text x="392" y="538" text-anchor="middle" class="nodeSubLight">Structure subtasks and order (not execution)</text>
    <path class="flowLine" d="M392 548 L392 572" marker-end="url(#arrow)"/>
  </g>

  <g id="router">
    <rect x="172" y="576" width="440" height="52" rx="12" fill="url(#blue)" filter="url(#shadow)"/>
    <text x="392" y="600" text-anchor="middle" class="nodeTextLight">Router</text>
    <text x="392" y="618" text-anchor="middle" class="nodeSubLight">Send work to the right agent or tool</text>
  </g>

  <path class="flowLine" d="M312 628 L208 668" marker-end="url(#arrow)"/>
  <path class="flowLine" d="M472 628 L576 668" marker-end="url(#arrow)"/>

  <g id="executor-rag">
    <rect x="108" y="672" width="260" height="56" rx="12" fill="url(#green)" filter="url(#shadow)"/>
    <text x="238" y="696" text-anchor="middle" class="nodeTextLight">Executor: RAG</text>
    <text x="238" y="714" text-anchor="middle" class="nodeSubLight">Retrieval pipeline</text>
  </g>

  <g id="executor-code">
    <rect x="416" y="672" width="260" height="56" rx="12" fill="#f59e0b" stroke="#d97706" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="546" y="696" text-anchor="middle" class="nodeTextLight" fill="#0f172a">Executor: Code</text>
    <text x="546" y="714" text-anchor="middle" class="nodeSubDark">API / calculation / code run</text>
  </g>

  <path class="returnLine" d="M208 728 L148 728 L148 440 L142 440" marker-end="url(#arrow-violet)"/>
  <path class="returnLine" d="M576 728 L636 728 L636 440 L642 440" marker-end="url(#arrow-violet)"/>
  <text x="392" y="752" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="600" fill="#64748b">Results return to orchestrator</text>

  <path class="flowLine" d="M392 760 L392 784" marker-end="url(#arrow)"/>

  <g id="output">
    <rect x="302" y="792" width="180" height="44" rx="22" fill="url(#green)" filter="url(#shadow)"/>
    <text x="392" y="820" text-anchor="middle" class="nodeTextLight">Output</text>
  </g>

  <text x="392" y="868" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="600" fill="#475569">Executors are single-purpose, predictable, and testable</text>

  <rect x="744" y="220" width="2" height="780" fill="#e5e7eb"/>

  <g id="card-1">
    <rect class="card" x="792" y="280" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="328" r="24" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/>
    <text x="836" y="336" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#5b21b6">1</text>
    <foreignObject x="884" y="296" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Planner: breaks the goal into ordered subtasks (structure, not execution)</div>
    </foreignObject>
  </g>
  <g id="card-2">
    <rect class="card" x="792" y="392" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="440" r="24" fill="#ecfdf5" stroke="#86efac" stroke-width="1.5"/>
    <text x="836" y="448" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#15803d">2</text>
    <foreignObject x="884" y="408" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Executor: runs one step via tools (predictable, testable)</div>
    </foreignObject>
  </g>
  <g id="card-3">
    <rect class="card" x="792" y="504" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="552" r="24" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="836" y="560" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#1d4ed8">3</text>
    <foreignObject x="884" y="520" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Router: sends work to the right agent or tool (RAG vs code)</div>
    </foreignObject>
  </g>
  <g id="card-4">
    <rect class="card" x="792" y="616" width="1040" height="96" rx="20" stroke="#c4b5fd" stroke-width="1.5"/>
    <circle cx="836" cy="664" r="24" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/>
    <text x="836" y="672" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#5b21b6">4</text>
    <foreignObject x="884" y="632" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Orchestrator: runs the control loop (dispatch, retry, state)</div>
    </foreignObject>
  </g>

  <g opacity=".92">
    <rect x="1664" y="122" width="216" height="40" rx="20" fill="#111827"/>
    <circle cx="1690" cy="142" r="7" fill="#8b5cf6"/>
    <text x="1712" y="148" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="800" fill="#fff">pipeline mode</text>
  </g>
</svg>
