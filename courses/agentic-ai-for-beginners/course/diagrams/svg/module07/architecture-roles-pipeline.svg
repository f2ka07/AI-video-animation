<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" width="1200" height="680">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b5cf6"/>
    </marker>
  </defs>

  <rect width="1200" height="680" fill="#f8fafc"/>

  <text x="600" y="36" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="600" fill="#1e293b">Four Roles in Agentic Architecture</text>
  <text x="600" y="58" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">Planner, Executor, Router, Orchestrator</text>

  <g id="goal" class="part">
    <rect x="500" y="78" width="200" height="44" rx="8" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2"/>
    <text x="600" y="106" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#0f172a">Goal</text>
  </g>

  <line class="link" x1="600" y1="122" x2="600" y2="148" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <g id="orchestrator" class="part">
    <rect x="350" y="152" width="500" height="72" rx="12" fill="#ede9fe" stroke="#8b5cf6" stroke-width="3"/>
    <text x="600" y="182" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#5b21b6">Orchestrator</text>
    <text x="600" y="206" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#334155">Control loop: invoke, dispatch, retry, state</text>
  </g>

  <line class="link" x1="600" y1="224" x2="600" y2="252" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrow-violet)"/>

  <g id="planner" class="part">
    <rect x="420" y="256" width="360" height="64" rx="10" fill="#8b5cf6" stroke="#7c3aed" stroke-width="2"/>
    <text x="600" y="284" text-anchor="middle" font-family="system-ui, sans-serif" font-size="17" font-weight="600" fill="#ffffff">Planner</text>
    <text x="600" y="306" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#ede9fe">Structure subtasks and order (not execution)</text>
  </g>

  <line class="link" x1="600" y1="320" x2="600" y2="348" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>

  <g id="router" class="part">
    <rect x="420" y="352" width="360" height="64" rx="10" fill="#3b82f6" stroke="#2563eb" stroke-width="2"/>
    <text x="600" y="380" text-anchor="middle" font-family="system-ui, sans-serif" font-size="17" font-weight="600" fill="#ffffff">Router</text>
    <text x="600" y="402" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#dbeafe">Send work to the right agent or tool</text>
  </g>

  <line class="link" x1="540" y1="416" x2="380" y2="456" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>
  <line class="link" x1="660" y1="416" x2="820" y2="456" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>

  <g id="executor-rag" class="part">
    <rect x="220" y="460" width="320" height="72" rx="10" fill="#10b981" stroke="#059669" stroke-width="2"/>
    <text x="380" y="490" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#ffffff">Executor: RAG</text>
    <text x="380" y="512" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#d1fae5">Retrieval pipeline</text>
  </g>

  <g id="executor-code" class="part">
    <rect x="660" y="460" width="320" height="72" rx="10" fill="#f59e0b" stroke="#d97706" stroke-width="2"/>
    <text x="820" y="490" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#0f172a">Executor: Code</text>
    <text x="820" y="512" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">API / calculation / code run</text>
  </g>

  <path class="link" d="M 380 532 L 280 532 L 280 188 L 350 188" fill="none" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrow-violet)"/>
  <path class="link" d="M 820 532 L 920 532 L 920 188 L 850 188" fill="none" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrow-violet)"/>
  <text x="600" y="548" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">Results return to orchestrator</text>

  <line class="link" x1="600" y1="560" x2="600" y2="588" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <g id="output" class="part">
    <rect x="500" y="592" width="200" height="44" rx="8" fill="#10b981" stroke="#059669" stroke-width="2"/>
    <text x="600" y="620" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#ffffff">Output</text>
  </g>

  <text x="600" y="662" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#d1fae5">Executors are single-purpose, predictable, and testable</text>
</svg>
