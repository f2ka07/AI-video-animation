<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" role="img" aria-label="Reliability by architecture choice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5f3ff"/>
      <stop offset=".55" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eff6ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity=".1"/>
    </filter>
    <style>
      .kicker{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:800;letter-spacing:.22em;fill:#7c3aed}
      .title{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:800;fill:#111827}
      .sub{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:500;fill:#6b7280}
      .panelTitle{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:20px;font-weight:800;fill:#334155}
      .panelSub{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:15px;font-weight:500;fill:#64748b}
      .bandTitle{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:14px;font-weight:800;fill:#0f172a}
      .bandSub{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:12px;font-weight:600;fill:#334155}
      .chipText{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:11px;font-weight:700;fill:#ffffff}
      .card{fill:#ffffff;stroke:#ede9fe;stroke-width:1.2;filter:url(#shadow)}
    </style>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <circle cx="200" cy="880" r="240" fill="#8b5cf6" opacity=".05"/>
  <path d="M48 188 H1872" stroke="#e5e7eb" stroke-width="1"/>

  <text x="48" y="52" class="kicker" font-size="14">MODULE 07 - APPLICATION</text>
  <text x="48" y="108" class="title" font-size="48">Reliability by Architecture Choice</text>
  <text x="48" y="152" class="sub" font-size="24">Reliability patterns that follow from how you structure your agent system</text>

  <g id="reliability-panel">
    <rect x="72" y="220" width="640" height="780" rx="28" fill="#ffffff" stroke="#ede9fe" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="112" y="278" class="panelTitle">RELIABILITY PATTERNS</text>
    <text x="112" y="308" class="panelSub">Guards, handoffs, and event-driven scale</text>
  </g>

  <g id="band-single">
    <rect x="100" y="340" width="584" height="120" rx="14" fill="#fee2e2" stroke="#fecaca" stroke-width="1.5"/>
    <text x="124" y="372" class="bandTitle" fill="#991b1b">Single-agent failure</text>
    <text x="392" y="404" text-anchor="middle" class="bandSub">Whole loop stops if the model gets stuck</text>
  </g>

  <g id="guards">
    <rect x="148" y="420" width="160" height="40" rx="10" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
    <text x="228" y="446" text-anchor="middle" class="bandSub" fill="#991b1b">Max-step limit</text>
    <rect x="328" y="420" width="160" height="40" rx="10" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
    <text x="408" y="446" text-anchor="middle" class="bandSub" fill="#991b1b">Anti-loop guard</text>
    <rect x="508" y="420" width="160" height="40" rx="10" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
    <text x="588" y="446" text-anchor="middle" class="bandSub" fill="#991b1b">Fallback / escalate</text>
  </g>

  <g id="band-multi">
    <rect x="100" y="500" width="584" height="120" rx="14" fill="#dbeafe" stroke="#bfdbfe" stroke-width="1.5"/>
    <text x="124" y="532" class="bandTitle" fill="#1e3a8a">Multi-agent partial failure</text>
    <text x="392" y="564" text-anchor="middle" class="bandSub">One agent can fail while others continue</text>
  </g>

  <g id="handoffs">
    <rect x="168" y="580" width="120" height="40" rx="10" fill="#8b5cf6"/>
    <text x="228" y="606" text-anchor="middle" class="chipText">Schema</text>
    <text x="308" y="606" text-anchor="middle" class="bandSub">-&gt;</text>
    <rect x="336" y="580" width="120" height="40" rx="10" fill="#3b82f6"/>
    <text x="396" y="606" text-anchor="middle" class="chipText">Handoff</text>
    <text x="476" y="606" text-anchor="middle" class="bandSub">-&gt;</text>
    <rect x="504" y="580" width="120" height="40" rx="10" fill="#10b981"/>
    <text x="564" y="606" text-anchor="middle" class="chipText">Schema</text>
  </g>

  <g id="band-events">
    <rect x="100" y="660" width="584" height="140" rx="14" fill="#d1fae5" stroke="#a7f3d0" stroke-width="1.5"/>
    <text x="124" y="692" class="bandTitle" fill="#047857">Event-driven scale</text>
    <text x="392" y="724" text-anchor="middle" class="bandSub">Queues, batching, and horizontal scaling</text>
  </g>

  <g id="queue">
    <rect x="168" y="748" width="180" height="44" rx="10" fill="#10b981"/>
    <text x="258" y="776" text-anchor="middle" class="chipText">Message queue</text>
  </g>
  <g id="state-machine">
    <rect x="436" y="748" width="180" height="44" rx="10" fill="#059669"/>
    <text x="526" y="776" text-anchor="middle" class="chipText">State machine</text>
  </g>

  <text x="392" y="868" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="600" fill="#475569">When you outgrow one process, event-driven patterns scale</text>

  <rect x="744" y="220" width="2" height="780" fill="#e5e7eb"/>

  <g id="card-1">
    <rect class="card" x="792" y="280" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="328" r="24" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
    <text x="836" y="336" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#991b1b">1</text>
    <foreignObject x="884" y="296" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Single-agent: the whole loop stops if the model gets stuck on one step</div>
    </foreignObject>
  </g>
  <g id="card-2">
    <rect class="card" x="792" y="392" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="440" r="24" fill="#fffbeb" stroke="#fcd34d" stroke-width="1.5"/>
    <text x="836" y="448" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#b45309">2</text>
    <foreignObject x="884" y="408" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Guards: max-step limits, anti-loop detection, and fallback or escalation paths</div>
    </foreignObject>
  </g>
  <g id="card-3">
    <rect class="card" x="792" y="504" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="552" r="24" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="836" y="560" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#1d4ed8">3</text>
    <foreignObject x="884" y="520" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Multi-agent: schema handoffs let one agent fail while others continue</div>
    </foreignObject>
  </g>
  <g id="card-4">
    <rect class="card" x="792" y="616" width="1040" height="96" rx="20" stroke="#86efac" stroke-width="1.5"/>
    <circle cx="836" cy="664" r="24" fill="#ecfdf5" stroke="#86efac" stroke-width="1.5"/>
    <text x="836" y="672" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#15803d">4</text>
    <foreignObject x="884" y="632" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Event-driven: message queues and state machines for horizontal scale</div>
    </foreignObject>
  </g>

  <g opacity=".92">
    <rect x="1644" y="122" width="236" height="40" rx="20" fill="#111827"/>
    <circle cx="1670" cy="142" r="7" fill="#8b5cf6"/>
    <text x="1692" y="148" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="800" fill="#fff">production mode</text>
  </g>
</svg>
