<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" width="1200" height="620">
  <rect width="1200" height="620" fill="#f8fafc"/>
  <text x="600" y="36" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="600" fill="#1e293b">Reliability by Architecture Choice</text>

  <g id="band-single" class="part">
    <rect x="60" y="70" width="1080" height="140" rx="10" fill="#fee2e2" stroke="#fecaca" stroke-width="1"/>
    <text x="90" y="98" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#991b1b">Single-agent failure</text>
    <text x="600" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#334155">Whole loop stops if the model gets stuck</text>
  </g>
  <g id="guards" class="part">
    <rect x="200" y="150" width="220" height="44" rx="8" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
    <text x="310" y="178" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#991b1b">Max-step limit</text>
    <rect x="440" y="150" width="220" height="44" rx="8" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
    <text x="550" y="178" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#991b1b">Anti-loop guard</text>
    <rect x="680" y="150" width="220" height="44" rx="8" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
    <text x="790" y="178" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#991b1b">Fallback / escalate</text>
  </g>

  <g id="band-multi" class="part">
    <rect x="60" y="240" width="1080" height="140" rx="10" fill="#dbeafe" stroke="#bfdbfe" stroke-width="1"/>
    <text x="90" y="268" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e3a8a">Multi-agent partial failure</text>
    <text x="600" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#334155">One agent can fail while others continue</text>
  </g>
  <g id="handoffs" class="part">
    <rect x="280" y="320" width="160" height="44" rx="8" fill="#8b5cf6"/>
    <text x="360" y="348" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#ffffff">Schema</text>
    <text x="480" y="348" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" fill="#334155">-&gt;</text>
    <rect x="520" y="320" width="160" height="44" rx="8" fill="#3b82f6"/>
    <text x="600" y="348" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#ffffff">Handoff</text>
    <text x="720" y="348" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" fill="#334155">-&gt;</text>
    <rect x="760" y="320" width="160" height="44" rx="8" fill="#10b981"/>
    <text x="840" y="348" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#ffffff">Schema</text>
  </g>

  <g id="band-events" class="part">
    <rect x="60" y="410" width="1080" height="160" rx="10" fill="#d1fae5" stroke="#a7f3d0" stroke-width="1"/>
    <text x="90" y="438" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#047857">Event-driven scale</text>
  </g>
  <g id="queue" class="part">
    <rect x="320" y="470" width="200" height="56" rx="8" fill="#10b981"/>
    <text x="420" y="504" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#ffffff">Message queue</text>
  </g>
  <g id="state-machine" class="part">
    <rect x="680" y="470" width="200" height="56" rx="8" fill="#059669"/>
    <text x="780" y="504" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#ffffff">State machine</text>
  </g>
  <text x="600" y="590" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#d1fae5">Queues, batching, and horizontal scaling when you outgrow one process</text>
</svg>
