<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" role="img" aria-label="Single-agent vs multi-agent architecture">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5f3ff"/>
      <stop offset=".55" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eff6ff"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity=".1"/>
    </filter>
    <style>
      .kicker{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:800;letter-spacing:.22em;fill:#7c3aed}
      .title{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:800;fill:#111827}
      .sub{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:500;fill:#6b7280}
      .panelTitle{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:20px;font-weight:800;fill:#334155}
      .panelSub{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:15px;font-weight:500;fill:#64748b}
      .nodeTextLight{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:13px;font-weight:800;fill:#ffffff}
      .nodeTextDark{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:13px;font-weight:800;fill:#0f172a}
      .nodeSub{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:11px;font-weight:600;fill:#334155}
      .card{fill:#ffffff;stroke:#ede9fe;stroke-width:1.2;filter:url(#shadow)}
    </style>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <circle cx="1700" cy="180" r="220" fill="#8b5cf6" opacity=".06"/>
  <path d="M48 188 H1872" stroke="#e5e7eb" stroke-width="1"/>

  <text x="48" y="52" class="kicker" font-size="14">MODULE 07 - ARCHITECTURE</text>
  <text x="48" y="108" class="title" font-size="48">Single-Agent vs Multi-Agent</text>
  <text x="48" y="152" class="sub" font-size="24">When a single agent is enough vs when you need coordinated multi-agent design</text>

  <g id="compare-panel">
    <rect x="72" y="220" width="640" height="780" rx="28" fill="#ffffff" stroke="#ede9fe" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="112" y="278" class="panelTitle">ARCHITECTURE CHOICE</text>
    <text x="112" y="308" class="panelSub">One mind vs specialized roles working together</text>
  </g>

  <g id="single-panel">
    <rect x="100" y="340" width="268" height="620" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
    <rect x="100" y="340" width="268" height="40" rx="16" fill="url(#blue)"/>
    <text x="234" y="366" text-anchor="middle" class="nodeTextLight" font-size="14">Single Agent</text>
  </g>

  <g id="single-loop">
    <rect x="124" y="420" width="220" height="120" rx="12" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
    <text x="234" y="458" text-anchor="middle" class="nodeTextDark" fill="#1e3a8a">One model, one loop</text>
    <text x="234" y="482" text-anchor="middle" class="nodeSub">Coherent, sequential</text>
    <text x="234" y="502" text-anchor="middle" class="nodeSub">Simpler to deploy</text>
    <text x="234" y="580" text-anchor="middle" class="nodeSub">Best when the problem fits one mind</text>
  </g>

  <g id="vs-label">
    <text x="392" y="660" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="28" font-weight="800" fill="#7c3aed">vs</text>
  </g>

  <g id="multi-panel">
    <rect x="416" y="340" width="268" height="620" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
    <rect x="416" y="340" width="268" height="40" rx="16" fill="url(#purple)"/>
    <text x="550" y="366" text-anchor="middle" class="nodeTextLight" font-size="14">Multi-Agent</text>
  </g>

  <g id="multi-planner">
    <rect x="440" y="400" width="110" height="44" rx="10" fill="url(#purple)"/>
    <text x="495" y="428" text-anchor="middle" class="nodeTextLight" font-size="12">Planner</text>
  </g>
  <g id="multi-research">
    <rect x="560" y="400" width="110" height="44" rx="10" fill="url(#blue)"/>
    <text x="615" y="428" text-anchor="middle" class="nodeTextLight" font-size="12">Research</text>
  </g>
  <g id="multi-writer">
    <rect x="440" y="460" width="110" height="44" rx="10" fill="#10b981"/>
    <text x="495" y="488" text-anchor="middle" class="nodeTextLight" font-size="12">Writer</text>
  </g>
  <g id="multi-critic">
    <rect x="560" y="460" width="110" height="44" rx="10" fill="#f59e0b"/>
    <text x="615" y="488" text-anchor="middle" class="nodeTextLight" fill="#0f172a">Critic</text>
  </g>

  <g id="scenario-support">
    <rect x="432" y="540" width="236" height="160" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1.5"/>
    <text x="550" y="572" text-anchor="middle" class="nodeTextDark" font-size="12">Exam: customer support</text>
    <text x="550" y="598" text-anchor="middle" class="nodeSub">Triage | Retrieve | Draft</text>
    <text x="550" y="620" text-anchor="middle" class="nodeSub">Distinct capabilities need</text>
    <text x="550" y="642" text-anchor="middle" class="nodeSub">specialization</text>
  </g>

  <rect x="744" y="220" width="2" height="780" fill="#e5e7eb"/>

  <g id="card-1">
    <rect class="card" x="792" y="280" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="328" r="24" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="836" y="336" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#1d4ed8">1</text>
    <foreignObject x="884" y="296" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Single-agent: one model runs the full loop - coherent and simpler to deploy</div>
    </foreignObject>
  </g>
  <g id="card-2">
    <rect class="card" x="792" y="392" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="440" r="24" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/>
    <text x="836" y="448" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#5b21b6">2</text>
    <foreignObject x="884" y="408" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Multi-agent: specialized roles (planner, research, writer, critic) coordinate on complex tasks</div>
    </foreignObject>
  </g>
  <g id="card-3">
    <rect class="card" x="792" y="504" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="552" r="24" fill="#ecfdf5" stroke="#86efac" stroke-width="1.5"/>
    <text x="836" y="560" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#15803d">3</text>
    <foreignObject x="884" y="520" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Customer support: triage, retrieve, draft, escalate - each step may need a different agent</div>
    </foreignObject>
  </g>
  <g id="card-4">
    <rect class="card" x="792" y="616" width="1040" height="96" rx="20" stroke="#c4b5fd" stroke-width="1.5"/>
    <circle cx="836" cy="664" r="24" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5"/>
    <text x="836" y="672" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#5b21b6">4</text>
    <foreignObject x="884" y="632" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Choose single when one mind fits; multi-agent when distinct capabilities need specialization</div>
    </foreignObject>
  </g>

  <g opacity=".92">
    <rect x="1644" y="122" width="236" height="40" rx="20" fill="#111827"/>
    <circle cx="1670" cy="142" r="7" fill="#8b5cf6"/>
    <text x="1692" y="148" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="800" fill="#fff">workload mode</text>
  </g>
</svg>
