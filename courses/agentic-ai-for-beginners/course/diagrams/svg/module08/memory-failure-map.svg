<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" width="1200" height="660">
  <defs><marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/></marker></defs>
  <g id="main">
    <rect width="1200" height="660" fill="#f8fafc"/>
    <text x="600" y="640" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" fill="#94a3b8">Design memory for the failures you expect in production</text>
  </g>

  <text x="600" y="80" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="600" fill="#64748b">Match each failure mode to the memory layer that fixes it</text>

  <g id="section-1">
    <rect x="60" y="110" width="520" height="210" rx="16" fill="#ede9fe" stroke="#8b5cf6" stroke-width="3"/>
    <text x="320" y="155" text-anchor="middle" font-family="system-ui,sans-serif" font-size="22" font-weight="700" fill="#5b21b6">Forgotten instruction</text>
    <text x="320" y="185" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#334155">Symptom: original goal lost after several tool calls</text>
    <text x="320" y="215" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#334155">Fix: Working memory</text>
  </g>

  <g id="section-2">
    <rect x="620" y="110" width="520" height="210" rx="16" fill="#dbeafe" stroke="#3b82f6" stroke-width="3"/>
    <text x="880" y="155" text-anchor="middle" font-family="system-ui,sans-serif" font-size="22" font-weight="700" fill="#1e3a8a">Missing context</text>
    <text x="880" y="185" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#334155">Symptom: cannot answer without prior session facts</text>
    <text x="880" y="215" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#334155">Fix: Long-term memory</text>
  </g>

  <g id="section-3">
    <rect x="60" y="360" width="520" height="210" rx="16" fill="#d1fae5" stroke="#10b981" stroke-width="3"/>
    <text x="320" y="405" text-anchor="middle" font-family="system-ui,sans-serif" font-size="22" font-weight="700" fill="#047857">Looping reasoning</text>
    <text x="320" y="435" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#334155">Symptom: same action repeats with no progress</text>
    <text x="320" y="465" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#334155">Fix: Session context</text>
  </g>

  <g id="section-4">
    <rect x="620" y="360" width="520" height="210" rx="16" fill="#fef3c7" stroke="#f59e0b" stroke-width="3"/>
    <text x="880" y="405" text-anchor="middle" font-family="system-ui,sans-serif" font-size="22" font-weight="700" fill="#78350f">Noisy retrieval</text>
    <text x="880" y="435" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#334155">Symptom: irrelevant chunks pollute the prompt</text>
    <text x="880" y="465" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#334155">Fix: Memory hygiene</text>
  </g>
</svg>
