<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" width="1200" height="660">
  <defs><marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/></marker></defs>
  <g id="main">
    <rect width="1200" height="660" fill="#f8fafc"/>
    <text x="600" y="640" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" fill="#94a3b8">Latency vs quality: reflection trades speed for accuracy</text>
  </g>

  <text x="600" y="80" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="600" fill="#64748b">Implementation patterns for production agent memory</text>

  <g id="section-1">
    <rect x="100" y="110" width="450" height="190" rx="16" fill="#7c3aed" stroke="#6d28d9" stroke-width="3"/>
    <text x="325" y="155" text-anchor="middle" font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#ffffff">Reflection step</text>
    <text x="325" y="185" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#ede9fe">Critic reviews output</text>
    <text x="325" y="215" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#ede9fe">Retry with feedback - high-stakes answers</text>
  </g>

  <line x1="550" y1="205" x2="650" y2="205" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrow)"/>

  <g id="section-2">
    <rect x="650" y="110" width="450" height="190" rx="16" fill="#2563eb" stroke="#1d4ed8" stroke-width="3"/>
    <text x="875" y="155" text-anchor="middle" font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#ffffff">Working state</text>
    <text x="875" y="185" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#dbeafe">Structured goal + steps</text>
    <text x="875" y="215" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#dbeafe">Re-inject every model call</text>
  </g>

  <line x1="875" y1="300" x2="875" y2="340" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="325" y1="300" x2="325" y2="340" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrow)"/>

  <g id="section-3">
    <rect x="100" y="340" width="450" height="190" rx="16" fill="#059669" stroke="#047857" stroke-width="3"/>
    <text x="325" y="385" text-anchor="middle" font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#ffffff">Long-term store</text>
    <text x="325" y="415" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#d1fae5">Vector DB or facts DB</text>
    <text x="325" y="445" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#d1fae5">Freshness + citation rules</text>
  </g>

  <line x1="550" y1="435" x2="650" y2="435" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrow)"/>

  <g id="section-4">
    <rect x="650" y="340" width="450" height="190" rx="16" fill="#dc2626" stroke="#b91c1c" stroke-width="3"/>
    <text x="875" y="385" text-anchor="middle" font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#ffffff">Anti-loop guards</text>
    <text x="875" y="415" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#fecaca">Detect repeated tools</text>
    <text x="875" y="445" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#fecaca">Max-step limits - escalate to human</text>
  </g>
</svg>
