<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" role="img" aria-label="Reasoning and reflection cycle">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef2ff"/>
      <stop offset=".55" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f5f3ff"/>
    </linearGradient>
    <linearGradient id="indigo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity=".1"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/>
    </marker>
    <style>
      .kicker{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:800;letter-spacing:.22em;fill:#4338ca}
      .title{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:800;fill:#111827}
      .sub{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:500;fill:#6b7280}
      .panelTitle{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:20px;font-weight:800;fill:#334155}
      .panelSub{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:15px;font-weight:500;fill:#64748b}
      .nodeTextLight{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:14px;font-weight:800;fill:#ffffff}
      .nodeSubLight{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:11px;font-weight:600;fill:#f8fafc}
      .nodeTextDark{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:14px;font-weight:800;fill:#0f172a}
      .nodeSubDark{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:12px;font-weight:600;fill:#334155}
      .flowLine{fill:none;stroke:#94a3b8;stroke-width:2.5;stroke-linecap:round}
      .loopLine{fill:none;stroke:#64748b;stroke-width:2.5;stroke-dasharray:8 6}
      .card{fill:#ffffff;stroke:#c7d2fe;stroke-width:1.2;filter:url(#shadow)}
    </style>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <circle cx="1760" cy="130" r="220" fill="#6366f1" opacity=".06"/>
  <path d="M48 188 H1872" stroke="#e5e7eb" stroke-width="1"/>

  <text x="48" y="52" class="kicker" font-size="14">MODULE 08 - CONCEPT</text>
  <text x="48" y="108" class="title" font-size="48">Reasoning and Reflection</text>
  <text x="48" y="152" class="sub" font-size="24">Task decomposition, explicit vs implicit planning, and self-correction patterns</text>

  <g id="cycle-panel">
    <rect x="72" y="220" width="640" height="780" rx="28" fill="#ffffff" stroke="#c7d2fe" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="112" y="278" class="panelTitle">REASONING CYCLE</text>
    <text x="112" y="308" class="panelSub">Decompose, plan, act, reflect - loop until quality threshold</text>
  </g>

  <g id="section-1">
    <rect x="108" y="360" width="168" height="140" rx="14" fill="url(#indigo)" filter="url(#shadow)"/>
    <text x="192" y="408" text-anchor="middle" class="nodeTextLight">Decompose</text>
    <text x="192" y="432" text-anchor="middle" class="nodeSubLight">Break goals into</text>
    <text x="192" y="450" text-anchor="middle" class="nodeSubLight">ordered subtasks</text>
  </g>

  <path class="flowLine" d="M276 430 H308" marker-end="url(#arrow)"/>

  <g id="section-2">
    <rect x="312" y="360" width="168" height="140" rx="14" fill="url(#blue)" filter="url(#shadow)"/>
    <text x="396" y="408" text-anchor="middle" class="nodeTextLight">Plan</text>
    <text x="396" y="432" text-anchor="middle" class="nodeSubLight">Explicit lists or</text>
    <text x="396" y="450" text-anchor="middle" class="nodeSubLight">implicit reasoning</text>
  </g>

  <path class="flowLine" d="M480 430 H512" marker-end="url(#arrow)"/>

  <g id="section-3">
    <rect x="516" y="360" width="168" height="140" rx="14" fill="url(#green)" filter="url(#shadow)"/>
    <text x="600" y="408" text-anchor="middle" class="nodeTextLight">Reflect</text>
    <text x="600" y="432" text-anchor="middle" class="nodeSubLight">Critique, verify,</text>
    <text x="600" y="450" text-anchor="middle" class="nodeSubLight">refine output</text>
  </g>

  <path class="loopLine" d="M600 500 C 620 560, 520 600, 392 620 C 264 600, 164 560, 192 500"/>
  <polygon points="196,498 188,514 204,506" fill="#64748b"/>

  <g id="section-4">
    <rect x="148" y="660" width="488" height="120" rx="16" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
    <text x="392" y="702" text-anchor="middle" class="nodeTextDark">Hybrid Production Loop</text>
    <text x="392" y="728" text-anchor="middle" class="nodeSubDark">Planner structure + flexible model execution</text>
    <text x="392" y="752" text-anchor="middle" class="nodeSubDark">Robust agents loop until quality threshold is met</text>
  </g>

  <rect x="744" y="220" width="2" height="780" fill="#e5e7eb"/>

  <g id="card-1">
    <rect class="card" x="792" y="280" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="328" r="24" fill="#eef2ff" stroke="#a5b4fc" stroke-width="1.5"/>
    <text x="836" y="336" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#4338ca">1</text>
    <foreignObject x="884" y="296" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Decompose: break complex goals into ordered subtasks before acting</div>
    </foreignObject>
  </g>
  <g id="card-2">
    <rect class="card" x="792" y="392" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="440" r="24" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="836" y="448" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#1d4ed8">2</text>
    <foreignObject x="884" y="408" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Plan: explicit step lists or implicit chain-of-thought reasoning inside the model</div>
    </foreignObject>
  </g>
  <g id="card-3">
    <rect class="card" x="792" y="504" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="552" r="24" fill="#ecfdf5" stroke="#86efac" stroke-width="1.5"/>
    <text x="836" y="560" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#15803d">3</text>
    <foreignObject x="884" y="520" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Reflect: critique output, verify facts, and refine before returning to the user</div>
    </foreignObject>
  </g>
  <g id="card-4">
    <rect class="card" x="792" y="616" width="1040" height="96" rx="20" stroke="#a5b4fc" stroke-width="1.5"/>
    <circle cx="836" cy="664" r="24" fill="#eef2ff" stroke="#a5b4fc" stroke-width="1.5"/>
    <text x="836" y="672" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#4338ca">4</text>
    <foreignObject x="884" y="632" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Production hybrid: structured planner plus flexible model execution for accuracy</div>
    </foreignObject>
  </g>

  <g opacity=".92">
    <rect x="1676" y="122" width="196" height="40" rx="20" fill="#111827"/>
    <circle cx="1702" cy="142" r="7" fill="#6366f1"/>
    <text x="1724" y="148" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="800" fill="#fff">loop mode</text>
  </g>
</svg>
