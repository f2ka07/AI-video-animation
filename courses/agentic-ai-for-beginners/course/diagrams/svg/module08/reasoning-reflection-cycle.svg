<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" width="1200" height="660">
  <defs><marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/></marker></defs>
  <g id="main">
    <rect width="1200" height="660" fill="#f8fafc"/>
    <text x="600" y="640" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" fill="#94a3b8">Robust agents loop until quality threshold is met</text>
  </g>

  <text x="600" y="80" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="600" fill="#64748b">Reasoning cycle: decompose, plan, act, reflect</text>

  <g id="section-1">
    <rect x="80" y="110" width="240" height="180" rx="16" fill="#7c3aed" stroke="#6d28d9" stroke-width="3"/>
    <text x="200" y="155" text-anchor="middle" font-family="system-ui,sans-serif" font-size="26" font-weight="700" fill="#ffffff">Decompose</text>
    <text x="200" y="185" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#ede9fe">Break goals into ordered subtasks</text>
  </g>

  <line x1="320" y1="200" x2="380" y2="200" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrow)"/>

  <g id="section-2">
    <rect x="380" y="110" width="240" height="180" rx="16" fill="#2563eb" stroke="#1d4ed8" stroke-width="3"/>
    <text x="500" y="155" text-anchor="middle" font-family="system-ui,sans-serif" font-size="26" font-weight="700" fill="#ffffff">Plan</text>
    <text x="500" y="185" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#dbeafe">Explicit lists or implicit reasoning</text>
  </g>

  <line x1="620" y1="200" x2="680" y2="200" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrow)"/>

  <g id="section-3">
    <rect x="680" y="110" width="240" height="180" rx="16" fill="#059669" stroke="#047857" stroke-width="3"/>
    <text x="800" y="155" text-anchor="middle" font-family="system-ui,sans-serif" font-size="26" font-weight="700" fill="#ffffff">Reflect</text>
    <text x="800" y="185" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#d1fae5">Critique, verify, refine output</text>
  </g>

  <path d="M920 300 C 960 380, 760 430, 600 460 C 440 430, 240 380, 200 300" fill="none" stroke="#64748b" stroke-width="3" stroke-dasharray="8,6"/>
  <polygon points="210,298 200,282 220,290" fill="#64748b"/>

  <g id="section-4">
    <rect x="420" y="440" width="360" height="150" rx="16" fill="#f1f5f9" stroke="#64748b" stroke-width="3"/>
    <text x="600" y="485" text-anchor="middle" font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#0f172a">Hybrid Production Loop</text>
    <text x="600" y="520" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#334155">Planner structure + flexible model execution</text>
  </g>
</svg>
