<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" width="1200" height="680">
  <defs><marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/></marker></defs>
  <g id="main">
    <rect width="1200" height="680" fill="#f8fafc"/>
    <text x="600" y="660" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" fill="#94a3b8">Right batch size depends on workload - not one global answer</text>
  </g>

  <text x="600" y="80" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="600" fill="#64748b">Agents multiply inference calls - GPUs favor parallel batches</text>

  <g id="section-1">
    <rect x="70" y="120" width="300" height="380" rx="16" fill="#ede9fe" stroke="#8b5cf6" stroke-width="3"/>
    <text x="220" y="175" text-anchor="middle" font-family="system-ui,sans-serif" font-size="26" font-weight="700" fill="#5b21b6">Agent load</text>
    <text x="220" y="215" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#334155">5-20 model calls</text>
    <text x="220" y="245" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#334155">per user turn</text>
    <text x="220" y="275" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#334155">Latency stacks fast</text>
  </g>

  <g id="section-2">
    <rect x="410" y="120" width="360" height="155" rx="16" fill="#2563eb" stroke="#1d4ed8" stroke-width="3"/>
    <text x="590" y="165" text-anchor="middle" font-family="system-ui,sans-serif" font-size="22" font-weight="700" fill="#ffffff">Low latency</text>
    <text x="590" y="195" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#dbeafe">Small batches</text>
    <text x="590" y="225" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#dbeafe">Real-time chat - every ms counts</text>
  </g>

  <text x="590" y="305" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="700" fill="#ffffff">Tradeoff</text>

  <g id="section-3">
    <rect x="410" y="325" width="360" height="155" rx="16" fill="#059669" stroke="#047857" stroke-width="3"/>
    <text x="590" y="370" text-anchor="middle" font-family="system-ui,sans-serif" font-size="22" font-weight="700" fill="#ffffff">High throughput</text>
    <text x="590" y="400" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#d1fae5">Large batches</text>
    <text x="590" y="430" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#d1fae5">Background jobs - cost per token</text>
  </g>

  <g id="section-4">
    <rect x="810" y="120" width="320" height="380" rx="16" fill="#f1f5f9" stroke="#64748b" stroke-width="3"/>
    <text x="970" y="175" text-anchor="middle" font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#0f172a">Measure first</text>
    <text x="970" y="215" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#334155">Baseline p50/p95</text>
    <text x="970" y="245" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#334155">Token cost per request</text>
    <text x="970" y="275" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#334155">Then optimize</text>
  </g>

  <line x1="370" y1="300" x2="410" y2="300" stroke="#cbd5e1" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="770" y1="300" x2="810" y2="300" stroke="#cbd5e1" stroke-width="3" marker-end="url(#arrow)"/>
</svg>
