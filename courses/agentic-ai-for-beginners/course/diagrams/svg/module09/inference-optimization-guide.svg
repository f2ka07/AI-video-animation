<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <defs><marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/></marker></defs>
  <g id="main">
    <rect width="1200" height="720" fill="#f8fafc"/>
    <text x="600" y="700" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" fill="#94a3b8">Turn one knob at a time - measure, compare, keep or revert</text>
  </g>

  <text x="600" y="90" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="600" fill="#64748b">Choose optimizations based on workload goals</text>

  <g id="section-1">
    <rect x="50" y="120" width="340" height="400" rx="16" fill="#dbeafe" stroke="#3b82f6" stroke-width="3"/>
    <text x="220" y="175" text-anchor="middle" font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#1e3a8a">Use batching when</text>
    <text x="220" y="215" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#334155">Throughput beats latency</text>
    <text x="220" y="245" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#334155">High-volume APIs</text>
    <text x="220" y="275" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#334155">Research pipelines</text>
  </g>

  <g id="section-2">
    <rect x="430" y="120" width="340" height="400" rx="16" fill="#d1fae5" stroke="#10b981" stroke-width="3"/>
    <text x="600" y="175" text-anchor="middle" font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#047857">Use concurrency when</text>
    <text x="600" y="215" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#334155">Multiple models active</text>
    <text x="600" y="245" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#334155">GPU under 80% util</text>
    <text x="600" y="275" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#334155">Many parallel users</text>
  </g>

  <g id="section-3">
    <rect x="810" y="120" width="340" height="400" rx="16" fill="#ede9fe" stroke="#8b5cf6" stroke-width="3"/>
    <text x="980" y="175" text-anchor="middle" font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#5b21b6">Use TensorRT when</text>
    <text x="980" y="215" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#334155">Latency-critical path</text>
    <text x="980" y="245" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#334155">Fixed production model</text>
    <text x="980" y="275" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#334155">Cost per token matters</text>
  </g>

  <g id="section-4">
    <rect x="200" y="550" width="800" height="100" rx="16" fill="#f1f5f9" stroke="#94a3b8" stroke-width="3"/>
    <text x="600" y="595" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="700" fill="#0f172a">Always compare against baseline after each change</text>
    <text x="600" y="625" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#334155">One knob at a time - measure before and after</text>
  </g>
</svg>
