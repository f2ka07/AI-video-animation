<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" role="img" aria-label="Triton and TensorRT production stack">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fee7"/>
      <stop offset=".55" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f0fdf4"/>
    </linearGradient>
    <linearGradient id="nvGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#86efac"/>
      <stop offset="1" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="slate" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#64748b"/>
      <stop offset="1" stop-color="#334155"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity=".1"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/>
    </marker>
    <style>
      .kicker{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:800;letter-spacing:.22em;fill:#15803d}
      .title{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:800;fill:#111827}
      .sub{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:500;fill:#6b7280}
      .panelTitle{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:20px;font-weight:800;fill:#334155}
      .panelSub{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:15px;font-weight:500;fill:#64748b}
      .layerTitle{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:15px;font-weight:800;fill:#ffffff}
      .layerBody{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:12px;font-weight:600;fill:#f8fafc}
      .flowLine{fill:none;stroke:#94a3b8;stroke-width:2.5;stroke-linecap:round}
      .card{fill:#ffffff;stroke:#bbf7d0;stroke-width:1.2;filter:url(#shadow)}
    </style>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <circle cx="1700" cy="880" r="240" fill="#22c55e" opacity=".05"/>
  <path d="M48 188 H1872" stroke="#e5e7eb" stroke-width="1"/>

  <text x="48" y="52" class="kicker" font-size="14">MODULE 09 - ARCHITECTURE</text>
  <text x="48" y="108" class="title" font-size="48">Triton and TensorRT in Production</text>
  <text x="48" y="152" class="sub" font-size="24">Dynamic batching, concurrent serving, and compiled model graphs</text>

  <g id="stack-panel">
    <rect x="72" y="220" width="640" height="780" rx="28" fill="#ffffff" stroke="#bbf7d0" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="112" y="278" class="panelTitle">SERVING STACK</text>
    <text x="112" y="308" class="panelSub">Triton serves - TensorRT optimizes the graph underneath</text>
  </g>

  <g id="stack-axis">
    <text x="96" y="348" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="700" fill="#64748b">Requests</text>
    <line x1="108" y1="364" x2="108" y2="756" stroke="#cbd5e1" stroke-width="2"/>
    <polygon points="108,766 103,756 113,756" fill="#cbd5e1"/>
    <text x="96" y="786" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="700" fill="#64748b">Silicon</text>
  </g>

  <g id="section-1">
    <rect x="148" y="340" width="508" height="64" rx="14" fill="url(#slate)" filter="url(#shadow)"/>
    <text x="402" y="368" text-anchor="middle" class="layerTitle">Incoming requests</text>
    <text x="402" y="388" text-anchor="middle" class="layerBody">Variable arrival rate from agent loops</text>
  </g>

  <path class="flowLine" d="M402 404 L402 428" marker-end="url(#arrow)"/>

  <g id="section-2">
    <rect x="148" y="432" width="248" height="88" rx="14" fill="url(#blue)" filter="url(#shadow)"/>
    <text x="272" y="464" text-anchor="middle" class="layerTitle">Triton batching</text>
    <text x="272" y="484" text-anchor="middle" class="layerBody">Dynamic batch queue</text>
    <text x="272" y="502" text-anchor="middle" class="layerBody">2-5x throughput</text>
  </g>

  <g id="section-3">
    <rect x="408" y="432" width="248" height="88" rx="14" fill="url(#teal)" filter="url(#shadow)"/>
    <text x="532" y="464" text-anchor="middle" class="layerTitle">Concurrency</text>
    <text x="532" y="484" text-anchor="middle" class="layerBody">Multi-model on GPU</text>
    <text x="532" y="502" text-anchor="middle" class="layerBody">Watch memory limits</text>
  </g>

  <path class="flowLine" d="M402 520 L402 544" marker-end="url(#arrow)"/>

  <g id="section-4">
    <rect x="148" y="548" width="508" height="88" rx="14" fill="url(#nvGreen)" filter="url(#shadow)"/>
    <text x="402" y="580" text-anchor="middle" class="layerTitle">TensorRT engine</text>
    <text x="402" y="600" text-anchor="middle" class="layerBody">Compiled execution graph - 20-40% lower latency</text>
    <text x="402" y="618" text-anchor="middle" class="layerBody">One-time compile cost</text>
  </g>

  <text x="392" y="720" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="600" fill="#475569">Triton manages serving mechanics; TensorRT compiles models for speed</text>

  <rect x="744" y="220" width="2" height="780" fill="#e5e7eb"/>

  <g id="card-1">
    <rect class="card" x="792" y="280" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="328" r="24" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="836" y="336" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#475569">1</text>
    <foreignObject x="884" y="296" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Triton manages serving mechanics - scheduling, health checks, and request routing</div>
    </foreignObject>
  </g>
  <g id="card-2">
    <rect class="card" x="792" y="392" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="440" r="24" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="836" y="448" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#1d4ed8">2</text>
    <foreignObject x="884" y="408" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Dynamic batching increases throughput - adds wait latency for batch fill</div>
    </foreignObject>
  </g>
  <g id="card-3">
    <rect class="card" x="792" y="504" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="552" r="24" fill="#ecfeff" stroke="#67e8f9" stroke-width="1.5"/>
    <text x="836" y="560" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#0e7490">3</text>
    <foreignObject x="884" y="520" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Concurrency across models and GPUs - scale when memory allows</div>
    </foreignObject>
  </g>
  <g id="card-4">
    <rect class="card" x="792" y="616" width="1040" height="96" rx="20" stroke="#86efac" stroke-width="1.5"/>
    <circle cx="836" cy="664" r="24" fill="#ecfdf5" stroke="#86efac" stroke-width="1.5"/>
    <text x="836" y="672" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#15803d">4</text>
    <foreignObject x="884" y="632" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">TensorRT compiles models for lower latency - one-time compile cost per model version</div>
    </foreignObject>
  </g>

  <g opacity=".92">
    <rect x="1664" y="122" width="216" height="40" rx="20" fill="#111827"/>
    <circle cx="1690" cy="142" r="7" fill="#22c55e"/>
    <text x="1712" y="148" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="800" fill="#fff">stack mode</text>
  </g>
</svg>
