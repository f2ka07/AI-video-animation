<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <defs><marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/></marker></defs>
  <g id="main">
    <rect width="1200" height="720" fill="#f8fafc"/>
    <text x="600" y="700" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" fill="#94a3b8">Triton serves - TensorRT optimizes the graph underneath</text>
  </g>
  
  <text x="600" y="90" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="600" fill="#64748b">Serving layer on top of optimized model graphs</text>
  <g id="section-1">
    <rect x="350" y="120" width="500" height="110" rx="16" fill="#64748b" stroke="#475569" stroke-width="3"/>
    <text x="600" y="156" text-anchor="middle" font-family="system-ui,sans-serif" font-size="22" font-weight="700" fill="#ffffff">Incoming requests</text>
    <text x="600" y="172" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#e2e8f0">Variable arrival rate from agent loops</text>
  </g>
  <line x1="600" y1="230" x2="600" y2="260" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrow)"/>
  <g id="section-2">
    <rect x="200" y="260" width="380" height="150" rx="16" fill="#3b82f6" stroke="#2563eb" stroke-width="3"/>
    <text x="390" y="296" text-anchor="middle" font-family="system-ui,sans-serif" font-size="22" font-weight="700" fill="#ffffff">Triton batching</text>
    <text x="390" y="312" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#dbeafe">Dynamic batch queue</text>
    <text x="390" y="338" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#dbeafe">2-5x throughput</text>
    <text x="390" y="364" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#dbeafe">Adds wait latency</text>
  </g>
  <g id="section-3">
    <rect x="620" y="260" width="380" height="150" rx="16" fill="#06b6d4" stroke="#0891b2" stroke-width="3"/>
    <text x="810" y="296" text-anchor="middle" font-family="system-ui,sans-serif" font-size="22" font-weight="700" fill="#ffffff">Concurrency</text>
    <text x="810" y="312" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#dbeafe">Multi-model on GPU</text>
    <text x="810" y="338" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#dbeafe">Scale across devices</text>
    <text x="810" y="364" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#dbeafe">Watch memory limits</text>
  </g>
  <line x1="600" y1="410" x2="600" y2="440" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrow)"/>
  <g id="section-4">
    <rect x="250" y="440" width="700" height="200" rx="16" fill="#10b981" stroke="#059669" stroke-width="3"/>
    <text x="600" y="476" text-anchor="middle" font-family="system-ui,sans-serif" font-size="26" font-weight="700" fill="#ffffff">TensorRT engine</text>
    <text x="600" y="492" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#d1fae5">Compiled execution graph</text>
    <text x="600" y="518" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#d1fae5">20-40% lower latency</text>
    <text x="600" y="544" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#d1fae5">One-time compile cost</text>
  </g>

</svg>
