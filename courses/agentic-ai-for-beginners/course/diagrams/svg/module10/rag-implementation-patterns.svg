<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" width="1200" height="660">
  <defs><marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/></marker></defs>
  <g id="main">
    <rect width="1200" height="660" fill="#f8fafc"/>
    <text x="600" y="640" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" fill="#94a3b8">Ground every factual claim in retrieved or tool-returned data</text>
  </g>

  <text x="600" y="80" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="600" fill="#64748b">From raw documents to cited, grounded answers</text>

  <g id="section-1">
    <rect x="80" y="120" width="300" height="170" rx="16" fill="#e2e8f0" stroke="#64748b" stroke-width="3"/>
    <text x="230" y="160" text-anchor="middle" font-family="system-ui,sans-serif" font-size="22" font-weight="700" fill="#0f172a">Extract</text>
    <text x="230" y="190" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#334155">PDF + web readers</text>
    <text x="230" y="220" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#334155">Strip boilerplate - preserve structure</text>
  </g>

  <line x1="380" y1="205" x2="420" y2="205" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrow)"/>

  <g id="section-2">
    <rect x="420" y="120" width="300" height="170" rx="16" fill="#7c3aed" stroke="#6d28d9" stroke-width="3"/>
    <text x="570" y="160" text-anchor="middle" font-family="system-ui,sans-serif" font-size="22" font-weight="700" fill="#ffffff">Chunk + embed</text>
    <text x="570" y="190" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#ede9fe">512 tokens + overlap</text>
    <text x="570" y="220" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#ede9fe">Store metadata - index in vector DB</text>
  </g>

  <line x1="720" y1="205" x2="760" y2="205" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrow)"/>

  <g id="section-3">
    <rect x="760" y="120" width="360" height="170" rx="16" fill="#2563eb" stroke="#1d4ed8" stroke-width="3"/>
    <text x="940" y="160" text-anchor="middle" font-family="system-ui,sans-serif" font-size="22" font-weight="700" fill="#ffffff">Retrieve + cite</text>
    <text x="940" y="190" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#dbeafe">Top-k with rerank</text>
    <text x="940" y="220" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#dbeafe">Format with sources - never invent citations</text>
  </g>

  <line x1="940" y1="290" x2="940" y2="330" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrow)"/>

  <g id="section-4">
    <rect x="300" y="330" width="600" height="200" rx="16" fill="#059669" stroke="#047857" stroke-width="3"/>
    <text x="600" y="375" text-anchor="middle" font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#ffffff">Validate + retry</text>
    <text x="600" y="410" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#d1fae5">Schema-check tool calls</text>
    <text x="600" y="440" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#d1fae5">Timeouts on external APIs - idempotent actions</text>
  </g>
</svg>
