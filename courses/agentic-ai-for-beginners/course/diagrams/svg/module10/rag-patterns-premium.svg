<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" role="img" aria-label="RAG implementation patterns">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eff6ff"/>
      <stop offset=".55" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity=".1"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/>
    </marker>
    <style>
      .kicker{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:800;letter-spacing:.22em;fill:#1d4ed8}
      .title{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:800;fill:#111827}
      .sub{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:500;fill:#6b7280}
      .panelTitle{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:20px;font-weight:800;fill:#334155}
      .panelSub{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:15px;font-weight:500;fill:#64748b}
      .stepTitle{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:14px;font-weight:800;fill:#ffffff}
      .stepBody{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:11px;font-weight:600;fill:#dbeafe}
      .flowLine{fill:none;stroke:#94a3b8;stroke-width:2.5;stroke-linecap:round}
      .card{fill:#ffffff;stroke:#bfdbfe;stroke-width:1.2;filter:url(#shadow)}
    </style>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <circle cx="120" cy="920" r="260" fill="#2563eb" opacity=".04"/>
  <path d="M48 188 H1872" stroke="#e5e7eb" stroke-width="1"/>

  <text x="48" y="52" class="kicker" font-size="14">MODULE 10 - APPLICATION</text>
  <text x="48" y="108" class="title" font-size="48">Building RAG from PDFs and Web</text>
  <text x="48" y="152" class="sub" font-size="24">Extraction, chunk overlap, citations, validation, and retries</text>

  <g id="diagram-panel">
    <rect x="72" y="220" width="640" height="780" rx="28" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="112" y="278" class="panelTitle">IMPLEMENTATION FLOW</text>
    <text x="112" y="308" class="panelSub">From raw documents to cited, grounded answers</text>
  </g>

  <g id="section-1">
    <rect x="118" y="360" width="120" height="72" rx="14" fill="#64748b" filter="url(#shadow)"/>
    <text x="178" y="388" text-anchor="middle" class="stepTitle">Extract</text>
    <text x="178" y="408" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="600" fill="#e2e8f0">PDF + web</text>
  </g>
  <path class="flowLine" d="M238 396 H268" marker-end="url(#arrow)"/>

  <g id="section-2">
    <rect x="272" y="360" width="120" height="72" rx="14" fill="#7c3aed" filter="url(#shadow)"/>
    <text x="332" y="388" text-anchor="middle" class="stepTitle">Chunk</text>
    <text x="332" y="408" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="600" fill="#ede9fe">512 + overlap</text>
  </g>
  <path class="flowLine" d="M392 396 H422" marker-end="url(#arrow)"/>

  <rect x="426" y="360" width="120" height="72" rx="14" fill="url(#blue)" filter="url(#shadow)"/>
  <text x="486" y="388" text-anchor="middle" class="stepTitle">Embed</text>
  <text x="486" y="408" text-anchor="middle" class="stepBody">Vector DB</text>
  <path class="flowLine" d="M546 396 H576" marker-end="url(#arrow)"/>

  <g id="section-3">
    <rect x="580" y="360" width="120" height="72" rx="14" fill="#1d4ed8" filter="url(#shadow)"/>
    <text x="640" y="388" text-anchor="middle" class="stepTitle">Retrieve</text>
    <text x="640" y="408" text-anchor="middle" class="stepBody">Top-k + cite</text>
  </g>

  <path class="flowLine" d="M640 432 V468" marker-end="url(#arrow)"/>

  <g id="section-4">
    <rect x="200" y="472" width="420" height="88" rx="16" fill="#059669" filter="url(#shadow)"/>
    <text x="410" y="508" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="800" fill="#ffffff">Validate + retry</text>
    <text x="410" y="532" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="600" fill="#d1fae5">Schema-check tool calls - timeouts - idempotent actions</text>
  </g>

  <rect x="100" y="600" width="584" height="160" rx="16" fill="#f8fafc" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="392" y="640" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="800" fill="#1d4ed8">CITATION FORMAT</text>
  <text x="392" y="668" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="600" fill="#334155">According to [Source 1]: ... According to [Source 2]: ...</text>
  <text x="392" y="694" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="600" fill="#64748b">Never let the model cite a source it did not receive</text>
  <text x="392" y="720" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="600" fill="#64748b">Ground every factual claim in retrieved or tool-returned data</text>

  <rect x="744" y="220" width="2" height="780" fill="#e5e7eb"/>

  <g id="card-1">
    <rect class="card" x="792" y="280" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="328" r="24" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="836" y="336" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#1d4ed8">1</text>
    <foreignObject x="884" y="296" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Extraction, chunk overlap, citations, validation, and retries - the full build pattern</div>
    </foreignObject>
  </g>
  <g id="card-2">
    <rect class="card" x="792" y="392" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="440" r="24" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="836" y="448" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#475569">2</text>
    <foreignObject x="884" y="408" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Extract and chunk PDF and web content - strip boilerplate, preserve structure</div>
    </foreignObject>
  </g>
  <g id="card-3">
    <rect class="card" x="792" y="504" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="552" r="24" fill="#eef2ff" stroke="#a5b4fc" stroke-width="1.5"/>
    <text x="836" y="560" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#4338ca">3</text>
    <foreignObject x="884" y="520" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Embed, search, and attach metadata - index in vector DB at query time</div>
    </foreignObject>
  </g>
  <g id="card-4">
    <rect class="card" x="792" y="616" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="664" r="24" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="836" y="672" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#1d4ed8">4</text>
    <foreignObject x="884" y="632" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Format prompts with verifiable citations - include source in every output</div>
    </foreignObject>
  </g>
  <g id="card-5">
    <rect class="card" x="792" y="728" width="1040" height="96" rx="20" stroke="#93c5fd" stroke-width="1.5"/>
    <circle cx="836" cy="776" r="24" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="836" y="784" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#1d4ed8">5</text>
    <foreignObject x="884" y="744" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Validate, retry, and handle tool errors - timeouts on external APIs</div>
    </foreignObject>
  </g>

  <g opacity=".92">
    <rect x="1664" y="122" width="196" height="40" rx="20" fill="#111827"/>
    <circle cx="1690" cy="142" r="7" fill="#2563eb"/>
    <text x="1712" y="148" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="800" fill="#fff">RAG mode</text>
  </g>
</svg>
