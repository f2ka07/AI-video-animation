<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" role="img" aria-label="Retrieval pipeline end to end">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eff6ff"/>
      <stop offset=".55" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="indigo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity=".1"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/>
    </marker>
    <style>
      .kicker{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:800;letter-spacing:.22em;fill:#1d4ed8}
      .title{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:800;fill:#111827}
      .sub{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:500;fill:#6b7280}
      .panelTitle{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:20px;font-weight:800;fill:#334155}
      .panelSub{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:15px;font-weight:500;fill:#64748b}
      .stageTitle{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:16px;font-weight:800;fill:#ffffff}
      .stageBody{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:13px;font-weight:600;fill:#dbeafe}
      .axis{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:13px;font-weight:700;fill:#64748b}
      .hint{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:13px;font-weight:600;fill:#64748b}
      .card{fill:#ffffff;stroke:#bfdbfe;stroke-width:1.2;filter:url(#shadow)}
    </style>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <circle cx="1700" cy="900" r="260" fill="#2563eb" opacity=".05"/>
  <circle cx="200" cy="200" r="200" fill="#3b82f6" opacity=".04"/>
  <path d="M48 188 H1872" stroke="#e5e7eb" stroke-width="1"/>

  <text x="48" y="52" class="kicker" font-size="14">MODULE 10 - CONCEPT</text>
  <text x="48" y="108" class="title" font-size="48">Retrieval Pipeline End to End</text>
  <text x="48" y="152" class="sub" font-size="24">Ingestion, chunking, embedding, search, and context injection</text>

  <g id="diagram-panel">
    <rect x="72" y="220" width="640" height="780" rx="28" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="112" y="278" class="panelTitle">RAG PIPELINE</text>
    <text x="112" y="308" class="panelSub">From raw documents to grounded agent context</text>
  </g>

  <g id="stack-axis">
    <text x="96" y="348" class="axis">Sources</text>
    <line x1="108" y1="364" x2="108" y2="900" stroke="#cbd5e1" stroke-width="2"/>
    <polygon points="108,910 103,900 113,900" fill="#cbd5e1"/>
    <text x="96" y="930" class="axis">Context</text>
  </g>

  <g id="section-1">
    <rect x="148" y="340" width="508" height="108" rx="16" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="180" y="378" class="stageTitle" fill="#0f172a">1. Ingest</text>
    <text x="180" y="400" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="600" fill="#334155">PDF / web extract - chunk with overlap - attach metadata</text>
    <text x="180" y="422" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="600" fill="#64748b">256-1024 tokens typical - source, date, document ID</text>
  </g>
  <path fill="none" stroke="#94a3b8" stroke-width="2" d="M402 448 V472" marker-end="url(#arrow)"/>

  <g id="section-2">
    <rect x="148" y="472" width="508" height="108" rx="16" fill="url(#indigo)" filter="url(#shadow)"/>
    <text x="180" y="510" class="stageTitle">2. Embed</text>
    <text x="180" y="532" class="stageBody">Semantic vectors - store in vector DB</text>
    <text x="180" y="554" class="stageBody">Similar meaning clusters - Pinecone, Weaviate, Chroma</text>
  </g>
  <path fill="none" stroke="#94a3b8" stroke-width="2" d="M402 580 V604" marker-end="url(#arrow)"/>

  <g id="section-3">
    <rect x="148" y="604" width="508" height="108" rx="16" fill="url(#blue)" filter="url(#shadow)"/>
    <text x="180" y="642" class="stageTitle">3. Search</text>
    <text x="180" y="664" class="stageBody">Top-k similarity - hybrid + rerank</text>
    <text x="180" y="686" class="stageBody">Return best chunks - filter by metadata</text>
  </g>
  <path fill="none" stroke="#94a3b8" stroke-width="2" d="M402 712 V736" marker-end="url(#arrow)"/>

  <g id="section-4">
    <rect x="148" y="736" width="508" height="108" rx="16" fill="#059669" filter="url(#shadow)"/>
    <text x="180" y="774" class="stageTitle">4. Inject</text>
    <text x="180" y="796" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="600" fill="#d1fae5">Format for prompt - cite every source - reduce hallucination</text>
    <text x="180" y="818" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="600" fill="#a7f3d0">Tunables: chunk size, top-k, reranker, freshness</text>
  </g>

  <rect x="744" y="220" width="2" height="780" fill="#e5e7eb"/>

  <g id="card-1">
    <rect class="card" x="792" y="280" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="328" r="24" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="836" y="336" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#1d4ed8">1</text>
    <foreignObject x="884" y="296" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Ingestion, chunking, embedding, search, and context injection - the full RAG pipeline</div>
    </foreignObject>
  </g>
  <g id="card-2">
    <rect class="card" x="792" y="392" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="440" r="24" fill="#eef2ff" stroke="#a5b4fc" stroke-width="1.5"/>
    <text x="836" y="448" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#4338ca">2</text>
    <foreignObject x="884" y="408" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Ingest and chunk source documents - attach metadata for filtering later</div>
    </foreignObject>
  </g>
  <g id="card-3">
    <rect class="card" x="792" y="504" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="552" r="24" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="836" y="560" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#1d4ed8">3</text>
    <foreignObject x="884" y="520" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Embed chunks into vector storage - semantic meaning enables similarity search</div>
    </foreignObject>
  </g>
  <g id="card-4">
    <rect class="card" x="792" y="616" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="664" r="24" fill="#eef2ff" stroke="#a5b4fc" stroke-width="1.5"/>
    <text x="836" y="672" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#4338ca">4</text>
    <foreignObject x="884" y="632" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Search with top-k and reranking - hybrid search improves recall</div>
    </foreignObject>
  </g>
  <g id="card-5">
    <rect class="card" x="792" y="728" width="1040" height="96" rx="20" stroke="#93c5fd" stroke-width="1.5"/>
    <circle cx="836" cy="776" r="24" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="836" y="784" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#1d4ed8">5</text>
    <foreignObject x="884" y="744" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Inject context and cite sources - ground responses in retrieved facts</div>
    </foreignObject>
  </g>

  <g opacity=".92">
    <rect x="1664" y="122" width="196" height="40" rx="20" fill="#111827"/>
    <circle cx="1690" cy="142" r="7" fill="#2563eb"/>
    <text x="1712" y="148" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="800" fill="#fff">RAG mode</text>
  </g>
</svg>
