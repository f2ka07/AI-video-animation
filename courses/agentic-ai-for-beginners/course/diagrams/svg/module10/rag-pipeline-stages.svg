<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <defs><marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/></marker></defs>
  <g id="main">
    <rect width="1200" height="720" fill="#f8fafc"/>
    <text x="600" y="700" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" fill="#94a3b8">Quality tunables: chunk size, top-k, reranker, freshness filters</text>
  </g>
  
  <text x="600" y="90" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="600" fill="#64748b">End-to-end retrieval pipeline for grounding agent responses</text>
  <g id="section-1">
    <rect x="40" y="200" width="250" height="360" rx="16" fill="#e2e8f0" stroke="#94a3b8" stroke-width="3"/>
    <text x="165" y="236" text-anchor="middle" font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#0f172a">Ingest</text>
    <text x="165" y="252" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#334155">PDF / web extract</text>
    <text x="165" y="278" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#334155">Chunk + overlap</text>
    <text x="165" y="304" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#334155">Attach metadata</text>
  </g>
  <line x1="290" y1="380" x2="320" y2="380" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrow)"/>
  <g id="section-2">
    <rect x="320" y="200" width="250" height="360" rx="16" fill="#8b5cf6" stroke="#7c3aed" stroke-width="3"/>
    <text x="445" y="236" text-anchor="middle" font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#ffffff">Embed</text>
    <text x="445" y="252" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#ede9fe">Semantic vectors</text>
    <text x="445" y="278" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#ede9fe">Store in vector DB</text>
    <text x="445" y="304" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#ede9fe">Similar meaning clusters</text>
  </g>
  <line x1="570" y1="380" x2="600" y2="380" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrow)"/>
  <g id="section-3">
    <rect x="600" y="200" width="250" height="360" rx="16" fill="#3b82f6" stroke="#2563eb" stroke-width="3"/>
    <text x="725" y="236" text-anchor="middle" font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#ffffff">Search</text>
    <text x="725" y="252" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#dbeafe">Top-k similarity</text>
    <text x="725" y="278" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#dbeafe">Hybrid + rerank</text>
    <text x="725" y="304" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#dbeafe">Return best chunks</text>
  </g>
  <line x1="850" y1="380" x2="880" y2="380" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrow)"/>
  <g id="section-4">
    <rect x="880" y="200" width="280" height="360" rx="16" fill="#10b981" stroke="#059669" stroke-width="3"/>
    <text x="1020" y="236" text-anchor="middle" font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#ffffff">Inject</text>
    <text x="1020" y="252" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#d1fae5">Format for prompt</text>
    <text x="1020" y="278" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#d1fae5">Cite every source</text>
    <text x="1020" y="304" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#d1fae5">Reduce hallucination</text>
  </g>

</svg>
