<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" role="img" aria-label="Retrieval vs tool calls">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eff6ff"/>
      <stop offset=".55" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity=".1"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/>
    </marker>
    <style>
      .kicker{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:800;letter-spacing:.22em;fill:#1d4ed8}
      .title{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:800;fill:#111827}
      .sub{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:500;fill:#6b7280}
      .panelTitle{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:20px;font-weight:800;fill:#334155}
      .panelSub{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:15px;font-weight:500;fill:#64748b}
      .boxTitle{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:18px;font-weight:800;fill:#ffffff}
      .boxBody{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:13px;font-weight:600;fill:#dbeafe}
      .boxBodyDark{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:13px;font-weight:600;fill:#334155}
      .card{fill:#ffffff;stroke:#bfdbfe;stroke-width:1.2;filter:url(#shadow)}
    </style>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <circle cx="1700" cy="180" r="220" fill="#2563eb" opacity=".06"/>
  <path d="M48 188 H1872" stroke="#e5e7eb" stroke-width="1"/>

  <text x="48" y="52" class="kicker" font-size="14">MODULE 10 - ARCHITECTURE</text>
  <text x="48" y="108" class="title" font-size="48">Retrieval vs Tool Calls</text>
  <text x="48" y="152" class="sub" font-size="24">Read-only knowledge search vs actions with side effects</text>

  <g id="diagram-panel">
    <rect x="72" y="220" width="640" height="780" rx="28" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="112" y="278" class="panelTitle">KNOWLEDGE VS ACTION</text>
    <text x="112" y="308" class="panelSub">Two ways agents connect to external systems</text>
  </g>

  <g id="section-1">
    <rect x="100" y="340" width="584" height="140" rx="18" fill="url(#blue)" filter="url(#shadow)"/>
    <text x="392" y="382" text-anchor="middle" class="boxTitle">Retrieval (read)</text>
    <text x="392" y="410" text-anchor="middle" class="boxBody">Search knowledge bases - semantic + keyword</text>
    <text x="392" y="434" text-anchor="middle" class="boxBody">No side effects - ground answers in documents</text>
  </g>

  <g id="section-2">
    <rect x="100" y="500" width="584" height="140" rx="18" fill="#d97706" filter="url(#shadow)"/>
    <text x="392" y="542" text-anchor="middle" class="boxTitle">Tool calls (act)</text>
    <text x="392" y="570" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="600" fill="#ffedd5">Live APIs and SQL - defined schemas - can change state</text>
    <text x="392" y="594" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="600" fill="#ffedd5">Execute with validated inputs</text>
  </g>

  <line x1="280" y1="480" x2="280" y2="500" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="504" y1="480" x2="504" y2="500" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="6,4"/>

  <g id="section-3">
    <rect x="100" y="660" width="584" height="100" rx="18" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="392" y="700" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#0f172a">Often both</text>
    <text x="392" y="728" text-anchor="middle" class="boxBodyDark">Retrieve policy context, then call refund API</text>
  </g>

  <g id="section-4">
    <rect x="100" y="780" width="584" height="100" rx="18" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="392" y="820" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#5b21b6">Schema enforcement</text>
    <text x="392" y="848" text-anchor="middle" class="boxBodyDark">Validate tool args and JSON outputs - reject hallucinated fields</text>
  </g>

  <text x="392" y="920" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="600" fill="#64748b">Retrieval grounds reasoning; tools execute with validated inputs</text>

  <rect x="744" y="220" width="2" height="780" fill="#e5e7eb"/>

  <g id="card-1">
    <rect class="card" x="792" y="280" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="328" r="24" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="836" y="336" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#1d4ed8">1</text>
    <foreignObject x="884" y="296" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Read-only knowledge search vs actions with side effects - know when to use each</div>
    </foreignObject>
  </g>
  <g id="card-2">
    <rect class="card" x="792" y="392" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="440" r="24" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="836" y="448" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#1d4ed8">2</text>
    <foreignObject x="884" y="408" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Retrieval for read-only knowledge search - policies, docs, error references</div>
    </foreignObject>
  </g>
  <g id="card-3">
    <rect class="card" x="792" y="504" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="552" r="24" fill="#fffbeb" stroke="#fcd34d" stroke-width="1.5"/>
    <text x="836" y="560" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#b45309">3</text>
    <foreignObject x="884" y="520" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Tools for actions and live data - APIs, SQL, email - require validation and retries</div>
    </foreignObject>
  </g>
  <g id="card-4">
    <rect class="card" x="792" y="616" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="664" r="24" fill="#eef2ff" stroke="#a5b4fc" stroke-width="1.5"/>
    <text x="836" y="672" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#4338ca">4</text>
    <foreignObject x="884" y="632" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Use both: retrieve context to ground reasoning, then call a tool to execute</div>
    </foreignObject>
  </g>
  <g id="card-5">
    <rect class="card" x="792" y="728" width="1040" height="96" rx="20" stroke="#93c5fd" stroke-width="1.5"/>
    <circle cx="836" cy="776" r="24" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="836" y="784" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#1d4ed8">5</text>
    <foreignObject x="884" y="744" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Enforce schemas on tool and JSON outputs - reject malformed requests</div>
    </foreignObject>
  </g>

  <g opacity=".92">
    <rect x="1664" y="122" width="196" height="40" rx="20" fill="#111827"/>
    <circle cx="1690" cy="142" r="7" fill="#2563eb"/>
    <text x="1712" y="148" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="800" fill="#fff">RAG mode</text>
  </g>
</svg>
