<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" width="1200" height="660">
  <defs><marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/></marker></defs>
  <g id="main">
    <rect width="1200" height="660" fill="#f8fafc"/>
    <text x="600" y="640" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" fill="#94a3b8">Retrieval grounds reasoning; tools execute with validated inputs</text>
  </g>

  <text x="600" y="80" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="600" fill="#64748b">Two ways agents connect to external knowledge and systems</text>

  <g id="section-1">
    <rect x="70" y="110" width="480" height="200" rx="16" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
    <text x="310" y="155" text-anchor="middle" font-family="system-ui,sans-serif" font-size="26" font-weight="700" fill="#1e3a8a">Retrieval (read)</text>
    <text x="310" y="190" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#334155">Search knowledge bases</text>
    <text x="310" y="220" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#334155">Semantic + keyword - no side effects</text>
    <text x="310" y="250" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#334155">Ground answers in documents</text>
  </g>

  <g id="section-2">
    <rect x="650" y="110" width="480" height="200" rx="16" fill="#fef3c7" stroke="#d97706" stroke-width="3"/>
    <text x="890" y="155" text-anchor="middle" font-family="system-ui,sans-serif" font-size="26" font-weight="700" fill="#78350f">Tool calls (act)</text>
    <text x="890" y="190" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#334155">Live APIs and SQL</text>
    <text x="890" y="220" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#334155">Defined schemas - can change state</text>
    <text x="890" y="250" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#334155">Execute with validated inputs</text>
  </g>

  <g id="section-3">
    <rect x="250" y="340" width="700" height="100" rx="16" fill="#f1f5f9" stroke="#64748b" stroke-width="3"/>
    <text x="600" y="380" text-anchor="middle" font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#0f172a">Often both</text>
    <text x="600" y="410" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#334155">Retrieve policy context, then call refund API</text>
  </g>

  <g id="section-4">
    <rect x="120" y="470" width="960" height="90" rx="14" fill="#ede9fe" stroke="#7c3aed" stroke-width="3"/>
    <text x="600" y="510" text-anchor="middle" font-family="system-ui,sans-serif" font-size="22" font-weight="700" fill="#5b21b6">Schema enforcement</text>
    <text x="600" y="540" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#334155">Validate tool args and JSON outputs - reject hallucinated fields</text>
  </g>

  <line x1="550" y1="310" x2="550" y2="340" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="650" y1="310" x2="650" y2="340" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="6,4"/>
</svg>
