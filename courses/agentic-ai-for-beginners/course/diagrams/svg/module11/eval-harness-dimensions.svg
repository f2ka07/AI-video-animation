<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs><marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/></marker></defs>
  <g id="main">
    <rect width="1200" height="600" fill="#f8fafc"/>
  </g>

  <text x="600" y="72" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="600" fill="#475569">Four dimensions every agent eval harness should score</text>

  <g id="section-1">
    <rect x="80" y="100" width="500" height="175" rx="16" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
    <text x="330" y="145" text-anchor="middle" font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#1e3a8a">Correctness</text>
    <text x="330" y="175" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#1d4ed8">Right answer for the task</text>
    <text x="330" y="205" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#1d4ed8">Model-as-judge or rules - block bad deploys</text>
  </g>

  <g id="section-2">
    <rect x="620" y="100" width="500" height="175" rx="16" fill="#ede9fe" stroke="#7c3aed" stroke-width="3"/>
    <text x="870" y="145" text-anchor="middle" font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#5b21b6">Structure</text>
    <text x="870" y="175" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#6d28d9">Valid JSON / schema - required fields present</text>
    <text x="870" y="205" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#6d28d9">Parse failures fail CI</text>
  </g>

  <g id="section-3">
    <rect x="80" y="295" width="500" height="175" rx="16" fill="#d1fae5" stroke="#059669" stroke-width="3"/>
    <text x="330" y="340" text-anchor="middle" font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#047857">Grounding</text>
    <text x="330" y="370" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#059669">Claims in retrieved context</text>
    <text x="330" y="400" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#059669">Citation verification - catch hallucinations</text>
  </g>

  <g id="section-4">
    <rect x="620" y="295" width="500" height="175" rx="16" fill="#fef3c7" stroke="#d97706" stroke-width="3"/>
    <text x="870" y="340" text-anchor="middle" font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#78350f">Regression</text>
    <text x="870" y="370" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#92400e">Same test set every release</text>
    <text x="870" y="400" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#92400e">Compare before vs after - fail build on drop</text>
  </g>

  <rect x="120" y="500" width="960" height="72" rx="12" fill="#e2e8f0" stroke="#64748b" stroke-width="3"/>
  <text x="600" y="542" text-anchor="middle" font-family="system-ui,sans-serif" font-size="19" font-weight="600" fill="#1e293b">Automate eval in CI - agents drift without continuous measurement</text>
</svg>
