<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" role="img" aria-label="Evaluation harness dimensions">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset=".55" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity=".1"/>
    </filter>
    <style>
      .kicker{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:800;letter-spacing:.22em;fill:#475569}
      .title{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:800;fill:#111827}
      .sub{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:500;fill:#6b7280}
      .panelTitle{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:20px;font-weight:800;fill:#334155}
      .panelSub{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:15px;font-weight:500;fill:#64748b}
      .dimTitle{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:16px;font-weight:800;fill:#ffffff}
      .dimBody{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:12px;font-weight:600;fill:#e2e8f0}
      .card{fill:#ffffff;stroke:#cbd5e1;stroke-width:1.2;filter:url(#shadow)}
    </style>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <circle cx="1700" cy="900" r="260" fill="#64748b" opacity=".05"/>
  <path d="M48 188 H1872" stroke="#e5e7eb" stroke-width="1"/>

  <text x="48" y="52" class="kicker" font-size="14">MODULE 11 - CONCEPT</text>
  <text x="48" y="108" class="title" font-size="48">Evaluation Harness Dimensions</text>
  <text x="48" y="152" class="sub" font-size="24">Correctness, structure, grounding, and regression testing</text>

  <g id="diagram-panel">
    <rect x="72" y="220" width="640" height="780" rx="28" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="112" y="278" class="panelTitle">EVAL HARNESS</text>
    <text x="112" y="308" class="panelSub">Four dimensions every agent eval should score</text>
  </g>

  <g id="section-1">
    <rect x="108" y="340" width="268" height="120" rx="16" fill="#334155" filter="url(#shadow)"/>
    <text x="242" y="382" text-anchor="middle" class="dimTitle">Correctness</text>
    <text x="242" y="408" text-anchor="middle" class="dimBody">Right answer for the task</text>
    <text x="242" y="430" text-anchor="middle" class="dimBody">Model-as-judge or rules</text>
  </g>

  <g id="section-2">
    <rect x="408" y="340" width="268" height="120" rx="16" fill="#475569" filter="url(#shadow)"/>
    <text x="542" y="382" text-anchor="middle" class="dimTitle">Structure</text>
    <text x="542" y="408" text-anchor="middle" class="dimBody">Valid JSON / schema</text>
    <text x="542" y="430" text-anchor="middle" class="dimBody">Parse failures fail CI</text>
  </g>

  <g id="section-3">
    <rect x="108" y="480" width="268" height="120" rx="16" fill="#64748b" filter="url(#shadow)"/>
    <text x="242" y="522" text-anchor="middle" class="dimTitle">Grounding</text>
    <text x="242" y="548" text-anchor="middle" class="dimBody">Claims in retrieved context</text>
    <text x="242" y="570" text-anchor="middle" class="dimBody">Citation verification</text>
  </g>

  <g id="section-4">
    <rect x="408" y="480" width="268" height="120" rx="16" fill="#94a3b8" filter="url(#shadow)"/>
    <text x="542" y="522" text-anchor="middle" class="dimTitle">Regression</text>
    <text x="542" y="548" text-anchor="middle" class="dimBody">Same test set every release</text>
    <text x="542" y="570" text-anchor="middle" class="dimBody">Fail build on score drop</text>
  </g>

  <rect x="108" y="640" width="568" height="72" rx="14" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="392" y="682" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="700" fill="#334155">Automate eval in CI - agents drift without continuous measurement</text>

  <rect x="108" y="740" width="568" height="200" rx="16" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="392" y="780" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="800" fill="#475569">SCORING LOOP</text>
  <text x="392" y="812" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="600" fill="#64748b">Run agent on test cases - capture output - score each dimension</text>
  <text x="392" y="840" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="600" fill="#64748b">Block deploys that regress - compare before vs after every change</text>
  <text x="392" y="868" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="600" fill="#64748b">Every PR triggers the harness - fail the build on regression</text>

  <rect x="744" y="220" width="2" height="780" fill="#e5e7eb"/>

  <g id="card-1">
    <rect class="card" x="792" y="280" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="328" r="24" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="836" y="336" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#475569">1</text>
    <foreignObject x="884" y="296" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Correctness, structure, grounding, and regression testing - four eval dimensions</div>
    </foreignObject>
  </g>
  <g id="card-2">
    <rect class="card" x="792" y="392" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="440" r="24" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="836" y="448" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#334155">2</text>
    <foreignObject x="884" y="408" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Score correctness of agent outputs - model-as-judge or rule-based checks</div>
    </foreignObject>
  </g>
  <g id="card-3">
    <rect class="card" x="792" y="504" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="552" r="24" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="836" y="560" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#475569">3</text>
    <foreignObject x="884" y="520" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Validate structure and schema - valid JSON, required fields present</div>
    </foreignObject>
  </g>
  <g id="card-4">
    <rect class="card" x="792" y="616" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="664" r="24" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="836" y="672" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#64748b">4</text>
    <foreignObject x="884" y="632" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Check grounding against retrieved context - catch hallucinations via citations</div>
    </foreignObject>
  </g>
  <g id="card-5">
    <rect class="card" x="792" y="728" width="1040" height="96" rx="20" stroke="#94a3b8" stroke-width="1.5"/>
    <circle cx="836" cy="776" r="24" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="836" y="784" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#475569">5</text>
    <foreignObject x="884" y="744" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Block releases that regress scores - run the same test set before and after</div>
    </foreignObject>
  </g>

  <g opacity=".92">
    <rect x="1624" y="122" width="256" height="40" rx="20" fill="#111827"/>
    <circle cx="1650" cy="142" r="7" fill="#64748b"/>
    <text x="1672" y="148" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="800" fill="#fff">monitoring mode</text>
  </g>
</svg>
