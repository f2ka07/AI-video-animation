<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" width="1200" height="660">
  <defs><marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/></marker></defs>
  <g id="main">
    <rect width="1200" height="660" fill="#f8fafc"/>
    <text x="600" y="640" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" fill="#64748b">When users report a bad answer, traces show exactly where it broke</text>
  </g>

  <text x="600" y="80" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="600" fill="#475569">Operational playbook for eval and observability</text>

  <g id="section-1">
    <rect x="40" y="120" width="255" height="380" rx="16" fill="#7c3aed" stroke="#6d28d9" stroke-width="3"/>
    <text x="167" y="175" text-anchor="middle" font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#ffffff">Harness</text>
    <text x="167" y="215" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#ede9fe">Curated test cases</text>
    <text x="167" y="245" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#ede9fe">Auto-score each dimension</text>
    <text x="167" y="275" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#ede9fe">Run on every PR</text>
  </g>

  <line x1="295" y1="310" x2="325" y2="310" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrow)"/>

  <g id="section-2">
    <rect x="325" y="120" width="255" height="380" rx="16" fill="#2563eb" stroke="#1d4ed8" stroke-width="3"/>
    <text x="452" y="175" text-anchor="middle" font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#ffffff">Metrics</text>
    <text x="452" y="215" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#dbeafe">Emit to Prometheus</text>
    <text x="452" y="245" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#dbeafe">Steps per request</text>
    <text x="452" y="275" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#dbeafe">Tool error rate</text>
  </g>

  <line x1="580" y1="310" x2="610" y2="310" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrow)"/>

  <g id="section-3">
    <rect x="610" y="120" width="255" height="380" rx="16" fill="#d97706" stroke="#b45309" stroke-width="3"/>
    <text x="737" y="175" text-anchor="middle" font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#ffffff">Alerts</text>
    <text x="737" y="215" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#ffedd5">p95 latency breach</text>
    <text x="737" y="245" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#ffedd5">Cost budget exceeded</text>
    <text x="737" y="275" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#ffedd5">Error rate jump</text>
  </g>

  <line x1="865" y1="310" x2="895" y2="310" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrow)"/>

  <g id="section-4">
    <rect x="895" y="120" width="265" height="380" rx="16" fill="#059669" stroke="#047857" stroke-width="3"/>
    <text x="1027" y="175" text-anchor="middle" font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#ffffff">Diagnose</text>
    <text x="1027" y="215" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#d1fae5">Follow trace to root cause</text>
    <text x="1027" y="245" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#d1fae5">Which step failed?</text>
    <text x="1027" y="275" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#d1fae5">Fix that layer</text>
  </g>
</svg>
