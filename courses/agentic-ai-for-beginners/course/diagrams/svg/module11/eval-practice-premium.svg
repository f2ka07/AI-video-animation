<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" role="img" aria-label="Eval and monitoring practice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset=".55" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity=".1"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/>
    </marker>
    <style>
      .kicker{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:800;letter-spacing:.22em;fill:#475569}
      .title{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:800;fill:#111827}
      .sub{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:500;fill:#6b7280}
      .panelTitle{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:20px;font-weight:800;fill:#334155}
      .panelSub{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:15px;font-weight:500;fill:#64748b}
      .stepTitle{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:14px;font-weight:800;fill:#ffffff}
      .stepBody{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:11px;font-weight:600;fill:#e2e8f0}
      .flowLine{fill:none;stroke:#94a3b8;stroke-width:2.5;stroke-linecap:round}
      .card{fill:#ffffff;stroke:#cbd5e1;stroke-width:1.2;filter:url(#shadow)}
    </style>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <circle cx="120" cy="920" r="260" fill="#64748b" opacity=".04"/>
  <path d="M48 188 H1872" stroke="#e5e7eb" stroke-width="1"/>

  <text x="48" y="52" class="kicker" font-size="14">MODULE 11 - APPLICATION</text>
  <text x="48" y="108" class="title" font-size="48">Implementing Eval and Observability</text>
  <text x="48" y="152" class="sub" font-size="24">Automated harnesses, dashboards, alerts, and trace-based diagnosis</text>

  <g id="diagram-panel">
    <rect x="72" y="220" width="640" height="780" rx="28" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="112" y="278" class="panelTitle">OPERATIONAL PLAYBOOK</text>
    <text x="112" y="308" class="panelSub">Eval and observability in production</text>
  </g>

  <g id="section-1">
    <rect x="108" y="380" width="120" height="200" rx="16" fill="#334155" filter="url(#shadow)"/>
    <text x="168" y="430" text-anchor="middle" class="stepTitle">Harness</text>
    <text x="168" y="458" text-anchor="middle" class="stepBody">Test cases</text>
    <text x="168" y="478" text-anchor="middle" class="stepBody">Auto-score</text>
    <text x="168" y="498" text-anchor="middle" class="stepBody">Every PR</text>
  </g>
  <path class="flowLine" d="M228 480 H258" marker-end="url(#arrow)"/>

  <g id="section-2">
    <rect x="262" y="380" width="120" height="200" rx="16" fill="#475569" filter="url(#shadow)"/>
    <text x="322" y="430" text-anchor="middle" class="stepTitle">Metrics</text>
    <text x="322" y="458" text-anchor="middle" class="stepBody">Prometheus</text>
    <text x="322" y="478" text-anchor="middle" class="stepBody">Steps / req</text>
    <text x="322" y="498" text-anchor="middle" class="stepBody">Error rate</text>
  </g>
  <path class="flowLine" d="M382 480 H412" marker-end="url(#arrow)"/>

  <g id="section-3">
    <rect x="416" y="380" width="120" height="200" rx="16" fill="#64748b" filter="url(#shadow)"/>
    <text x="476" y="430" text-anchor="middle" class="stepTitle">Alerts</text>
    <text x="476" y="458" text-anchor="middle" class="stepBody">p95 breach</text>
    <text x="476" y="478" text-anchor="middle" class="stepBody">Cost limit</text>
    <text x="476" y="498" text-anchor="middle" class="stepBody">Error jump</text>
  </g>
  <path class="flowLine" d="M536 480 H566" marker-end="url(#arrow)"/>

  <g id="section-4">
    <rect x="570" y="380" width="120" height="200" rx="16" fill="#94a3b8" filter="url(#shadow)"/>
    <text x="630" y="430" text-anchor="middle" class="stepTitle">Diagnose</text>
    <text x="630" y="458" text-anchor="middle" class="stepBody">Follow trace</text>
    <text x="630" y="478" text-anchor="middle" class="stepBody">Root cause</text>
    <text x="630" y="498" text-anchor="middle" class="stepBody">Fix layer</text>
  </g>

  <rect x="108" y="620" width="582" height="160" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="399" y="660" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="800" fill="#475569">WHEN USERS REPORT A BAD ANSWER</text>
  <text x="399" y="690" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="600" fill="#64748b">Find the request - follow the trace - which step failed?</text>
  <text x="399" y="716" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="600" fill="#64748b">Bad plan? Tool timeout? Irrelevant retrieval? Model hallucination?</text>
  <text x="399" y="742" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="600" fill="#64748b">Traces tell you where it broke - design for observability from day one</text>

  <rect x="744" y="220" width="2" height="780" fill="#e5e7eb"/>

  <g id="card-1">
    <rect class="card" x="792" y="280" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="328" r="24" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="836" y="336" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#475569">1</text>
    <foreignObject x="884" y="296" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Automated harnesses, dashboards, alerts, and trace-based diagnosis</div>
    </foreignObject>
  </g>
  <g id="card-2">
    <rect class="card" x="792" y="392" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="440" r="24" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="836" y="448" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#334155">2</text>
    <foreignObject x="884" y="408" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Build automated evaluation in CI - curated test cases, auto-score each dimension</div>
    </foreignObject>
  </g>
  <g id="card-3">
    <rect class="card" x="792" y="504" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="552" r="24" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="836" y="560" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#475569">3</text>
    <foreignObject x="884" y="520" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Emit metrics to dashboards - request count, latency, token count, error rate</div>
    </foreignObject>
  </g>
  <g id="card-4">
    <rect class="card" x="792" y="616" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="664" r="24" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="836" y="672" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#64748b">4</text>
    <foreignObject x="884" y="632" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Alert on latency and error spikes - p95 breach, cost budget exceeded</div>
    </foreignObject>
  </g>
  <g id="card-5">
    <rect class="card" x="792" y="728" width="1040" height="96" rx="20" stroke="#94a3b8" stroke-width="1.5"/>
    <circle cx="836" cy="776" r="24" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="836" y="784" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#475569">5</text>
    <foreignObject x="884" y="744" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Diagnose failures with traces - find which step broke and fix that layer</div>
    </foreignObject>
  </g>

  <g opacity=".92">
    <rect x="1624" y="122" width="256" height="40" rx="20" fill="#111827"/>
    <circle cx="1650" cy="142" r="7" fill="#64748b"/>
    <text x="1672" y="148" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="800" fill="#fff">monitoring mode</text>
  </g>
</svg>
