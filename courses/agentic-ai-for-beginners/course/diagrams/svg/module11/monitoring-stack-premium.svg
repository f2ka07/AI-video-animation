<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" role="img" aria-label="Production monitoring stack">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset=".55" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0f172a" flood-opacity=".1"/>
    </filter>
    <style>
      .kicker{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:800;letter-spacing:.22em;fill:#475569}
      .title{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:800;fill:#111827}
      .sub{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:500;fill:#6b7280}
      .stageTitle{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:15px;font-weight:800;fill:#ffffff}
      .stageBody{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:12px;font-weight:600;fill:#e2e8f0}
      .axis{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:13px;font-weight:700;fill:#64748b}
      .card{fill:#ffffff;stroke:#cbd5e1;stroke-width:1.2;filter:url(#shadow)}
    </style>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <circle cx="1700" cy="900" r="240" fill="#64748b" opacity=".05"/>
  <path d="M48 188 H1872" stroke="#e5e7eb" stroke-width="1"/>

  <text x="48" y="52" class="kicker" font-size="14">MODULE 11 - ARCHITECTURE</text>
  <text x="48" y="108" class="title" font-size="48">Production Monitoring Stack</text>
  <text x="48" y="152" class="sub" font-size="24">Latency, cost, stability, and distributed tracing</text>

  <g id="stack-panel">
    <rect x="72" y="220" width="640" height="780" rx="28" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="112" y="278" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="800" fill="#334155">OBSERVABILITY STACK</text>
    <text x="112" y="308" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="500" fill="#64748b">Production signals for agentic workloads</text>
  </g>

  <g id="stack-axis">
    <text x="96" y="348" class="axis">Request</text>
    <line x1="108" y1="364" x2="108" y2="880" stroke="#cbd5e1" stroke-width="2"/>
    <polygon points="108,890 103,880 113,880" fill="#cbd5e1"/>
    <text x="96" y="910" class="axis">Insight</text>
  </g>

  <g id="section-1">
    <rect x="148" y="340" width="508" height="108" rx="14" fill="#334155" filter="url(#shadow)"/>
    <text x="180" y="378" class="stageTitle">Latency</text>
    <text x="180" y="400" class="stageBody">p50 / p95 / p99 - variable step count - alert on spikes</text>
    <text x="180" y="420" class="stageBody">End-to-end request timing through the agent loop</text>
  </g>

  <g id="section-2">
    <rect x="148" y="460" width="508" height="108" rx="14" fill="#475569" filter="url(#shadow)"/>
    <text x="180" y="498" class="stageTitle">Cost</text>
    <text x="180" y="520" class="stageBody">Tokens per request - budget thresholds - loop overruns</text>
    <text x="180" y="540" class="stageBody">Track cost per user - alert when trending over</text>
  </g>

  <g id="section-3">
    <rect x="148" y="580" width="508" height="108" rx="14" fill="#64748b" filter="url(#shadow)"/>
    <text x="180" y="618" class="stageTitle">Stability</text>
    <text x="180" y="640" class="stageBody">Same input - same output? Detect config drift</text>
    <text x="180" y="660" class="stageBody">Model update impact - output change detection</text>
  </g>

  <g id="section-4">
    <rect x="148" y="700" width="508" height="108" rx="14" fill="#94a3b8" filter="url(#shadow)"/>
    <text x="180" y="738" class="stageTitle">Tracing</text>
    <text x="180" y="760" class="stageBody">Trace ID per request - plan, tool, observe steps</text>
    <text x="180" y="780" class="stageBody">Reconstruct failures - follow request through pipeline</text>
  </g>

  <rect x="148" y="840" width="508" height="48" rx="12" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="402" y="870" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="700" fill="#334155">Dashboard + alerts: latency spike, error rate, cost overrun</text>

  <rect x="744" y="220" width="2" height="780" fill="#e5e7eb"/>

  <g id="card-1">
    <rect class="card" x="792" y="280" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="328" r="24" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="836" y="336" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#475569">1</text>
    <foreignObject x="884" y="296" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Latency, cost, stability, and distributed tracing - four production signals</div>
    </foreignObject>
  </g>
  <g id="card-2">
    <rect class="card" x="792" y="392" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="440" r="24" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="836" y="448" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#334155">2</text>
    <foreignObject x="884" y="408" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Track latency percentiles end to end - p95 spikes indicate problems</div>
    </foreignObject>
  </g>
  <g id="card-3">
    <rect class="card" x="792" y="504" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="552" r="24" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="836" y="560" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#475569">3</text>
    <foreignObject x="884" y="520" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Log token cost per request and user - set budgets and alert on overruns</div>
    </foreignObject>
  </g>
  <g id="card-4">
    <rect class="card" x="792" y="616" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="664" r="24" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="836" y="672" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#64748b">4</text>
    <foreignObject x="884" y="632" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Detect output stability drift - same input should produce consistent output</div>
    </foreignObject>
  </g>
  <g id="card-5">
    <rect class="card" x="792" y="728" width="1040" height="96" rx="20" stroke="#94a3b8" stroke-width="1.5"/>
    <circle cx="836" cy="776" r="24" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="836" y="784" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#475569">5</text>
    <foreignObject x="884" y="744" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Trace IDs through the agent loop - reconstruct failures step by step</div>
    </foreignObject>
  </g>

  <g opacity=".92">
    <rect x="1624" y="122" width="256" height="40" rx="20" fill="#111827"/>
    <circle cx="1650" cy="142" r="7" fill="#64748b"/>
    <text x="1672" y="148" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="800" fill="#fff">monitoring mode</text>
  </g>
</svg>
