<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs><marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/></marker></defs>
  <g id="main">
    <rect width="1200" height="600" fill="#f8fafc"/>
  </g>

  <text x="600" y="72" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="600" fill="#475569">Production signals for agentic workloads</text>

  <g id="section-1">
    <rect x="60" y="100" width="520" height="165" rx="16" fill="#2563eb" stroke="#1d4ed8" stroke-width="3"/>
    <text x="320" y="140" text-anchor="middle" font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#ffffff">Latency</text>
    <text x="320" y="170" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#dbeafe">p50 / p95 / p99 - variable step count</text>
    <text x="320" y="200" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#dbeafe">Alert on spikes</text>
  </g>

  <g id="section-2">
    <rect x="620" y="100" width="520" height="165" rx="16" fill="#d97706" stroke="#b45309" stroke-width="3"/>
    <text x="880" y="140" text-anchor="middle" font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#ffffff">Cost</text>
    <text x="880" y="170" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#ffedd5">Tokens per request - budget thresholds</text>
    <text x="880" y="200" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#ffedd5">Loop-driven overruns</text>
  </g>

  <g id="section-3">
    <rect x="60" y="285" width="520" height="165" rx="16" fill="#059669" stroke="#047857" stroke-width="3"/>
    <text x="320" y="325" text-anchor="middle" font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#ffffff">Stability</text>
    <text x="320" y="355" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#d1fae5">Same input - same output?</text>
    <text x="320" y="385" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#d1fae5">Detect config drift and model update impact</text>
  </g>

  <g id="section-4">
    <rect x="620" y="285" width="520" height="165" rx="16" fill="#7c3aed" stroke="#6d28d9" stroke-width="3"/>
    <text x="880" y="325" text-anchor="middle" font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#ffffff">Tracing</text>
    <text x="880" y="355" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#ede9fe">Trace ID per request</text>
    <text x="880" y="385" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#ede9fe">Plan, tool, observe steps - reconstruct failures</text>
  </g>

  <rect x="120" y="480" width="960" height="72" rx="12" fill="#e2e8f0" stroke="#64748b" stroke-width="3"/>
  <text x="600" y="522" text-anchor="middle" font-family="system-ui,sans-serif" font-size="19" font-weight="600" fill="#1e293b">Dashboard + alerts: latency spike, error rate, cost overrun</text>
</svg>
