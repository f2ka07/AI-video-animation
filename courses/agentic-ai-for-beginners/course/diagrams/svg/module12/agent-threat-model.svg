<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720">
  <defs><marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/></marker></defs>
  <g id="main">
    <rect width="1200" height="720" fill="#f8fafc"/>
    <text x="600" y="700" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" fill="#94a3b8">Safety is load-bearing - not a launch-week afterthought</text>
  </g>

  <text x="600" y="90" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="600" fill="#64748b">Threats to autonomous agents in production</text>

  <g id="section-1">
    <rect x="70" y="130" width="340" height="340" rx="16" fill="#fecaca" stroke="#ef4444" stroke-width="3"/>
    <text x="240" y="185" text-anchor="middle" font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#991b1b">Prompt injection</text>
    <text x="240" y="225" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#334155">Malicious instructions</text>
    <text x="240" y="255" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#334155">hidden in user input</text>
    <text x="240" y="285" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#334155">Treat input as data only</text>
  </g>

  <g id="section-2">
    <rect x="430" y="130" width="340" height="340" rx="16" fill="#fed7aa" stroke="#f97316" stroke-width="3"/>
    <text x="600" y="185" text-anchor="middle" font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#9a3412">Misuse</text>
    <text x="600" y="225" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#334155">Harmful outputs</text>
    <text x="600" y="255" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#334155">Unauthorized tools</text>
    <text x="600" y="285" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#334155">Rate limits + policy</text>
  </g>

  <g id="section-3">
    <rect x="790" y="130" width="340" height="340" rx="16" fill="#dbeafe" stroke="#3b82f6" stroke-width="3"/>
    <text x="960" y="185" text-anchor="middle" font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#1e3a8a">Human oversight</text>
    <text x="960" y="225" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#334155">Approve high-stakes acts</text>
    <text x="960" y="255" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#334155">Escalation workflows</text>
    <text x="960" y="285" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#334155">Accountability</text>
  </g>

  <g id="section-4">
    <rect x="200" y="500" width="800" height="120" rx="16" fill="#f1f5f9" stroke="#64748b" stroke-width="3"/>
    <text x="600" y="550" text-anchor="middle" font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#0f172a">Defense in depth</text>
    <text x="600" y="585" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#334155">Sanitize input, filter output, separate system prompts from user content</text>
  </g>
</svg>
