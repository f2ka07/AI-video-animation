<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" role="img" aria-label="Compliance design patterns">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fef2f2"/>
      <stop offset=".55" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fff1f2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity=".1"/>
    </filter>
    <style>
      .kicker{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:800;letter-spacing:.22em;fill:#991b1b}
      .title{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:800;fill:#111827}
      .sub{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:500;fill:#6b7280}
      .panelTitle{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:20px;font-weight:800;fill:#334155}
      .panelSub{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:15px;font-weight:500;fill:#64748b}
      .patternTitle{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:16px;font-weight:800;fill:#ffffff}
      .patternBody{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:12px;font-weight:600;fill:#fecaca}
      .patternBodyDark{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:12px;font-weight:600;fill:#334155}
      .card{fill:#ffffff;stroke:#fecaca;stroke-width:1.2;filter:url(#shadow)}
    </style>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <circle cx="120" cy="920" r="260" fill="#ef4444" opacity=".04"/>
  <path d="M48 188 H1872" stroke="#e5e7eb" stroke-width="1"/>

  <text x="48" y="52" class="kicker" font-size="14">MODULE 12 - APPLICATION</text>
  <text x="48" y="108" class="title" font-size="48">Designing for Compliance</text>
  <text x="48" y="152" class="sub" font-size="24">Industry requirements, data handling, privacy, and approval workflows</text>

  <g id="diagram-panel">
    <rect x="72" y="220" width="640" height="780" rx="28" fill="#ffffff" stroke="#fecaca" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="112" y="278" class="panelTitle">COMPLIANCE PATTERNS</text>
    <text x="112" y="308" class="panelSub">Design agents for regulated enterprise environments</text>
  </g>

  <g id="section-1">
    <rect x="108" y="340" width="268" height="140" rx="16" fill="#2563eb" filter="url(#shadow)"/>
    <text x="242" y="382" text-anchor="middle" class="patternTitle">Regulatory map</text>
    <text x="242" y="408" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="600" fill="#dbeafe">HIPAA, GDPR, SOX</text>
    <text x="242" y="430" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="600" fill="#dbeafe">Industry rules, data residency</text>
  </g>

  <g id="section-2">
    <rect x="408" y="340" width="268" height="140" rx="16" fill="#7c3aed" filter="url(#shadow)"/>
    <text x="542" y="382" text-anchor="middle" class="patternTitle">Data handling</text>
    <text x="542" y="408" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="600" fill="#ede9fe">Mask sensitive fields</text>
    <text x="542" y="430" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="600" fill="#ede9fe">Authorized models, retention</text>
  </g>

  <g id="section-3">
    <rect x="108" y="500" width="268" height="140" rx="16" fill="#059669" filter="url(#shadow)"/>
    <text x="242" y="542" text-anchor="middle" class="patternTitle">Approval paths</text>
    <text x="242" y="568" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="600" fill="#d1fae5">High-stakes routing</text>
    <text x="242" y="590" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="600" fill="#d1fae5">Escalation SLAs, training</text>
  </g>

  <g id="section-4">
    <rect x="408" y="500" width="268" height="140" rx="16" fill="#d97706" filter="url(#shadow)"/>
    <text x="542" y="542" text-anchor="middle" class="patternTitle">Privacy</text>
    <text x="542" y="568" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="600" fill="#ffedd5">Consent and opt-out</text>
    <text x="542" y="590" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="600" fill="#ffedd5">Honor deletion requests</text>
  </g>

  <rect x="108" y="680" width="568" height="240" rx="16" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
  <text x="392" y="720" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="800" fill="#991b1b">COMPLIANCE IS ARCHITECTURE</text>
  <text x="392" y="752" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="600" fill="#64748b">Healthcare: HIPAA data handling and audit logs</text>
  <text x="392" y="778" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="600" fill="#64748b">Finance: SOX controls, human oversight on high-stakes actions</text>
  <text x="392" y="804" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="600" fill="#64748b">EU: GDPR consent, deletion, data residency requirements</text>
  <text x="392" y="830" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="600" fill="#64748b">Build safety and transparency in from day one</text>
  <text x="392" y="856" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="600" fill="#64748b">Privacy is user trust - not just a checkbox after launch</text>

  <rect x="744" y="220" width="2" height="780" fill="#e5e7eb"/>

  <g id="card-1">
    <rect class="card" x="792" y="280" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="328" r="24" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
    <text x="836" y="336" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#991b1b">1</text>
    <foreignObject x="884" y="296" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Industry requirements, data handling, privacy, and approval workflows</div>
    </foreignObject>
  </g>
  <g id="card-2">
    <rect class="card" x="792" y="392" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="440" r="24" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="836" y="448" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#1d4ed8">2</text>
    <foreignObject x="884" y="408" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Map industry compliance requirements - HIPAA, GDPR, SOX, data residency</div>
    </foreignObject>
  </g>
  <g id="card-3">
    <rect class="card" x="792" y="504" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="552" r="24" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1.5"/>
    <text x="836" y="560" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#6d28d9">3</text>
    <foreignObject x="884" y="520" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Control sensitive data flows - mask fields, authorized models, retention policy</div>
    </foreignObject>
  </g>
  <g id="card-4">
    <rect class="card" x="792" y="616" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="664" r="24" fill="#ecfdf5" stroke="#86efac" stroke-width="1.5"/>
    <text x="836" y="672" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#15803d">4</text>
    <foreignObject x="884" y="632" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Approval paths for high-stakes actions - escalation SLAs and reviewer training</div>
    </foreignObject>
  </g>
  <g id="card-5">
    <rect class="card" x="792" y="728" width="1040" height="96" rx="20" stroke="#fca5a5" stroke-width="1.5"/>
    <circle cx="836" cy="776" r="24" fill="#fffbeb" stroke="#fcd34d" stroke-width="1.5"/>
    <text x="836" y="784" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#b45309">5</text>
    <foreignObject x="884" y="744" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Privacy practices users can trust - consent, opt-out, honor deletion requests</div>
    </foreignObject>
  </g>

  <g opacity=".92">
    <rect x="1664" y="122" width="196" height="40" rx="20" fill="#111827"/>
    <circle cx="1690" cy="142" r="7" fill="#ef4444"/>
    <text x="1712" y="148" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="800" fill="#fff">safety mode</text>
  </g>
</svg>
