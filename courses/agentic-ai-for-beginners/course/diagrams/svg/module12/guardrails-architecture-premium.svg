<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" role="img" aria-label="Safety guardrails architecture">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fef2f2"/>
      <stop offset=".55" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fff1f2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity=".1"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/>
    </marker>
    <style>
      .kicker{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:800;letter-spacing:.22em;fill:#991b1b}
      .title{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:800;fill:#111827}
      .sub{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:500;fill:#6b7280}
      .panelTitle{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:20px;font-weight:800;fill:#334155}
      .panelSub{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:15px;font-weight:500;fill:#64748b}
      .gateTitle{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:14px;font-weight:800;fill:#ffffff}
      .gateBody{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:11px;font-weight:600;fill:#fecaca}
      .flowLine{fill:none;stroke:#94a3b8;stroke-width:2.5;stroke-linecap:round}
      .card{fill:#ffffff;stroke:#fecaca;stroke-width:1.2;filter:url(#shadow)}
    </style>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <circle cx="1700" cy="180" r="220" fill="#ef4444" opacity=".06"/>
  <path d="M48 188 H1872" stroke="#e5e7eb" stroke-width="1"/>

  <text x="48" y="52" class="kicker" font-size="14">MODULE 12 - ARCHITECTURE</text>
  <text x="48" y="108" class="title" font-size="48">Safety Architecture Patterns</text>
  <text x="48" y="152" class="sub" font-size="24">Approval gates, policy filters, audit logs, and transparency</text>

  <g id="diagram-panel">
    <rect x="72" y="220" width="640" height="780" rx="28" fill="#ffffff" stroke="#fecaca" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="112" y="278" class="panelTitle">GUARDRAIL LAYERS</text>
    <text x="112" y="308" class="panelSub">Safety layers around the agent control loop</text>
  </g>

  <rect x="108" y="400" width="80" height="80" rx="12" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="148" y="448" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="700" fill="#0f172a">User</text>
  <path class="flowLine" d="M188 440 H228" marker-end="url(#arrow)"/>

  <g id="section-1">
    <rect x="232" y="410" width="120" height="60" rx="14" fill="#2563eb" filter="url(#shadow)"/>
    <text x="292" y="436" text-anchor="middle" class="gateTitle">HITL gate</text>
    <text x="292" y="454" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="600" fill="#dbeafe">Pause risky</text>
  </g>
  <path class="flowLine" d="M352 440 H392" marker-end="url(#arrow)"/>

  <rect x="396" y="410" width="100" height="60" rx="14" fill="#7c3aed" filter="url(#shadow)"/>
  <text x="446" y="436" text-anchor="middle" class="gateTitle">Agent</text>
  <text x="446" y="454" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="600" fill="#ede9fe">Plan / act</text>
  <path class="flowLine" d="M496 440 H536" marker-end="url(#arrow)"/>

  <g id="section-2">
    <rect x="540" y="410" width="120" height="60" rx="14" fill="#dc2626" filter="url(#shadow)"/>
    <text x="600" y="436" text-anchor="middle" class="gateTitle">Filter</text>
    <text x="600" y="454" text-anchor="middle" class="gateBody">Block harmful</text>
  </g>

  <path class="flowLine" d="M600 470 V510" marker-end="url(#arrow)"/>

  <g id="section-3">
    <rect x="180" y="520" width="220" height="88" rx="16" fill="#d97706" filter="url(#shadow)"/>
    <text x="290" y="554" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="800" fill="#ffffff">Audit trail</text>
    <text x="290" y="578" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="600" fill="#ffedd5">Immutable log - who approved what</text>
  </g>

  <g id="section-4">
    <rect x="420" y="520" width="220" height="88" rx="16" fill="#059669" filter="url(#shadow)"/>
    <text x="530" y="554" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="800" fill="#ffffff">Transparency</text>
    <text x="530" y="578" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="600" fill="#d1fae5">Disclose AI - show sources</text>
  </g>

  <rect x="108" y="640" width="568" height="280" rx="16" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
  <text x="392" y="680" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="800" fill="#991b1b">APPROVAL WORKFLOW</text>
  <text x="392" y="712" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="600" fill="#64748b">Agent proposes action - pause - present to human</text>
  <text x="392" y="738" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="600" fill="#64748b">Sync wait or async queue - auto-approve low-risk, escalate high-risk</text>
  <text x="392" y="764" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="600" fill="#64748b">Nothing high-stakes executes without a logged approval path</text>
  <text x="392" y="790" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="600" fill="#64748b">Filter at output boundary - PII redaction, policy check</text>

  <rect x="744" y="220" width="2" height="780" fill="#e5e7eb"/>

  <g id="card-1">
    <rect class="card" x="792" y="280" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="328" r="24" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
    <text x="836" y="336" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#991b1b">1</text>
    <foreignObject x="884" y="296" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Approval gates, policy filters, audit logs, and transparency - four safety layers</div>
    </foreignObject>
  </g>
  <g id="card-2">
    <rect class="card" x="792" y="392" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="440" r="24" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="836" y="448" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#1d4ed8">2</text>
    <foreignObject x="884" y="408" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Approval workflow for sensitive actions - human-in-the-loop before execution</div>
    </foreignObject>
  </g>
  <g id="card-3">
    <rect class="card" x="792" y="504" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="552" r="24" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
    <text x="836" y="560" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#dc2626">3</text>
    <foreignObject x="884" y="520" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Output safety policy filter - block harmful content, PII leakage, policy violations</div>
    </foreignObject>
  </g>
  <g id="card-4">
    <rect class="card" x="792" y="616" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="664" r="24" fill="#fffbeb" stroke="#fcd34d" stroke-width="1.5"/>
    <text x="836" y="672" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#b45309">4</text>
    <foreignObject x="884" y="632" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Append-only audit trail - timestamp, user, outcome - compliance evidence</div>
    </foreignObject>
  </g>
  <g id="card-5">
    <rect class="card" x="792" y="728" width="1040" height="96" rx="20" stroke="#fca5a5" stroke-width="1.5"/>
    <circle cx="836" cy="776" r="24" fill="#ecfdf5" stroke="#86efac" stroke-width="1.5"/>
    <text x="836" y="784" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#15803d">5</text>
    <foreignObject x="884" y="744" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Transparency and traceability to users - disclose AI involvement, show sources</div>
    </foreignObject>
  </g>

  <g opacity=".92">
    <rect x="1664" y="122" width="196" height="40" rx="20" fill="#111827"/>
    <circle cx="1690" cy="142" r="7" fill="#ef4444"/>
    <text x="1712" y="148" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="800" fill="#fff">safety mode</text>
  </g>
</svg>
