<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" width="1200" height="660">
  <defs><marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/></marker></defs>
  <g id="main">
    <rect width="1200" height="660" fill="#f8fafc"/>
    <text x="600" y="640" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" fill="#94a3b8">Nothing high-stakes executes without a logged approval path</text>
  </g>

  <text x="600" y="80" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="600" fill="#64748b">Safety layers around the agent control loop</text>

  <rect x="80" y="200" width="140" height="200" rx="12" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2"/>
  <text x="150" y="305" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="600" fill="#0f172a">User</text>

  <line x1="220" y1="300" x2="280" y2="300" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrow)"/>

  <g id="section-1">
    <rect x="280" y="230" width="200" height="140" rx="16" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
    <text x="380" y="270" text-anchor="middle" font-family="system-ui,sans-serif" font-size="22" font-weight="700" fill="#1e3a8a">HITL gate</text>
    <text x="380" y="300" text-anchor="middle" font-family="system-ui,sans-serif" font-size="17" fill="#334155">Pause risky actions</text>
    <text x="380" y="325" text-anchor="middle" font-family="system-ui,sans-serif" font-size="17" fill="#334155">Human approves</text>
    <text x="380" y="350" text-anchor="middle" font-family="system-ui,sans-serif" font-size="17" fill="#334155">Sync or async queue</text>
  </g>

  <line x1="480" y1="300" x2="530" y2="300" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="530" y="250" width="160" height="100" rx="16" fill="#7c3aed" stroke="#6d28d9" stroke-width="3"/>
  <text x="610" y="290" text-anchor="middle" font-family="system-ui,sans-serif" font-size="22" font-weight="700" fill="#ffffff">Agent</text>
  <text x="610" y="320" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" fill="#ede9fe">Plan / act / observe</text>

  <line x1="690" y1="300" x2="740" y2="300" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrow)"/>

  <g id="section-2">
    <rect x="740" y="230" width="200" height="140" rx="16" fill="#fee2e2" stroke="#dc2626" stroke-width="3"/>
    <text x="840" y="270" text-anchor="middle" font-family="system-ui,sans-serif" font-size="22" font-weight="700" fill="#991b1b">Safety filter</text>
    <text x="840" y="300" text-anchor="middle" font-family="system-ui,sans-serif" font-size="17" fill="#334155">Block harmful output</text>
    <text x="840" y="325" text-anchor="middle" font-family="system-ui,sans-serif" font-size="17" fill="#334155">PII redaction</text>
    <text x="840" y="350" text-anchor="middle" font-family="system-ui,sans-serif" font-size="17" fill="#334155">Policy check</text>
  </g>

  <line x1="840" y1="370" x2="840" y2="410" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrow)"/>

  <g id="section-3">
    <rect x="280" y="420" width="340" height="130" rx="16" fill="#fef3c7" stroke="#d97706" stroke-width="3"/>
    <text x="450" y="460" text-anchor="middle" font-family="system-ui,sans-serif" font-size="22" font-weight="700" fill="#78350f">Audit trail</text>
    <text x="450" y="490" text-anchor="middle" font-family="system-ui,sans-serif" font-size="17" fill="#334155">Immutable action log</text>
    <text x="450" y="515" text-anchor="middle" font-family="system-ui,sans-serif" font-size="17" fill="#334155">Who approved what - compliance evidence</text>
  </g>

  <g id="section-4">
    <rect x="660" y="420" width="340" height="130" rx="16" fill="#d1fae5" stroke="#059669" stroke-width="3"/>
    <text x="830" y="460" text-anchor="middle" font-family="system-ui,sans-serif" font-size="22" font-weight="700" fill="#047857">Transparency</text>
    <text x="830" y="490" text-anchor="middle" font-family="system-ui,sans-serif" font-size="17" fill="#334155">Disclose AI involvement</text>
    <text x="830" y="515" text-anchor="middle" font-family="system-ui,sans-serif" font-size="17" fill="#334155">Show sources used - build user trust</text>
  </g>
</svg>
