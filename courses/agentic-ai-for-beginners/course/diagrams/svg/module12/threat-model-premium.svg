<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" role="img" aria-label="Agent threat model">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fef2f2"/>
      <stop offset=".55" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fff1f2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity=".1"/>
    </filter>
    <style>
      .kicker{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:800;letter-spacing:.22em;fill:#991b1b}
      .title{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:800;fill:#111827}
      .sub{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:500;fill:#6b7280}
      .panelTitle{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:20px;font-weight:800;fill:#334155}
      .panelSub{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:15px;font-weight:500;fill:#64748b}
      .threatTitle{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:16px;font-weight:800;fill:#ffffff}
      .threatBody{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:12px;font-weight:600;fill:#fecaca}
      .threatBodyDark{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:12px;font-weight:600;fill:#334155}
      .card{fill:#ffffff;stroke:#fecaca;stroke-width:1.2;filter:url(#shadow)}
    </style>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <circle cx="1700" cy="900" r="260" fill="#ef4444" opacity=".05"/>
  <path d="M48 188 H1872" stroke="#e5e7eb" stroke-width="1"/>

  <text x="48" y="52" class="kicker" font-size="14">MODULE 12 - CONCEPT</text>
  <text x="48" y="108" class="title" font-size="48">Agent Threat Model</text>
  <text x="48" y="152" class="sub" font-size="24">Prompt injection, misuse, and why human oversight is the backstop</text>

  <g id="diagram-panel">
    <rect x="72" y="220" width="640" height="780" rx="28" fill="#ffffff" stroke="#fecaca" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="112" y="278" class="panelTitle">THREAT LANDSCAPE</text>
    <text x="112" y="308" class="panelSub">Threats to autonomous agents in production</text>
  </g>

  <g id="section-1">
    <rect x="108" y="340" width="180" height="200" rx="16" fill="#dc2626" filter="url(#shadow)"/>
    <text x="198" y="390" text-anchor="middle" class="threatTitle">Injection</text>
    <text x="198" y="418" text-anchor="middle" class="threatBody">Malicious instructions</text>
    <text x="198" y="440" text-anchor="middle" class="threatBody">Hidden in input</text>
    <text x="198" y="462" text-anchor="middle" class="threatBody">Treat as data only</text>
  </g>

  <g id="section-2">
    <rect x="302" y="340" width="180" height="200" rx="16" fill="#ea580c" filter="url(#shadow)"/>
    <text x="392" y="390" text-anchor="middle" class="threatTitle">Misuse</text>
    <text x="392" y="418" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="600" fill="#ffedd5">Harmful outputs</text>
    <text x="392" y="440" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="600" fill="#ffedd5">Unauthorized tools</text>
    <text x="392" y="462" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="600" fill="#ffedd5">Rate limits + policy</text>
  </g>

  <g id="section-3">
    <rect x="496" y="340" width="180" height="200" rx="16" fill="#b91c1c" filter="url(#shadow)"/>
    <text x="586" y="390" text-anchor="middle" class="threatTitle">Human</text>
    <text x="586" y="412" text-anchor="middle" class="threatTitle">oversight</text>
    <text x="586" y="440" text-anchor="middle" class="threatBody">Approve high-stakes</text>
    <text x="586" y="462" text-anchor="middle" class="threatBody">Escalation paths</text>
  </g>

  <g id="section-4">
    <rect x="108" y="560" width="568" height="120" rx="16" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="392" y="604" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#0f172a">Defense in depth</text>
    <text x="392" y="632" text-anchor="middle" class="threatBodyDark">Sanitize input, filter output, separate system prompts from user content</text>
    <text x="392" y="654" text-anchor="middle" class="threatBodyDark">Safety is load-bearing - not a launch-week afterthought</text>
  </g>

  <rect x="108" y="720" width="568" height="200" rx="16" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
  <text x="392" y="760" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="800" fill="#991b1b">ATTACK SURFACE</text>
  <text x="392" y="792" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="600" fill="#64748b">User input, retrieved documents, tool responses</text>
  <text x="392" y="818" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="600" fill="#64748b">Never trust user input as executable instructions</text>
  <text x="392" y="844" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="600" fill="#64748b">Layer defenses at input and output boundaries</text>

  <rect x="744" y="220" width="2" height="780" fill="#e5e7eb"/>

  <g id="card-1">
    <rect class="card" x="792" y="280" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="328" r="24" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
    <text x="836" y="336" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#991b1b">1</text>
    <foreignObject x="884" y="296" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Prompt injection, misuse, and why human oversight is the backstop</div>
    </foreignObject>
  </g>
  <g id="card-2">
    <rect class="card" x="792" y="392" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="440" r="24" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
    <text x="836" y="448" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#dc2626">2</text>
    <foreignObject x="884" y="408" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Prompt injection manipulates agent behavior - treat user input as data only</div>
    </foreignObject>
  </g>
  <g id="card-3">
    <rect class="card" x="792" y="504" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="552" r="24" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
    <text x="836" y="560" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#c2410c">3</text>
    <foreignObject x="884" y="520" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Misuse and harmful agent actions - content filters, policy checks, rate limits</div>
    </foreignObject>
  </g>
  <g id="card-4">
    <rect class="card" x="792" y="616" width="1040" height="96" rx="20"/>
    <circle cx="836" cy="664" r="24" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
    <text x="836" y="672" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#991b1b">4</text>
    <foreignObject x="884" y="632" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Human oversight for high-stakes decisions - approval and escalation workflows</div>
    </foreignObject>
  </g>
  <g id="card-5">
    <rect class="card" x="792" y="728" width="1040" height="96" rx="20" stroke="#fca5a5" stroke-width="1.5"/>
    <circle cx="836" cy="776" r="24" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
    <text x="836" y="784" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#dc2626">5</text>
    <foreignObject x="884" y="744" width="920" height="64">
      <div xmlns="http://www.w3.org/1999/xhtml" style="font-family:Inter,Segoe UI,Arial,sans-serif;font-size:22px;font-weight:650;color:#1e293b;line-height:1.35;margin:0;">Layer defenses at input and output - sanitize, filter, separate instructions from data</div>
    </foreignObject>
  </g>

  <g opacity=".92">
    <rect x="1664" y="122" width="196" height="40" rx="20" fill="#111827"/>
    <circle cx="1690" cy="142" r="7" fill="#ef4444"/>
    <text x="1712" y="148" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="800" fill="#fff">safety mode</text>
  </g>
</svg>
