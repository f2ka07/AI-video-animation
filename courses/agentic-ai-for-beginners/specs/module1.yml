MODULE 01 SPEC

name: The Agentic AI Transition

id: module01
title: The Agentic AI Transition
runtime_target: 12-15m
script_length: 1000-1500 words (slightly shorter than other modules)
layout: cinematic_intro -> concept -> architecture -> application -> exam_mapping -> recap
voice: Hybrid (cinematic intro V2, instructional body V1)
role_signaling: integrated
ssml_required: yes
deliverables:
  - narration_script
  - narration_ssml
  - diagrams_svg
  - remotion_scenes
  - mp4_export
  - repurposed_outputs

concept_scope:
  - frame the shift from prompting to agentic systems
  - define the limitations of single-call LLM usage
  - introduce agentic systems as production architecture

architecture_scope:
  - describe the structural components:
    - planning
    - tools
    - memory
    - safety loops
    - HITL
  - emphasize “agents are pipelines, not characters”

application_scope:
  - connect transition to enterprise workloads
  - connect to adoption drivers: reliability, traceability, integration

exam_mapping:
  - understanding the industry transition
  - architectural shift awareness
  - vocabulary alignment for certification

required_diagrams:
  - direct-prompting-vs-agentic.svg
  - agentic-architecture-high-level.svg
  - enterprise-adoption-drivers.svg

recap_keypoints:
  - prompting was UI
  - agents are architecture
  - enterprises need pipelines
  - NVIDIA is formalizing the role