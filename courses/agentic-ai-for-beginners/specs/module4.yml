id: module04
title: Workloads & Inference Pipelines
runtime_target: 15m
script_length: 1400-1800 words
layout: cinematic_intro -> concept -> architecture -> application -> exam_mapping -> recap
voice: Hybrid
ssml_required: yes
deliverables:
  - narration_script
  - narration_ssml
  - diagrams_svg
  - remotion_scenes
  - mp4_export
  - repurposed_outputs

concept_scope:
  - define "workload" in AI context (continuous, multi-step, retrievable, auditable)
  - contrast demos vs production workloads
  - introduce inference pipeline as core abstraction

architecture_scope:
  pipeline_components:
    - request intake
    - retrieval
    - grounding
    - planning
    - model inference
    - tool execution
    - memory update
    - safety/policy
    - HITL (optional)
    - output + evaluation
  - pipeline constraints:
    - latency vs accuracy vs cost
    - deterministic vs probabilistic outputs
    - integration surfaces (APIs, SDKs, NIM)

application_scope:
  - agentic workloads examples:
    - knowledge automation
    - analytics
    - ops & customer support
    - document workflows
    - research
  - emphasize enterprise need for:
    - traceability
    - reproducibility
    - metrics

role_signaling:
  engineers:
    - consider batching, caching, retries, timeouts, token cost, throughput
  technical_leaders:
    - consider adoption, integration friction, risk, alignment to business use cases

exam_mapping:
  - pipeline understanding
  - inference path understanding
  - retrieval/grounding awareness
  - workload vs one-off invocation distinction

required_diagrams:
  - inference-pipeline-full.svg
    nodes:
      - intake -> retrieval -> planning -> model -> tool -> memory -> safety -> hitl -> output
  - workload-matrix.svg
    rows:
      - support, analytics, docs, research, etc.
    cols:
      - traceability, cost, latency, integration
  - pipeline-constraints-triangle.svg
    axes:
      - latency vs accuracy vs cost

recap_keypoints:
  - demos are single calls
  - workloads are pipelines
  - agentic AI is pipeline-native
