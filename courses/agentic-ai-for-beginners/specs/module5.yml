id: module05
title: Deployment & Integration Models
runtime_target: 15m
script_length: 1400-1800 words
layout: cinematic_intro -> concept -> architecture -> application -> exam_mapping -> recap
voice: Hybrid
ssml_required: yes
deliverables:
  - narration_script
  - narration_ssml
  - diagrams_svg
  - remotion_scenes
  - mp4_export
  - repurposed_outputs

concept_scope:
  - define deployment models for agentic systems
  - define integration surfaces and obligations
  - make "AI system" feel real not speculative

architecture_scope:
  deployment_models:
    - SaaS (vendor-hosted)
    - cloud GPU rental
    - enterprise on-prem
    - hybrid
    - edge (light mention)
  integration_surfaces:
    - API integrations
    - tool interfaces
    - data connectors
    - policy gateways
  operational_concerns:
    - maintenance
    - updates
    - SLAs
    - monitoring
    - evaluation

application_scope:
  business drivers for each deployment:
    - SaaS = velocity
    - cloud = flexibility
    - on-prem = compliance & sovereignty
    - edge = latency & autonomy
  enterprise blockers:
    - procurement friction
    - compliance
    - safety alignment
    - integration debt

role_signaling:
  engineers:
    - think in SLAs, uptime, observability, GPUs, scaling
  technical_leaders:
    - think in vendor contracts, compliance, data residency, operations

exam_mapping:
  - deployment model recognition
  - integration surfaces
  - alignment of workloads to deployment choice

required_diagrams:
  - deployment-decision-matrix.svg
    axes:
      - latency vs control vs cost
  - integration-surfaces.svg
    elements:
      - API
      - data connectors
      - policy
      - tools
  - ops-lifecycle.svg
    cycle:
      - deploy -> monitor -> evaluate -> refine -> update

recap_keypoints:
  - agentic AI must be deployed
  - deployment choices reflect constraints
  - integration is where systems become real
