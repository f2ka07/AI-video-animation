<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 640" role="img" aria-label="MCP Architecture">
  <rect width="720" height="640" fill="#0b1f33"/>
  <circle cx="620" cy="80" r="120" fill="#049FD9" opacity="0.07"/>
  <circle cx="90" cy="560" r="130" fill="#6CC04A" opacity="0.06"/>
  <g id="viz-main">
    <rect x="24" y="24" width="672" height="592" rx="24" fill="#0b1728" stroke="#203a56" stroke-width="1.5"/>
    
    <text x="48" y="52" fill="#049FD9" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="800" letter-spacing="0.14em">ARCHITECTURE</text>
    <text x="48" y="74" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="800">Host · server · tools · transport</text>
    
    <g id="viz-client"><rect x="60" y="160" width="160" height="80" rx="12" fill="#081827" stroke="#12b5e5" stroke-width="2"/>
      <text x="140" y="195" fill="#12b5e5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="700" text-anchor="middle">LLM client</text>
      <text x="140" y="218" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" text-anchor="middle">orchestrator</text></g>
    <line x1="220" y1="200" x2="280" y2="200" stroke="#049FD9" stroke-width="3" stroke-linecap="round"/>
    <g id="viz-mcp"><rect x="280" y="150" width="160" height="100" rx="12" fill="#0b2237" stroke="#6CC04A" stroke-width="2"/>
      <text x="360" y="188" fill="#6CC04A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="800" text-anchor="middle">MCP server</text>
      <text x="360" y="212" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" text-anchor="middle">tool registry</text></g>
    <line x1="440" y1="200" x2="500" y2="200" stroke="#049FD9" stroke-width="3" stroke-linecap="round"/>
    <g id="viz-tools"><rect x="500" y="160" width="160" height="80" rx="12" fill="#081827" stroke="#f59e0b" stroke-width="2"/>
      <text x="580" y="195" fill="#f59e0b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="700" text-anchor="middle">Network tools</text>
      <text x="580" y="218" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" text-anchor="middle">read-only first</text></g>
    <text x="360" y="300" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">stdio in lab · HTTP in production</text>
  </g>
</svg>
