<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 640" role="img" aria-label="From MCP Tools to Conversational Agent">
  <rect width="720" height="640" fill="#0b1f33"/>
  <circle cx="620" cy="80" r="120" fill="#049FD9" opacity="0.07"/>
  <circle cx="90" cy="560" r="130" fill="#6CC04A" opacity="0.06"/>
  <g id="viz-main">
    <rect x="24" y="24" width="672" height="592" rx="24" fill="#0b1728" stroke="#203a56" stroke-width="1.5"/>
    
    
    <text x="48" y="52" fill="#049FD9" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="800" letter-spacing="0.14em">BRIDGE</text>
    <text x="48" y="74" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="800">From MCP Tools to Conversational Agent</text>
    <g id="viz-from">
      <rect x="48" y="110" width="200" height="100" rx="14" fill="#112115" stroke="#6CC04A" stroke-width="2"/>
      <text x="148" y="148" fill="#6CC04A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="800" text-anchor="middle">MCP tools live</text>
      <text x="148" y="172" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" text-anchor="middle">list_vlans works</text>
    </g>
    <line id="viz-bridge-line" x1="248" y1="160" x2="288" y2="160" stroke="#049FD9" stroke-width="3" stroke-linecap="round"/>
    <g id="viz-bridge">
      <rect x="288" y="110" width="144" height="100" rx="14" fill="#0b2237" stroke="#12b5e5" stroke-width="2"/>
      <text x="360" y="148" fill="#12b5e5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="800" text-anchor="middle">3 AM on-call?</text>
      <text x="360" y="172" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" text-anchor="middle">Engineer needs Python?</text>
    </g>
    <line x1="432" y1="160" x2="472" y2="160" stroke="#049FD9" stroke-width="3" stroke-linecap="round"/>
    <g id="viz-to">
      <rect x="472" y="110" width="200" height="100" rx="14" fill="#112115" stroke="#f59e0b" stroke-width="2"/>
      <text x="572" y="148" fill="#f59e0b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="800" text-anchor="middle">Plain language</text>
      <text x="572" y="172" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" text-anchor="middle">Human approve writes</text>
    </g>
