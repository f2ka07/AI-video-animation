<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 640" role="img" aria-label="Hallucinations in NetOps">
  <rect width="720" height="640" fill="#0b1f33"/>
  <circle cx="620" cy="80" r="120" fill="#049FD9" opacity="0.07"/>
  <circle cx="90" cy="560" r="130" fill="#6CC04A" opacity="0.06"/>
  <g id="viz-main">
    <rect x="24" y="24" width="672" height="592" rx="24" fill="#0b1728" stroke="#203a56" stroke-width="1.5"/>
    
    
    <text x="48" y="52" fill="#049FD9" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="800" letter-spacing="0.14em">HALLUCINATION</text>
    <text x="48" y="74" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="800">Invented VLANs and APIs</text>
    <g id="viz-fake"><rect x="80" y="120" width="520" height="160" rx="14" fill="#1a1215" stroke="#ef4444" stroke-width="2"/>
      <text x="120" y="156" fill="#ef4444" font-family="monospace" font-size="10">VLAN 999 on Gi0/99 — interface invented</text>
      <text x="120" y="180" fill="#9fb3c8" font-family="monospace" font-size="10">iosxe_restconf.push_vlan() — API fake</text>
      <text x="120" y="210" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10">MCP grounding reduces — does not eliminate</text>
      <text x="120" y="240" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10">Count what remains in your benchmark</text></g>
  </g>
</svg>
