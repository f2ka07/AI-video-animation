<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 640" role="img" aria-label="Automation workflow loop">
  <rect width="720" height="640" fill="#0b1f33"/>
  <circle cx="620" cy="80" r="120" fill="#049FD9" opacity="0.07"/>
  <circle cx="90" cy="560" r="130" fill="#6CC04A" opacity="0.06"/>
  <g id="viz-main">
    <rect x="24" y="24" width="672" height="592" rx="24" fill="#0b1728" stroke="#203a56" stroke-width="1.5"/>
    
    <line id="viz-loop-1" x1="360" y1="120" x2="500" y2="200" stroke="#049FD9" stroke-width="3" stroke-linecap="round"/>
    <line id="viz-loop-2" x1="500" y1="280" x2="360" y2="360" stroke="#049FD9" stroke-width="3" stroke-linecap="round"/>
    <line id="viz-loop-3" x1="220" y1="280" x2="220" y2="200" stroke="#049FD9" stroke-width="3" stroke-linecap="round"/>
    <line id="viz-loop-4" x1="220" y1="120" x2="360" y2="120" stroke="#049FD9" stroke-width="3" stroke-linecap="round"/>
    <g id="viz-intent">
    <circle cx="360" cy="100" r="40" fill="#082f49" stroke="#12b5e5" stroke-width="3"/>
    <path d="M20 20h24M32 12v24" fill="none" stroke="#f8fafc" stroke-width="2.5" stroke-linecap="round" transform="translate(340 80)"/>
    <text x="360" y="162" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="700" text-anchor="middle">Intent</text>
  </g>
    <g id="viz-apply">
    <circle cx="520" cy="240" r="40" fill="#163119" stroke="#6CC04A" stroke-width="3"/>
    <path d="M14 32l8-16 8 16" fill="none" stroke="#f8fafc" stroke-width="2.5" stroke-linecap="round" transform="translate(500 220)"/>
    <text x="520" y="302" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="700" text-anchor="middle">Apply</text>
  </g>
    <g id="viz-verify">
    <circle cx="360" cy="380" r="40" fill="#3a2508" stroke="#f59e0b" stroke-width="3"/>
    <path d="M16 24l8 8 16-18" fill="none" stroke="#f8fafc" stroke-width="2.5" stroke-linecap="round" transform="translate(340 360)"/>
    <text x="360" y="442" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="700" text-anchor="middle">Verify</text>
  </g>
    <g id="viz-record">
    <circle cx="200" cy="240" r="40" fill="#2b2350" stroke="#a78bfa" stroke-width="3"/>
    <path d="M12 20h32M20 12v24" fill="none" stroke="#f8fafc" stroke-width="2.5" stroke-linecap="round" transform="translate(180 220)"/>
    <text x="200" y="302" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="700" text-anchor="middle">Record</text>
  </g>
    <text id="viz-cap" x="360" y="480" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" text-anchor="middle">Repeatable automation workflow</text>
  
  </g>
</svg>
