<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 640" role="img" aria-label="Module handoff">
  <rect width="720" height="640" fill="#0b1f33"/>
  <circle cx="620" cy="80" r="120" fill="#049FD9" opacity="0.07"/>
  <circle cx="90" cy="560" r="130" fill="#6CC04A" opacity="0.06"/>
  <g id="viz-main">
    <rect x="24" y="24" width="672" height="592" rx="24" fill="#0b1728" stroke="#203a56" stroke-width="1.5"/>
    
    <g id="viz-from" transform="translate(100 200)">
      <rect width="180" height="100" rx="16" fill="#112115" stroke="#6CC04A" stroke-width="2"/>
      <text x="90" y="58" fill="#6CC04A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="800" text-anchor="middle">This module</text>
    </g>
    <g id="viz-arrow" transform="translate(300 235)">
      <path d="M0 0 H120" stroke="#049FD9" stroke-width="4" stroke-linecap="round"/>
      <polygon points="120,0 108,-8 108,8" fill="#049FD9"/>
    </g>
    <g id="viz-to" transform="translate(440 200)">
      <rect width="180" height="100" rx="16" fill="#0b2237" stroke="#12b5e5" stroke-width="2"/>
      <text x="90" y="58" fill="#12b5e5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="800" text-anchor="middle">Next module</text>
    </g>
    <text id="viz-cap" x="360" y="380" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" text-anchor="middle">Skills carry forward across the track</text>
  
  </g>
</svg>
