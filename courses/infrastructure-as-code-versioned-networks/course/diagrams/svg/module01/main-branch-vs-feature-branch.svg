<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 640" role="img" aria-label="Comparison visual metaphor">
  <rect width="720" height="640" fill="#0b1f33"/>
  <circle cx="620" cy="80" r="120" fill="#049FD9" opacity="0.07"/>
  <circle cx="90" cy="560" r="130" fill="#6CC04A" opacity="0.06"/>
  <g id="viz-main">
    <rect x="24" y="24" width="672" height="592" rx="24" fill="#0b1728" stroke="#203a56" stroke-width="1.5"/>
    
    <line id="viz-divider" x1="360" y1="80" x2="360" y2="400" stroke="#35536f" stroke-width="2"/>
    <text x="360" y="300" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="700" text-anchor="middle">vs</text>
    <g id="viz-left-meta">
        <rect x="60" y="100" width="200" height="160" rx="16" fill="#1a1215" stroke="#ef4444" stroke-width="2"/>
        <text x="90" y="140" fill="#f8fafc" font-family="monospace" font-size="13">1. conf t</text>
        <text x="90" y="165" fill="#f8fafc" font-family="monospace" font-size="13">2. vlan 100</text>
        <text x="90" y="190" fill="#f8fafc" font-family="monospace" font-size="13">3. name HR</text>
        <text x="90" y="215" fill="#64748b" font-family="monospace" font-size="13">4. ...</text>
        <text x="160" y="250" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" text-anchor="middle">Step sequence</text>
      </g>
    <g id="viz-right-meta">
        <rect x="400" y="100" width="200" height="160" rx="16" fill="#112115" stroke="#6CC04A" stroke-width="2"/>
        <circle cx="500" cy="150" r="28" fill="#163119" stroke="#6CC04A" stroke-width="2"/>
        <text x="500" y="156" fill="#6CC04A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="900" text-anchor="middle">OK</text>
        <text x="500" y="210" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" text-anchor="middle">Target outcome</text>
      </g>
    <text id="viz-cap" x="360" y="440" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" text-anchor="middle">Two mental models — same network, different control</text>
  
  </g>
</svg>
