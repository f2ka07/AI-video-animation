<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 640" role="img" aria-label="Git branch and merge">
  <rect width="720" height="640" fill="#0b1f33"/>
  <circle cx="620" cy="80" r="120" fill="#049FD9" opacity="0.07"/>
  <circle cx="90" cy="560" r="130" fill="#6CC04A" opacity="0.06"/>
  <g id="viz-main">
    <rect x="24" y="24" width="672" height="592" rx="24" fill="#0b1728" stroke="#203a56" stroke-width="1.5"/>
    
    <path id="viz-main" d="M100 280 H580" stroke="#12b5e5" stroke-width="4" stroke-linecap="round"/>
    <path id="viz-feature" d="M220 280 C220 180 400 180 400 280" fill="none" stroke="#6CC04A" stroke-width="4" stroke-linecap="round"/>
    <circle cx="100" cy="280" r="10" fill="#12b5e5"/>
    <circle cx="400" cy="280" r="10" fill="#6CC04A"/>
    <circle cx="580" cy="280" r="10" fill="#12b5e5"/>
    <g id="viz-merge" transform="translate(380 120)">
      <circle cx="20" cy="20" r="18" fill="#2a1f08" stroke="#f59e0b" stroke-width="2"/>
      <text x="20" y="26" fill="#f59e0b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="900" text-anchor="middle">?</text>
      <text x="20" y="60" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" text-anchor="middle">merge</text>
    </g>
    <text id="viz-cap" x="360" y="380" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" text-anchor="middle">Branch, experiment, integrate</text>
  
  </g>
</svg>
