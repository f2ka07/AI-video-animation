<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 640" role="img" aria-label="Saved configs are not infrastructure as code">
  <rect width="720" height="640" fill="#0b1f33"/>
  <circle cx="620" cy="80" r="120" fill="#049FD9" opacity="0.07"/>
  <circle cx="90" cy="560" r="130" fill="#6CC04A" opacity="0.06"/>
  <g id="viz-main">
    <rect x="24" y="24" width="672" height="592" rx="24" fill="#0b1728" stroke="#203a56" stroke-width="1.5"/>

    <text x="360" y="72" fill="#12b5e5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="800" text-anchor="middle">Course 2 question: where do automation files live?</text>

    <g id="viz-saved">
      <rect x="56" y="100" width="188" height="200" rx="14" fill="#1a1215" stroke="#ef4444" stroke-width="2"/>
      <text x="150" y="132" fill="#ef4444" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="800" text-anchor="middle">Saved config</text>
      <rect x="76" y="148" width="148" height="56" rx="10" fill="#081827" stroke="#35536f" stroke-width="1.5"/>
      <text x="150" y="172" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">File share</text>
      <text x="150" y="192" fill="#f8fafc" font-family="monospace" font-size="11" text-anchor="middle">running-config.txt</text>
      <text x="150" y="228" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">Copy on disk</text>
      <text x="150" y="246" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">No version chain</text>
      <text x="150" y="282" fill="#ef4444" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="700" text-anchor="middle">Not IaC</text>
    </g>

    <g id="viz-conflict">
      <rect x="266" y="100" width="188" height="200" rx="14" fill="#1a1215" stroke="#f59e0b" stroke-width="2"/>
      <text x="360" y="132" fill="#f59e0b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="800" text-anchor="middle">Shared YAML</text>
      <rect x="286" y="148" width="148" height="44" rx="8" fill="#081827" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="360" y="176" fill="#f8fafc" font-family="monospace" font-size="10" text-anchor="middle">branch_site.yml</text>
      <circle cx="310" cy="218" r="14" fill="#0b2237" stroke="#12b5e5" stroke-width="2"/>
      <text x="310" y="222" fill="#12b5e5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" font-weight="700" text-anchor="middle">A</text>
      <circle cx="410" cy="218" r="14" fill="#0b2237" stroke="#a78bfa" stroke-width="2"/>
      <text x="410" y="222" fill="#a78bfa" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" font-weight="700" text-anchor="middle">B</text>
      <text x="360" y="252" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">Two engineers edit</text>
      <text x="360" y="270" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">the same file</text>
      <text x="360" y="282" fill="#f59e0b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="700" text-anchor="middle">No history</text>
    </g>

    <g id="viz-git">
      <rect x="476" y="100" width="188" height="200" rx="14" fill="#112115" stroke="#6CC04A" stroke-width="2"/>
      <text x="570" y="132" fill="#6CC04A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="800" text-anchor="middle">Git repository</text>
      <rect x="496" y="148" width="148" height="100" rx="10" fill="#020617" stroke="#35536f" stroke-width="1.5"/>
      <text x="512" y="172" fill="#6CC04A" font-family="monospace" font-size="9">a1b2c3 VLAN 100</text>
      <text x="512" y="192" fill="#9fb3c8" font-family="monospace" font-size="9">d4e5f6 OSPF fix</text>
      <text x="512" y="212" fill="#9fb3c8" font-family="monospace" font-size="9">f7g8h9 ACL update</text>
      <text x="512" y="232" fill="#64748b" font-family="monospace" font-size="9">git log</text>
      <text x="570" y="268" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">Who changed what</text>
      <text x="570" y="286" fill="#6CC04A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="700" text-anchor="middle">Rollback safely</text>
    </g>

    <rect x="120" y="340" width="480" height="44" rx="10" fill="#0b2237" stroke="#35536f" stroke-width="1"/>
    <text x="360" y="368" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" text-anchor="middle">Playbooks and intent YAML belong in Git — not only on a share drive</text>

    <text x="360" y="420" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" text-anchor="middle">Which version ran on the network last Tuesday?</text>
    <text x="360" y="442" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">Git answers that question</text>
  </g>
</svg>
