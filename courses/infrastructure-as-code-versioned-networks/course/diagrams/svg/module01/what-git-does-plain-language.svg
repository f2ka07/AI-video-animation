<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 640" role="img" aria-label="Git core operations">
  <rect width="720" height="640" fill="#0b1f33"/>
  <circle cx="620" cy="80" r="120" fill="#049FD9" opacity="0.07"/>
  <circle cx="90" cy="560" r="130" fill="#6CC04A" opacity="0.06"/>
  <g id="viz-main">
    <rect x="24" y="24" width="672" height="592" rx="24" fill="#0b1728" stroke="#203a56" stroke-width="1.5"/>
    
    <line id="viz-flow" x1="140" y1="200" x2="580" y2="200" stroke="#049FD9" stroke-width="3" stroke-linecap="round"/>
    <g id="viz-watch">
    <circle cx="140" cy="200" r="34" fill="#082f49" stroke="#12b5e5" stroke-width="3"/>
    <path d="M24 28h20M34 18v20" fill="none" stroke="#f8fafc" stroke-width="2.5" stroke-linecap="round" transform="translate(120 180)"/>
    <text x="140" y="256" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="700" text-anchor="middle">watch</text>
  </g>
    <g id="viz-commit">
    <circle cx="360" cy="200" r="34" fill="#163119" stroke="#6CC04A" stroke-width="3"/>
    <path d="M16 24l8 8 16-18" fill="none" stroke="#f8fafc" stroke-width="2.5" stroke-linecap="round" transform="translate(340 180)"/>
    <text x="360" y="256" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="700" text-anchor="middle">commit</text>
  </g>
    <g id="viz-branch">
    <circle cx="580" cy="200" r="34" fill="#3a2508" stroke="#f59e0b" stroke-width="3"/>
    <path d="M20 28h16M28 20v16" fill="none" stroke="#f8fafc" stroke-width="2.5" stroke-linecap="round" transform="translate(560 180)"/>
    <text x="580" y="256" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="700" text-anchor="middle">branch</text>
  </g>
    <text id="viz-cap" x="360" y="320" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" text-anchor="middle">Git watches, snapshots, and isolates change</text>
  
  </g>
</svg>
