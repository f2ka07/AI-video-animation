<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 900" role="img" aria-label="Diagnose pipeline failures">
  <rect width="800" height="900" fill="#071525"/>
  <text x="40" y="52" fill="#ef4444" font-family="Inter,sans-serif" font-size="13" font-weight="800" letter-spacing=".16em">EXAM 2.2</text>
  <text x="40" y="96" fill="#fff" font-family="Inter,sans-serif" font-size="28" font-weight="800">Read the job log</text>
  <g transform="translate(400 300)">
    <rect x="-300" y="-40" width="600" height="56" rx="8" fill="#450a0a" stroke="#ef4444"/><text y="8" text-anchor="middle" fill="#fca5a5" font-family="Inter,sans-serif" font-size="14">Missing dependency: command not found</text>
  </g>
  <g transform="translate(400 400)">
    <rect x="-300" y="-40" width="600" height="56" rx="8" fill="#422006" stroke="#f59e0b"/><text y="8" text-anchor="middle" fill="#fcd34d" font-family="Inter,sans-serif" font-size="14">Version conflict in requirements.txt</text>
  </g>
  <g transform="translate(400 500)">
    <rect x="-300" y="-40" width="600" height="56" rx="8" fill="#1e3a5f" stroke="#049FD9"/><text y="8" text-anchor="middle" fill="#bae6fd" font-family="Inter,sans-serif" font-size="14">Post-validation test failed</text>
  </g>
</svg>
