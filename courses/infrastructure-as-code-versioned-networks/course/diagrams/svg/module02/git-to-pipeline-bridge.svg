<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 900" role="img" aria-label="From Git commits to pipelines">
  <rect width="800" height="900" fill="#071525"/>
  <text x="40" y="48" fill="#049FD9" font-family="Inter,sans-serif" font-size="13" font-weight="800" letter-spacing=".18em">MODULE 2</text>
  <text x="40" y="96" fill="#fff" font-family="Inter,sans-serif" font-size="32" font-weight="800">Git to Pipeline</text>
  <text x="40" y="132" fill="#94a3b8" font-family="Inter,sans-serif" font-size="16">Same repo, automated gates</text>
  <g transform="translate(200 320)">
    <rect x="-120" y="-50" width="240" height="100" rx="14" fill="#14532d" stroke="#6CC04A" stroke-width="2"/>
    <text y="-8" text-anchor="middle" fill="#bbf7d0" font-family="Inter,sans-serif" font-size="15" font-weight="700">Git commit</text>
    <text y="22" text-anchor="middle" fill="#94a3b8" font-family="Inter,sans-serif" font-size="13">netops_iac_lab</text>
  </g>
  <path d="M320 320 H480" stroke="#049FD9" stroke-width="3" marker-end="url(#arr)"/>
  <defs><marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#049FD9"/></marker></defs>
  <g transform="translate(600 320)">
    <rect x="-120" y="-50" width="240" height="100" rx="14" fill="#1e3a5f" stroke="#049FD9" stroke-width="2"/>
    <text y="-8" text-anchor="middle" fill="#bae6fd" font-family="Inter,sans-serif" font-size="15" font-weight="700">GitLab CI/CD</text>
    <text y="22" text-anchor="middle" fill="#94a3b8" font-family="Inter,sans-serif" font-size="13">.gitlab-ci.yml</text>
  </g>
  <text x="400" y="520" text-anchor="middle" fill="#6CC04A" font-family="Inter,sans-serif" font-size="14" font-weight="700">build | prevalidate | deploy | post-validate</text>
</svg>
