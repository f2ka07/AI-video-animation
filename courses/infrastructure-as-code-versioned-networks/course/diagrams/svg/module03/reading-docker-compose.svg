<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 900" role="img" aria-label="Reading docker compose">
  <rect width="800" height="900" fill="#071525"/>
  <text x="40" y="52" fill="#049FD9" font-family="Inter,sans-serif" font-size="13" font-weight="800" letter-spacing=".16em">YAML</text>
  <text x="40" y="96" fill="#fff" font-family="Inter,sans-serif" font-size="28" font-weight="800">docker-compose.yml</text>
  <g transform="translate(400 400)">
    <rect x="-280" y="-120" width="560" height="240" rx="16" fill="#0f172a" stroke="#049FD9" stroke-width="2"/>
    <text x="-240" y="-70" fill="#6CC04A" font-family="monospace" font-size="14">services:</text>
    <text x="-240" y="-40" fill="#64748b" font-family="monospace" font-size="13">  ansible:</text>
    <text x="-220" y="-10" fill="#64748b" font-family="monospace" font-size="13">    volumes: [..:/workspace]</text>
    <text x="-240" y="20" fill="#64748b" font-family="monospace" font-size="13">    networks: [lab_net]</text>
    <text x="-240" y="60" fill="#6CC04A" font-family="monospace" font-size="14">networks:</text>
    <text x="-220" y="90" fill="#64748b" font-family="monospace" font-size="13">  lab_net:</text>
  </g>
</svg>
