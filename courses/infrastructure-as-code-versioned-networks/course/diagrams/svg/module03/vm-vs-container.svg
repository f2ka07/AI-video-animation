<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 900" role="img" aria-label="VM vs container">
  <rect width="800" height="900" fill="#071525"/>
  <text x="40" y="52" fill="#6CC04A" font-family="Inter,sans-serif" font-size="13" font-weight="800" letter-spacing=".16em">COMPARE</text>
  <text x="40" y="96" fill="#fff" font-family="Inter,sans-serif" font-size="28" font-weight="800">VM vs container</text>
  <g transform="translate(200 380)">
    <rect x="-150" y="-100" width="300" height="200" rx="14" fill="#422006" stroke="#f59e0b" stroke-width="2"/>
    <text y="-50" text-anchor="middle" fill="#fcd34d" font-family="Inter,sans-serif" font-size="15" font-weight="700">VM</text>
    <text y="-10" text-anchor="middle" fill="#94a3b8" font-family="Inter,sans-serif" font-size="13">Full OS, slow boot</text>
  </g>
  <g transform="translate(600 380)">
    <rect x="-150" y="-100" width="300" height="200" rx="14" fill="#14532d" stroke="#6CC04A" stroke-width="2"/>
    <text y="-50" text-anchor="middle" fill="#bbf7d0" font-family="Inter,sans-serif" font-size="15" font-weight="700">Container</text>
    <text y="-10" text-anchor="middle" fill="#94a3b8" font-family="Inter,sans-serif" font-size="13">Shared kernel, fast</text>
  </g>
</svg>
