<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 900" role="img" aria-label="Golden source vs copies">
  <rect width="800" height="900" fill="#071525"/>
  <text x="40" y="52" fill="#049FD9" font-family="Inter,sans-serif" font-size="13" font-weight="800" letter-spacing=".16em">COMPARE</text>
  <text x="40" y="96" fill="#fff" font-family="Inter,sans-serif" font-size="28" font-weight="800">Golden vs copies</text>
  <g transform="translate(200 380)">
    <rect x="-150" y="-90" width="300" height="180" rx="14" fill="#450a0a" stroke="#ef4444" stroke-width="2"/>
    <text y="-30" text-anchor="middle" fill="#fca5a5" font-family="Inter,sans-serif" font-size="15" font-weight="700">Local copies</text>
    <text y="5" text-anchor="middle" fill="#94a3b8" font-family="Inter,sans-serif" font-size="13">Drift invisible</text>
  </g>
  <g transform="translate(600 380)">
    <rect x="-150" y="-90" width="300" height="180" rx="14" fill="#14532d" stroke="#6CC04A" stroke-width="2"/>
    <text y="-30" text-anchor="middle" fill="#bbf7d0" font-family="Inter,sans-serif" font-size="15" font-weight="700">Git main</text>
    <text y="5" text-anchor="middle" fill="#94a3b8" font-family="Inter,sans-serif" font-size="13">Pipeline reads same path</text>
  </g>
</svg>
