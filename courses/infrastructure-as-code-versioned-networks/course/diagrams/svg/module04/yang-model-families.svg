<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 900" role="img" aria-label="YANG model families">
  <rect width="800" height="900" fill="#071525"/>
  <text x="40" y="52" fill="#6CC04A" font-family="Inter,sans-serif" font-size="13" font-weight="800" letter-spacing=".16em">MODELS</text>
  <text x="40" y="96" fill="#fff" font-family="Inter,sans-serif" font-size="28" font-weight="800">OpenConfig vs native</text>
  <g transform="translate(200 380)">
    <rect x="-150" y="-80" width="300" height="160" rx="14" fill="#14532d" stroke="#6CC04A" stroke-width="2"/>
    <text y="-20" text-anchor="middle" fill="#bbf7d0" font-family="Inter,sans-serif" font-size="14" font-weight="700">OpenConfig / IETF</text>
    <text y="10" text-anchor="middle" fill="#94a3b8" font-family="Inter,sans-serif" font-size="13">Vendor-neutral</text>
  </g>
  <g transform="translate(600 380)">
    <rect x="-150" y="-80" width="300" height="160" rx="14" fill="#422006" stroke="#f59e0b" stroke-width="2"/>
    <text y="-20" text-anchor="middle" fill="#fcd34d" font-family="Inter,sans-serif" font-size="14" font-weight="700">Cisco native</text>
    <text y="10" text-anchor="middle" fill="#94a3b8" font-family="Inter,sans-serif" font-size="13">IOS-XE specific</text>
  </g>
</svg>
