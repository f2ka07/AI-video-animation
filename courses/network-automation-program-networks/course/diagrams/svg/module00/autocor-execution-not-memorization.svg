<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 640" role="img" aria-label="CCNP AUTOCOR tests execution not memorization">
  <rect width="720" height="640" fill="#0b1f33"/>
  <circle cx="620" cy="80" r="120" fill="#049FD9" opacity="0.07"/>
  <circle cx="90" cy="560" r="130" fill="#6CC04A" opacity="0.06"/>
  <g id="viz-main">
    <rect x="24" y="24" width="672" height="592" rx="24" fill="#0b1728" stroke="#203a56" stroke-width="1.5"/>

    <g id="viz-badge">
      <text x="48" y="58" fill="#049FD9" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="800" letter-spacing="0.14em">COURSE PREVIEW</text>
      <rect x="200" y="68" width="320" height="64" rx="14" fill="#0b2237" stroke="#049FD9" stroke-width="2"/>
      <text x="360" y="96" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="900" text-anchor="middle">CCNP Automation</text>
      <text x="360" y="118" fill="#12b5e5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="700" text-anchor="middle">formerly CCNP DevNet · AUTOCOR</text>
    </g>

    <g id="viz-domains">
      <line x1="72" y1="168" x2="648" y2="168" stroke="#203a56" stroke-width="1"/>
      <rect x="56" y="178" width="140" height="36" rx="8" fill="#081827" stroke="#12b5e5" stroke-width="1.5"/>
      <text x="126" y="200" fill="#12b5e5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="700" text-anchor="middle">1.0 Program</text>
      <rect x="206" y="178" width="140" height="36" rx="8" fill="#081827" stroke="#6CC04A" stroke-width="1.5"/>
      <text x="276" y="200" fill="#6CC04A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="700" text-anchor="middle">2.0 Version</text>
      <rect x="356" y="178" width="140" height="36" rx="8" fill="#081827" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="426" y="200" fill="#f59e0b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="700" text-anchor="middle">3.0 Operate</text>
      <rect x="506" y="178" width="140" height="36" rx="8" fill="#081827" stroke="#a78bfa" stroke-width="1.5"/>
      <text x="576" y="200" fill="#a78bfa" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="700" text-anchor="middle">4.0 AI Assist</text>
    </g>

    <g id="viz-memorize">
      <rect x="48" y="238" width="296" height="248" rx="16" fill="#1a1215" stroke="#64748b" stroke-width="2"/>
      <text x="196" y="268" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="800" text-anchor="middle">Written recall alone</text>
      <rect x="72" y="284" width="248" height="72" rx="10" fill="#0b1728" stroke="#35536f" stroke-width="1"/>
      <text x="196" y="310" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">Define RESTCONF vs NETCONF</text>
      <text x="196" y="330" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">List YANG datastore types</text>
      <text x="196" y="350" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">Flashcard memorization</text>
      <rect x="72" y="368" width="248" height="44" rx="8" fill="#1a1215" stroke="#ef4444" stroke-width="1.5"/>
      <text x="196" y="396" fill="#ef4444" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="700" text-anchor="middle">Not enough for AUTOCOR</text>
      <text x="196" y="468" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">Terms without execution context</text>
    </g>

    <g id="viz-execute">
      <rect x="376" y="238" width="296" height="248" rx="16" fill="#112115" stroke="#6CC04A" stroke-width="2"/>
      <text x="524" y="268" fill="#6CC04A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="800" text-anchor="middle">Lab execution under pressure</text>
      <rect x="400" y="284" width="248" height="88" rx="10" fill="#020617" stroke="#35536f" stroke-width="1"/>
      <text x="416" y="306" fill="#64748b" font-family="monospace" font-size="9">$ ansible-playbook site.yml --check</text>
      <text x="416" y="324" fill="#6CC04A" font-family="monospace" font-size="9">PLAY RECAP ... changed=0 failed=0</text>
      <text x="416" y="342" fill="#12b5e5" font-family="monospace" font-size="9">$ python verify_vlans.py --device SW1</text>
      <text x="416" y="360" fill="#9fb3c8" font-family="monospace" font-size="9">OK: vlan 100 present on Gi1/0/1</text>
      <rect x="400" y="384" width="118" height="44" rx="8" fill="#0b2237" stroke="#12b5e5" stroke-width="1.5"/>
      <text x="459" y="404" fill="#12b5e5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" font-weight="700" text-anchor="middle">Check mode</text>
      <text x="459" y="418" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="8" text-anchor="middle">before push</text>
      <rect x="530" y="384" width="118" height="44" rx="8" fill="#0b2237" stroke="#6CC04A" stroke-width="1.5"/>
      <text x="589" y="404" fill="#6CC04A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" font-weight="700" text-anchor="middle">Verify state</text>
      <text x="589" y="418" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="8" text-anchor="middle">on device</text>
      <text x="524" y="468" fill="#6CC04A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="700" text-anchor="middle">What AUTOCOR actually tests</text>
    </g>

    <g id="viz-labs">
      <rect x="72" y="508" width="576" height="52" rx="12" fill="#0b2237" stroke="#049FD9" stroke-width="1.5"/>
      <text x="360" y="532" fill="#12b5e5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="700" text-anchor="middle">Four-course path: each lab proves an exam workflow end to end</text>
      <text x="360" y="550" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">Intent, apply, verify — the rhythm employers expect</text>
    </g>
  </g>
</svg>
