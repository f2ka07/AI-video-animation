<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 640" role="img" aria-label="Built for CCNA-ready students and engineers">
  <rect width="720" height="640" fill="#0b1f33"/>
  <circle cx="620" cy="80" r="120" fill="#049FD9" opacity="0.07"/>
  <circle cx="90" cy="560" r="130" fill="#6CC04A" opacity="0.06"/>
  <g id="viz-main">
    <rect x="24" y="24" width="672" height="592" rx="24" fill="#0b1728" stroke="#203a56" stroke-width="1.5"/>
    <text x="48" y="58" fill="#049FD9" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="800" letter-spacing="0.14em">WHO THIS PATH SERVES</text>

    <g id="viz-student">
      <rect x="48" y="78" width="300" height="280" rx="16" fill="#0b2237" stroke="#12b5e5" stroke-width="2"/>
      <text x="198" y="110" fill="#12b5e5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="800" text-anchor="middle">Certification candidate</text>
      <text x="198" y="132" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">Exam prep discipline and lab repetition</text>
      <rect x="72" y="152" width="252" height="88" rx="10" fill="#081827" stroke="#35536f" stroke-width="1"/>
      <text x="198" y="176" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="700" text-anchor="middle">CCNA baseline assumed</text>
      <rect x="84" y="192" width="72" height="28" rx="6" fill="#0b1728" stroke="#12b5e5" stroke-width="1"/>
      <text x="120" y="210" fill="#12b5e5" font-family="monospace" font-size="9" text-anchor="middle">VLANs</text>
      <rect x="164" y="192" width="72" height="28" rx="6" fill="#0b1728" stroke="#12b5e5" stroke-width="1"/>
      <text x="200" y="210" fill="#12b5e5" font-family="monospace" font-size="9" text-anchor="middle">OSPF</text>
      <rect x="244" y="192" width="72" height="28" rx="6" fill="#0b1728" stroke="#12b5e5" stroke-width="1"/>
      <text x="280" y="210" fill="#12b5e5" font-family="monospace" font-size="9" text-anchor="middle">ACLs</text>
      <rect x="72" y="256" width="252" height="44" rx="8" fill="#112115" stroke="#6CC04A" stroke-width="1.5"/>
      <text x="198" y="284" fill="#6CC04A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="700" text-anchor="middle">Objective mapping per module</text>
      <text x="198" y="338" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">Not networking from zero</text>
    </g>

    <g id="viz-engineer">
      <rect x="372" y="78" width="300" height="280" rx="16" fill="#0b2237" stroke="#a78bfa" stroke-width="2"/>
      <text x="522" y="110" fill="#a78bfa" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="800" text-anchor="middle">Working engineer</text>
      <text x="522" y="132" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">Nightly changes and outage avoidance</text>
      <rect x="396" y="152" width="252" height="88" rx="10" fill="#081827" stroke="#35536f" stroke-width="1"/>
      <text x="522" y="176" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="700" text-anchor="middle">Production habits required</text>
      <rect x="408" y="192" width="108" height="28" rx="6" fill="#0b1728" stroke="#a78bfa" stroke-width="1"/>
      <text x="462" y="210" fill="#a78bfa" font-family="monospace" font-size="8" text-anchor="middle">--check</text>
      <rect x="528" y="192" width="108" height="28" rx="6" fill="#0b1728" stroke="#a78bfa" stroke-width="1"/>
      <text x="582" y="210" fill="#a78bfa" font-family="monospace" font-size="8" text-anchor="middle">verify</text>
      <rect x="396" y="256" width="252" height="44" rx="8" fill="#1a1215" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="522" y="284" fill="#f59e0b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="700" text-anchor="middle">Scripts treated as production code</text>
      <text x="522" y="338" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">Not senior developer on day one</text>
    </g>

    <g id="viz-prereq">
      <rect x="48" y="382" width="624" height="108" rx="14" fill="#112115" stroke="#6CC04A" stroke-width="2"/>
      <text x="360" y="412" fill="#6CC04A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="800" text-anchor="middle">Shared prerequisite bar</text>
      <rect x="72" y="428" width="130" height="32" rx="8" fill="#081827" stroke="#12b5e5" stroke-width="1.5"/>
      <text x="137" y="448" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">Switching and routing</text>
      <rect x="220" y="428" width="130" height="32" rx="8" fill="#081827" stroke="#12b5e5" stroke-width="1.5"/>
      <text x="285" y="448" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">Basic automation literacy</text>
      <rect x="368" y="428" width="130" height="32" rx="8" fill="#081827" stroke="#12b5e5" stroke-width="1.5"/>
      <text x="433" y="448" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">SSH and show commands</text>
      <rect x="516" y="428" width="130" height="32" rx="8" fill="#081827" stroke="#ef4444" stroke-width="1.5"/>
      <text x="581" y="448" fill="#ef4444" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="700" text-anchor="middle">Not CCNA refresher</text>
      <text x="360" y="478" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">Premium exam prep with labs — assumes you already know the network fundamentals</text>
    </g>
  </g>
</svg>
