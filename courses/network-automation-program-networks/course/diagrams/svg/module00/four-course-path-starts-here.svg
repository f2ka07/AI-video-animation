      <text x="360" y="396" fill="#6CC04A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="900" text-anchor="middle">Start with Course One</text>
      <text x="360" y="420" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="700" text-anchor="middle">Work labs in order</text>
      <text x="360" y="442" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">Build the job-ready AUTOCOR skill set employers expect</text>
