      <text x="272" y="228" fill="#6CC04A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" font-weight="700" text-anchor="middle">IaC</text>
    </g>

    <g id="viz-p3">
      <rect x="356" y="108" width="148" height="130" rx="14" fill="#081827" stroke="#f59e0b" stroke-width="2"/>
      <text x="430" y="136" fill="#f59e0b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="800" text-anchor="middle">3. Operate</text>
      <text x="430" y="156" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" text-anchor="middle">Domain 3.x</text>
      <text x="430" y="180" fill="#9fb3c8" font-family="monospace" font-size="8" text-anchor="middle">MDT</text>
      <text x="430" y="194" fill="#9fb3c8" font-family="monospace" font-size="8" text-anchor="middle">pyATS</text>
      <text x="430" y="208" fill="#9fb3c8" font-family="monospace" font-size="8" text-anchor="middle">TLS</text>
      <text x="430" y="228" fill="#f59e0b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" font-weight="700" text-anchor="middle">Validate</text>
