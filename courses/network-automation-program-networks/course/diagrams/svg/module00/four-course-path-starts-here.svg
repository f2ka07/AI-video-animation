      <text x="272" y="136" fill="#6CC04A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="800" text-anchor="middle">2. Version</text>
      <text x="272" y="156" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" text-anchor="middle">Domain 2.x</text>
      <text x="272" y="180" fill="#9fb3c8" font-family="monospace" font-size="8" text-anchor="middle">Git</text>
      <text x="272" y="194" fill="#9fb3c8" font-family="monospace" font-size="8" text-anchor="middle">CI/CD</text>
