      <text x="588" y="156" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" text-anchor="middle">Domain 4.x</text>
      <text x="588" y="180" fill="#9fb3c8" font-family="monospace" font-size="8" text-anchor="middle">prompt</text>
      <text x="588" y="194" fill="#9fb3c8" font-family="monospace" font-size="8" text-anchor="middle">review</text>
      <text x="588" y="208" fill="#9fb3c8" font-family="monospace" font-size="8" text-anchor="middle">check mode</text>
      <text x="588" y="228" fill="#a78bfa" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" font-weight="700" text-anchor="middle">Govern</text>
