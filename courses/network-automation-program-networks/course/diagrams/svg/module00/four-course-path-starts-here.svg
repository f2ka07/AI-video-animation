      <text x="114" y="156" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" text-anchor="middle">Domain 1.x</text>
      <text x="114" y="180" fill="#9fb3c8" font-family="monospace" font-size="8" text-anchor="middle">Python</text>
      <text x="114" y="194" fill="#9fb3c8" font-family="monospace" font-size="8" text-anchor="middle">RESTCONF</text>
      <text x="114" y="208" fill="#9fb3c8" font-family="monospace" font-size="8" text-anchor="middle">Ansible</text>
      <text x="114" y="228" fill="#12b5e5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" font-weight="700" text-anchor="middle">Build</text>
    </g>

    <g id="viz-p2">
