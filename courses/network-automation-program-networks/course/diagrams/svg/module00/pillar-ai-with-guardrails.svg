<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 640" role="img" aria-label="Pillar four AI with guardrails">
  <rect width="720" height="640" fill="#0b1f33"/>
  <circle cx="620" cy="80" r="120" fill="#049FD9" opacity="0.07"/>
  <circle cx="90" cy="560" r="130" fill="#6CC04A" opacity="0.06"/>
  <g id="viz-main">
    <rect x="24" y="24" width="672" height="592" rx="24" fill="#0b1728" stroke="#203a56" stroke-width="1.5"/>
    <text x="48" y="58" fill="#049FD9" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="800" letter-spacing="0.14em">COURSE 4</text>
    <text x="48" y="82" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="800">AI-Assisted Automation with Governance</text>

    <line x1="72" y1="200" x2="648" y2="200" stroke="#049FD9" stroke-width="2" stroke-linecap="round"/>

    <g id="viz-prompt">
      <rect x="48" y="120" width="140" height="140" rx="14" fill="#081827" stroke="#a78bfa" stroke-width="2"/>
      <text x="118" y="150" fill="#a78bfa" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="800" text-anchor="middle">1. Prompt</text>
      <rect x="64" y="164" width="108" height="56" rx="8" fill="#1f1b2e" stroke="#35536f" stroke-width="1"/>
      <text x="118" y="186" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="8" text-anchor="middle">Platform: ios</text>
      <text x="118" y="200" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="8" text-anchor="middle">VLAN 100 access</text>
      <text x="118" y="214" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="8" text-anchor="middle">Ansible playbook</text>
    </g>

    <g id="viz-review">
      <rect x="210" y="120" width="140" height="140" rx="14" fill="#081827" stroke="#12b5e5" stroke-width="2"/>
      <text x="280" y="150" fill="#12b5e5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="800" text-anchor="middle">2. Review</text>
      <circle cx="280" cy="188" r="18" fill="#0b2237" stroke="#12b5e5" stroke-width="2"/>
      <text x="280" y="192" fill="#12b5e5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="700" text-anchor="middle">You</text>
      <text x="280" y="228" fill="#f59e0b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" font-weight="700" text-anchor="middle">Human required</text>
      <text x="280" y="244" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="8" text-anchor="middle">Every line</text>
    </g>

    <g id="viz-check">
      <rect x="372" y="120" width="140" height="140" rx="14" fill="#081827" stroke="#6CC04A" stroke-width="2"/>
      <text x="442" y="150" fill="#6CC04A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="800" text-anchor="middle">3. Validate</text>
      <rect x="388" y="164" width="108" height="56" rx="8" fill="#112115" stroke="#35536f" stroke-width="1"/>
      <text x="442" y="184" fill="#6CC04A" font-family="monospace" font-size="8" text-anchor="middle">ansible-lint</text>
      <text x="442" y="198" fill="#9fb3c8" font-family="monospace" font-size="8" text-anchor="middle">--check mode</text>
      <text x="442" y="212" fill="#9fb3c8" font-family="monospace" font-size="8" text-anchor="middle">dry-run OK</text>
    </g>

    <g id="viz-push">
      <rect x="534" y="120" width="140" height="140" rx="14" fill="#081827" stroke="#f59e0b" stroke-width="2"/>
      <text x="604" y="150" fill="#f59e0b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="800" text-anchor="middle">4. Apply</text>
      <rect x="550" y="168" width="48" height="32" rx="6" fill="#081827" stroke="#12b5e5" stroke-width="1.5"/>
      <text x="574" y="188" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="8" text-anchor="middle">SW1</text>
      <path d="M604 210 L604 230" stroke="#6CC04A" stroke-width="2"/>
      <text x="604" y="248" fill="#6CC04A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" font-weight="700" text-anchor="middle">Only after pass</text>
    </g>

    <g id="viz-governance">
      <rect x="48" y="290" width="624" height="120" rx="14" fill="#1a1215" stroke="#f59e0b" stroke-width="2"/>
      <text x="360" y="320" fill="#f59e0b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="800" text-anchor="middle">Exam objectives 4.1 and 4.2 — governance, not hype</text>
      <rect x="72" y="336" width="130" height="32" rx="8" fill="#081827" stroke="#35536f" stroke-width="1"/>
      <text x="137" y="356" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" text-anchor="middle">Benefits and risks</text>
      <rect x="220" y="336" width="130" height="32" rx="8" fill="#081827" stroke="#35536f" stroke-width="1"/>
      <text x="285" y="356" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" text-anchor="middle">Privacy and IP</text>
      <rect x="368" y="336" width="130" height="32" rx="8" fill="#081827" stroke="#35536f" stroke-width="1"/>
      <text x="433" y="356" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" text-anchor="middle">Validation required</text>
      <rect x="516" y="336" width="130" height="32" rx="8" fill="#081827" stroke="#6CC04A" stroke-width="1.5"/>
      <text x="581" y="356" fill="#6CC04A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" font-weight="700" text-anchor="middle">Your judgment leads</text>
      <text x="360" y="392" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">AI assists — networking judgment stays in charge</text>
    </g>
  </g>
</svg>
