<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 640" role="img" aria-label="Pillar three operate and validate">
  <rect width="720" height="640" fill="#0b1f33"/>
  <circle cx="620" cy="80" r="120" fill="#049FD9" opacity="0.07"/>
  <circle cx="90" cy="560" r="130" fill="#6CC04A" opacity="0.06"/>
  <g id="viz-main">
    <rect x="24" y="24" width="672" height="592" rx="24" fill="#0b1728" stroke="#203a56" stroke-width="1.5"/>
    <text x="48" y="58" fill="#049FD9" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="800" letter-spacing="0.14em">COURSE 3</text>
    <text x="48" y="82" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="800">Operate, Validate, and Secure</text>

    <g id="viz-poll">
      <rect x="48" y="108" width="296" height="210" rx="16" fill="#1a1215" stroke="#f59e0b" stroke-width="2"/>
      <text x="196" y="138" fill="#f59e0b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="800" text-anchor="middle">SNMP polling</text>
      <text x="196" y="158" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">Sample every 5 minutes</text>
      <rect x="72" y="172" width="248" height="72" rx="10" fill="#081827" stroke="#35536f" stroke-width="1"/>
      <text x="196" y="196" fill="#64748b" font-family="monospace" font-size="9" text-anchor="middle">show interfaces | inc errors</text>
      <text x="196" y="214" fill="#64748b" font-family="monospace" font-size="9" text-anchor="middle">snapshot at T+0, T+5, T+10</text>
      <text x="196" y="232" fill="#ef4444" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="700" text-anchor="middle">Misses 30s CPU spike</text>
      <text x="196" y="296" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">Deploy success is not proof</text>
    </g>

    <g id="viz-stream">
      <rect x="376" y="108" width="296" height="210" rx="16" fill="#081827" stroke="#12b5e5" stroke-width="2"/>
      <text x="524" y="138" fill="#12b5e5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="800" text-anchor="middle">Model-driven telemetry</text>
      <text x="524" y="158" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">gRPC dial-out stream</text>
      <rect x="400" y="172" width="248" height="72" rx="10" fill="#112115" stroke="#35536f" stroke-width="1"/>
      <text x="524" y="194" fill="#12b5e5" font-family="monospace" font-size="9" text-anchor="middle">device --gRPC--> collector</text>
      <text x="524" y="212" fill="#9fb3c8" font-family="monospace" font-size="9" text-anchor="middle">YANG paths: interfaces/state</text>
      <text x="524" y="230" fill="#6CC04A" font-family="monospace" font-size="9" text-anchor="middle">push on change or interval</text>
      <text x="524" y="296" fill="#12b5e5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="700" text-anchor="middle">Live structured state</text>
    </g>

    <g id="viz-validate">
      <rect x="48" y="340" width="400" height="120" rx="14" fill="#081827" stroke="#6CC04A" stroke-width="2"/>
      <text x="248" y="370" fill="#6CC04A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="800" text-anchor="middle">pyATS validation + secure automation</text>
      <rect x="72" y="384" width="160" height="44" rx="8" fill="#020617" stroke="#35536f" stroke-width="1"/>
      <text x="152" y="404" fill="#9fb3c8" font-family="monospace" font-size="8" text-anchor="middle">pre/post test learn</text>
      <text x="152" y="418" fill="#6CC04A" font-family="monospace" font-size="8" text-anchor="middle">diff and rollback</text>
      <rect x="252" y="384" width="160" height="44" rx="8" fill="#020617" stroke="#35536f" stroke-width="1"/>
      <text x="332" y="404" fill="#9fb3c8" font-family="monospace" font-size="8" text-anchor="middle">TLS on automation</text>
      <text x="332" y="418" fill="#6CC04A" font-family="monospace" font-size="8" text-anchor="middle">vault for secrets</text>
      <rect x="472" y="340" width="208" height="120" rx="14" fill="#0b2237" stroke="#a78bfa" stroke-width="2"/>
      <text x="576" y="376" fill="#a78bfa" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="800" text-anchor="middle">Syslog correlation</text>
      <text x="576" y="400" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">Events tie to</text>
      <text x="576" y="418" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">automation runs</text>
      <text x="576" y="444" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" text-anchor="middle">RCA from structured logs</text>
    </g>

    <g id="viz-objective">
      <rect x="48" y="480" width="624" height="52" rx="12" fill="#0b2237" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="360" y="504" fill="#f59e0b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="700" text-anchor="middle">Exam domain 3.x — telemetry, logging, pyATS, TLS, secure coding</text>
      <text x="360" y="522" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">Prove health after deploy — not just config push</text>
    </g>
  </g>
</svg>
