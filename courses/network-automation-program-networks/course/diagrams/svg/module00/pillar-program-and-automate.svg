<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 640" role="img" aria-label="Pillar one program and automate">
  <rect width="720" height="640" fill="#0b1f33"/>
  <circle cx="620" cy="80" r="120" fill="#049FD9" opacity="0.07"/>
  <circle cx="90" cy="560" r="130" fill="#6CC04A" opacity="0.06"/>
  <g id="viz-main">
    <rect x="24" y="24" width="672" height="592" rx="24" fill="#0b1728" stroke="#203a56" stroke-width="1.5"/>
    <text x="48" y="58" fill="#049FD9" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="800" letter-spacing="0.14em">COURSE 1</text>
    <text x="48" y="82" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="800">Build and Program Modern Networks</text>

    <g id="viz-devices">
      <rect x="48" y="100" width="56" height="40" rx="8" fill="#081827" stroke="#ef4444" stroke-width="2"/>
      <circle cx="64" cy="116" r="3" fill="#049FD9"/><circle cx="76" cy="116" r="3" fill="#049FD9"/><circle cx="88" cy="116" r="3" fill="#049FD9"/>
      <text x="76" y="152" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" text-anchor="middle">SW1</text>
      <rect x="116" y="100" width="56" height="40" rx="8" fill="#081827" stroke="#f59e0b" stroke-width="2"/>
      <circle cx="132" cy="116" r="3" fill="#049FD9"/><circle cx="144" cy="116" r="3" fill="#049FD9"/><circle cx="156" cy="116" r="3" fill="#049FD9"/>
      <text x="144" y="152" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" text-anchor="middle">SW2</text>
      <rect x="184" y="100" width="56" height="40" rx="8" fill="#081827" stroke="#f59e0b" stroke-width="2"/>
      <text x="212" y="152" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" text-anchor="middle">SW3</text>
      <path d="M260 120 L300 120" stroke="#ef4444" stroke-width="2" stroke-dasharray="5 4"/>
      <text x="340" y="108" fill="#ef4444" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="700">Same VLAN change at scale</text>
      <text x="340" y="126" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10">Manual CLI breaks after hours</text>
    </g>

    <g id="viz-python">
      <rect x="48" y="178" width="200" height="200" rx="16" fill="#081827" stroke="#12b5e5" stroke-width="2"/>
      <text x="148" y="208" fill="#12b5e5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="800" text-anchor="middle">Python + Netmiko</text>
      <rect x="68" y="222" width="160" height="88" rx="8" fill="#020617" stroke="#35536f" stroke-width="1"/>
      <text x="80" y="242" fill="#64748b" font-family="monospace" font-size="8">conn = ConnectHandler(</text>
      <text x="88" y="256" fill="#9fb3c8" font-family="monospace" font-size="8">device_type="cisco_ios",</text>
      <text x="88" y="270" fill="#9fb3c8" font-family="monospace" font-size="8">host=inv["SW1"])</text>
      <text x="80" y="290" fill="#6CC04A" font-family="monospace" font-size="8">output = conn.send_config_set(...)</text>
      <text x="148" y="358" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" text-anchor="middle">Connect and push intent</text>
    </g>

    <g id="viz-api">
      <rect x="260" y="178" width="200" height="200" rx="16" fill="#081827" stroke="#6CC04A" stroke-width="2"/>
      <text x="360" y="208" fill="#6CC04A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="800" text-anchor="middle">RESTCONF / APIs</text>
      <rect x="280" y="222" width="160" height="88" rx="8" fill="#112115" stroke="#35536f" stroke-width="1"/>
      <text x="292" y="242" fill="#12b5e5" font-family="monospace" font-size="8">GET /restconf/data/...</text>
      <text x="292" y="258" fill="#9fb3c8" font-family="monospace" font-size="8">Content-Type: application/yang</text>
      <text x="292" y="274" fill="#9fb3c8" font-family="monospace" font-size="8">+json</text>
      <text x="292" y="294" fill="#6CC04A" font-family="monospace" font-size="8">PATCH vlan-id=100</text>
      <text x="360" y="358" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" text-anchor="middle">Structured programmability</text>
    </g>

    <g id="viz-ansible">
      <rect x="472" y="178" width="200" height="200" rx="16" fill="#081827" stroke="#f59e0b" stroke-width="2"/>
      <text x="572" y="208" fill="#f59e0b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="800" text-anchor="middle">Ansible playbook</text>
      <rect x="492" y="222" width="160" height="88" rx="8" fill="#1a1215" stroke="#35536f" stroke-width="1"/>
      <text x="504" y="242" fill="#f59e0b" font-family="monospace" font-size="8">- hosts: switches</text>
      <text x="504" y="256" fill="#9fb3c8" font-family="monospace" font-size="8">  tasks:</text>
      <text x="512" y="270" fill="#9fb3c8" font-family="monospace" font-size="8">  - ios_vlans:</text>
      <text x="520" y="284" fill="#6CC04A" font-family="monospace" font-size="8">vlan_id: 100</text>
      <text x="572" y="358" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" text-anchor="middle">Idempotent intent at scale</text>
    </g>

    <g id="viz-objective">
      <rect x="48" y="400" width="624" height="56" rx="12" fill="#0b2237" stroke="#049FD9" stroke-width="1.5"/>
      <text x="360" y="424" fill="#12b5e5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="700" text-anchor="middle">Exam domain 1.x — program devices, parse data, automate with Ansible</text>
      <text x="360" y="444" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">Labs: connect, push intent, verify state on live topology</text>
    </g>
  </g>
</svg>
