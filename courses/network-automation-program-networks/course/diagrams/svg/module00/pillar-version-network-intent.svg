<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 640" role="img" aria-label="Pillar two version network intent">
  <rect width="720" height="640" fill="#0b1f33"/>
  <circle cx="620" cy="80" r="120" fill="#049FD9" opacity="0.07"/>
  <circle cx="90" cy="560" r="130" fill="#6CC04A" opacity="0.06"/>
  <g id="viz-main">
    <rect x="24" y="24" width="672" height="592" rx="24" fill="#0b1728" stroke="#203a56" stroke-width="1.5"/>
    <text x="48" y="58" fill="#049FD9" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="800" letter-spacing="0.14em">COURSE 2</text>
    <text x="48" y="82" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="800">Version Intent in Git</text>
    <text x="360" y="108" fill="#12b5e5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="700" text-anchor="middle">Which version ran on the network last Tuesday?</text>

    <g id="viz-share">
      <rect x="40" y="128" width="200" height="220" rx="14" fill="#1a1215" stroke="#ef4444" stroke-width="2"/>
      <text x="140" y="158" fill="#ef4444" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="800" text-anchor="middle">Saved running-config</text>
      <rect x="60" y="172" width="160" height="56" rx="10" fill="#081827" stroke="#35536f" stroke-width="1.5"/>
      <text x="140" y="196" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">File share</text>
      <text x="140" y="214" fill="#f8fafc" font-family="monospace" font-size="10" text-anchor="middle">running-config.txt</text>
      <text x="140" y="252" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">Copy on disk</text>
      <text x="140" y="272" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">No deploy history</text>
      <text x="140" y="320" fill="#ef4444" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="700" text-anchor="middle">Not IaC</text>
    </g>

    <g id="viz-conflict">
      <rect x="260" y="128" width="200" height="220" rx="14" fill="#1a1215" stroke="#f59e0b" stroke-width="2"/>
      <text x="360" y="158" fill="#f59e0b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="800" text-anchor="middle">Shared YAML</text>
      <rect x="280" y="172" width="160" height="44" rx="8" fill="#081827" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="360" y="200" fill="#f8fafc" font-family="monospace" font-size="10" text-anchor="middle">branch_site-v3.yml</text>
      <circle cx="304" cy="240" r="14" fill="#0b2237" stroke="#12b5e5" stroke-width="2"/>
      <text x="304" y="244" fill="#12b5e5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" font-weight="700" text-anchor="middle">A</text>
      <circle cx="416" cy="240" r="14" fill="#0b2237" stroke="#a78bfa" stroke-width="2"/>
      <text x="416" y="244" fill="#a78bfa" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" font-weight="700" text-anchor="middle">B</text>
      <text x="360" y="276" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">Two engineers edit</text>
      <text x="360" y="296" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">the same file</text>
      <text x="360" y="320" fill="#f59e0b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="700" text-anchor="middle">No history</text>
    </g>

    <g id="viz-git">
      <rect x="480" y="128" width="200" height="220" rx="14" fill="#112115" stroke="#6CC04A" stroke-width="2"/>
      <text x="580" y="158" fill="#6CC04A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="800" text-anchor="middle">Git repository</text>
      <rect x="500" y="172" width="160" height="100" rx="10" fill="#020617" stroke="#35536f" stroke-width="1.5"/>
      <text x="516" y="196" fill="#6CC04A" font-family="monospace" font-size="9">a1b2c3 feat: VLAN 100 branch</text>
      <text x="516" y="214" fill="#9fb3c8" font-family="monospace" font-size="9">d4e5f6 merge main OSPF fix</text>
      <text x="516" y="232" fill="#9fb3c8" font-family="monospace" font-size="9">f7g8h9 revert bad ACL</text>
      <text x="516" y="256" fill="#64748b" font-family="monospace" font-size="9">git log --oneline</text>
      <text x="580" y="292" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">Who changed what</text>
      <text x="580" y="320" fill="#6CC04A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="700" text-anchor="middle">Rollback safely</text>
    </g>

    <g id="viz-objective">
      <rect x="40" y="372" width="640" height="56" rx="12" fill="#0b2237" stroke="#6CC04A" stroke-width="1.5"/>
      <text x="360" y="396" fill="#6CC04A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="700" text-anchor="middle">Exam domain 2.x — Git, CI/CD, containers, source of truth</text>
      <text x="360" y="416" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">Labs: branch YAML, merge with review, revert bad commits</text>
    </g>
  </g>
</svg>
