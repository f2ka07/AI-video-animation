<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 640" role="img" aria-label="Four architecture pillars">
  <rect width="720" height="640" fill="#0b1f33"/>
  <circle cx="620" cy="80" r="120" fill="#049FD9" opacity="0.07"/>
  <circle cx="90" cy="560" r="130" fill="#6CC04A" opacity="0.06"/>
  <g id="viz-main">
    <rect x="24" y="24" width="672" height="592" rx="24" fill="#0b1728" stroke="#203a56" stroke-width="1.5"/>
    
    <g id="viz-pillar-1">
    <rect x="60" y="160" width="120" height="70" rx="14" fill="#081827" stroke="#12b5e5" stroke-width="2"/>
    <text x="120" y="200" fill="#12b5e5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="700" text-anchor="middle">Truth</text>
  </g>
    <g id="viz-pillar-2">
    <rect x="200" y="160" width="120" height="70" rx="14" fill="#081827" stroke="#6CC04A" stroke-width="2"/>
    <text x="260" y="200" fill="#6CC04A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="700" text-anchor="middle">Inventory</text>
  </g>
    <g id="viz-pillar-3">
    <rect x="340" y="160" width="120" height="70" rx="14" fill="#081827" stroke="#f59e0b" stroke-width="2"/>
    <text x="400" y="200" fill="#f59e0b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="700" text-anchor="middle">Runner</text>
  </g>
    <g id="viz-pillar-4">
    <rect x="480" y="160" width="120" height="70" rx="14" fill="#081827" stroke="#a78bfa" stroke-width="2"/>
    <text x="540" y="200" fill="#a78bfa" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="700" text-anchor="middle">Validate</text>
  </g>
    <line x1="180" y1="195" x2="200" y2="195" stroke="#049FD9" stroke-width="3" stroke-linecap="round"/>
    <line x1="320" y1="195" x2="340" y2="195" stroke="#049FD9" stroke-width="3" stroke-linecap="round"/>
    <line x1="460" y1="195" x2="480" y2="195" stroke="#049FD9" stroke-width="3" stroke-linecap="round"/>
    <text x="336" y="300" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" text-anchor="middle">Source of truth through validation</text>
  </g>
</svg>
