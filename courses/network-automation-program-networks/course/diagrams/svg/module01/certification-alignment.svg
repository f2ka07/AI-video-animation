  </g>
    <g id="viz-exam-3">
    <rect x="420" y="170" width="90" height="60" rx="14" fill="#081827" stroke="#f59e0b" stroke-width="2"/>
    <text x="465" y="205" fill="#f59e0b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="700" text-anchor="middle">Exam</text>
  </g>
    <g id="viz-badge">
