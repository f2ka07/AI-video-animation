<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 640" role="img" aria-label="Pick your lab environment">
  <rect width="720" height="640" fill="#0b1f33"/>
  <circle cx="620" cy="80" r="120" fill="#049FD9" opacity="0.07"/>
  <circle cx="90" cy="560" r="130" fill="#6CC04A" opacity="0.06"/>
  <g id="viz-main">
    <rect x="24" y="24" width="672" height="592" rx="24" fill="#0b1728" stroke="#203a56" stroke-width="1.5"/>
    
    <g id="viz-env-1">
    <rect x="70" y="140" width="120" height="70" rx="14" fill="#081827" stroke="#12b5e5" stroke-width="2"/>
    <text x="130" y="180" fill="#12b5e5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="700" text-anchor="middle">WSL2</text>
  </g>
    <g id="viz-env-2">
    <rect x="210" y="140" width="120" height="70" rx="14" fill="#081827" stroke="#6CC04A" stroke-width="2"/>
    <text x="270" y="180" fill="#6CC04A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="700" text-anchor="middle">Mac Terminal</text>
  </g>
    <g id="viz-env-3">
    <rect x="350" y="140" width="120" height="70" rx="14" fill="#081827" stroke="#f59e0b" stroke-width="2"/>
    <text x="410" y="180" fill="#f59e0b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="700" text-anchor="middle">Linux VM</text>
  </g>
    <g id="viz-env-4">
    <rect x="490" y="140" width="120" height="70" rx="14" fill="#081827" stroke="#a78bfa" stroke-width="2"/>
    <text x="550" y="180" fill="#a78bfa" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="700" text-anchor="middle">Cloud lab</text>
  </g>
    <text x="336" y="280" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" text-anchor="middle">Pick one — stay with it for the course</text>
  </g>
</svg>
