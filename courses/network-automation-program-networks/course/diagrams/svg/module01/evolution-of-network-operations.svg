<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 640" role="img" aria-label="Operations evolution timeline">
  <rect width="720" height="640" fill="#0b1f33"/>
  <circle cx="620" cy="80" r="120" fill="#049FD9" opacity="0.07"/>
  <circle cx="90" cy="560" r="130" fill="#6CC04A" opacity="0.06"/>
  <g id="viz-main">
    <rect x="24" y="24" width="672" height="592" rx="24" fill="#0b1728" stroke="#203a56" stroke-width="1.5"/>
    
    <line id="viz-line" x1="130" y1="220" x2="560" y2="220" stroke="#049FD9" stroke-width="3" stroke-linecap="round"/>
    <g id="viz-step-cli">
    <rect x="80" y="180" width="100" height="80" rx="14" fill="#081827" stroke="#12b5e5" stroke-width="2"/>
    <text x="130" y="225" fill="#12b5e5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="700" text-anchor="middle">CLI</text>
  </g>
    <g id="viz-step-script">
    <rect x="210" y="180" width="100" height="80" rx="14" fill="#081827" stroke="#6CC04A" stroke-width="2"/>
    <text x="260" y="225" fill="#6CC04A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="700" text-anchor="middle">Scripts</text>
  </g>
    <g id="viz-step-api">
    <rect x="340" y="180" width="100" height="80" rx="14" fill="#081827" stroke="#f59e0b" stroke-width="2"/>
    <text x="390" y="225" fill="#f59e0b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="700" text-anchor="middle">APIs</text>
  </g>
    <g id="viz-step-git">
    <rect x="470" y="180" width="100" height="80" rx="14" fill="#081827" stroke="#a78bfa" stroke-width="2"/>
    <text x="520" y="225" fill="#a78bfa" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="700" text-anchor="middle">Git/IaC</text>
  </g>
    <text x="336" y="320" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" text-anchor="middle">Each step removes copy-paste</text>
  </g>
</svg>
