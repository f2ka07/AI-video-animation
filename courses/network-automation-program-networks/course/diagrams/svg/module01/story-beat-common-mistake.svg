<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 640" role="img" aria-label="Common mistake vs safer pattern">
  <rect width="720" height="640" fill="#0b1f33"/>
  <circle cx="620" cy="80" r="120" fill="#049FD9" opacity="0.07"/>
  <circle cx="90" cy="560" r="130" fill="#6CC04A" opacity="0.06"/>
  <g id="viz-main">
    <rect x="24" y="24" width="672" height="592" rx="24" fill="#0b1728" stroke="#203a56" stroke-width="1.5"/>
    
    <g id="viz-warn">
      <polygon points="160,100 240,220 80,220" fill="#2a1f08" stroke="#f59e0b" stroke-width="2"/>
      <text x="160" y="185" fill="#f59e0b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="900" text-anchor="middle">!</text>
      <text x="160" y="250" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" text-anchor="middle">Skip venv / wrong folder</text>
    </g>
    <line x1="260" y1="180" x2="360" y2="180" stroke="#049FD9" stroke-width="3" stroke-linecap="round"/>
    <g id="viz-fix">
      <rect x="380" y="130" width="180" height="100" rx="14" fill="#112115" stroke="#6CC04A" stroke-width="2"/>
      <text x="470" y="170" fill="#6CC04A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="800" text-anchor="middle">Activate venv</text>
      <text x="470" y="195" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" text-anchor="middle">cd project first</text>
    </g>
  </g>
</svg>
