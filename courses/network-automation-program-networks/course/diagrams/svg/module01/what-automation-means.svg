<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 640" role="img" aria-label="Automation workflow pipeline">
  <rect width="720" height="640" fill="#0b1f33"/>
  <circle cx="620" cy="80" r="120" fill="#049FD9" opacity="0.07"/>
  <circle cx="90" cy="560" r="130" fill="#6CC04A" opacity="0.06"/>
  <g id="viz-main">
    <rect x="24" y="24" width="672" height="592" rx="24" fill="#0b1728" stroke="#203a56" stroke-width="1.5"/>
    
    <line x1="175" y1="210" x2="225" y2="210" stroke="#049FD9" stroke-width="3" stroke-linecap="round"/>
    <line x1="325" y1="210" x2="375" y2="210" stroke="#049FD9" stroke-width="3" stroke-linecap="round"/>
    <line x1="475" y1="210" x2="525" y2="210" stroke="#049FD9" stroke-width="3" stroke-linecap="round"/>
    <g id="viz-step-1">
    <rect x="60" y="170" width="115" height="80" rx="14" fill="#081827" stroke="#12b5e5" stroke-width="2"/>
    <text x="117.5" y="215" fill="#12b5e5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="700" text-anchor="middle">Describe</text>
  </g>
    <g id="viz-step-2">
    <rect x="210" y="170" width="115" height="80" rx="14" fill="#081827" stroke="#6CC04A" stroke-width="2"/>
    <text x="267.5" y="215" fill="#6CC04A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="700" text-anchor="middle">Push</text>
  </g>
    <g id="viz-step-3">
    <rect x="360" y="170" width="115" height="80" rx="14" fill="#081827" stroke="#f59e0b" stroke-width="2"/>
    <text x="417.5" y="215" fill="#f59e0b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="700" text-anchor="middle">Verify</text>
  </g>
    <g id="viz-step-4">
    <rect x="510" y="170" width="115" height="80" rx="14" fill="#081827" stroke="#a78bfa" stroke-width="2"/>
    <text x="567.5" y="215" fill="#a78bfa" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="700" text-anchor="middle">Record</text>
  </g>
    <text x="336" y="300" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" text-anchor="middle">Repeatable workflow — you keep the judgment</text>
  </g>
</svg>
