<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 640" role="img" aria-label="YAML file drives many devices">
  <rect width="720" height="640" fill="#0b1f33"/>
  <circle cx="620" cy="80" r="120" fill="#049FD9" opacity="0.07"/>
  <circle cx="90" cy="560" r="130" fill="#6CC04A" opacity="0.06"/>
  <g id="viz-main">
    <rect x="24" y="24" width="672" height="592" rx="24" fill="#0b1728" stroke="#203a56" stroke-width="1.5"/>
    
    <g id="viz-yaml-file">
      <rect x="60" y="140" width="150" height="140" rx="12" fill="#081827" stroke="#6CC04A" stroke-width="2"/>
      <text x="80" y="170" fill="#6CC04A" font-family="monospace" font-size="12" font-weight="700">devices.yaml</text>
      <text x="80" y="194" fill="#9fb3c8" font-family="monospace" font-size="10">switches:</text>
      <text x="90" y="212" fill="#9fb3c8" font-family="monospace" font-size="10">- host: .10</text>
      <text x="90" y="230" fill="#9fb3c8" font-family="monospace" font-size="10">- host: .11</text>
      <text x="90" y="248" fill="#9fb3c8" font-family="monospace" font-size="10">- host: .12</text>
    </g>
    <line x1="210" y1="210" x2="260" y2="210" stroke="#049FD9" stroke-width="3" stroke-linecap="round"/>
    <g id="viz-script">
    <rect x="252" y="168" width="148" height="86" rx="12" fill="#2a1f08" stroke="#f59e0b" stroke-width="2"/>
    <text x="326" y="194" fill="#f59e0b" font-family="monospace" font-size="11" font-weight="700" text-anchor="middle">loop_switches.py</text>
    <text x="326" y="212" fill="#9fb3c8" font-family="monospace" font-size="9" text-anchor="middle">import netmiko</text>
    <text x="326" y="228" fill="#9fb3c8" font-family="monospace" font-size="9" text-anchor="middle">for sw in hosts:</text>
  </g>
    <line x1="380" y1="210" x2="430" y2="180" stroke="#049FD9" stroke-width="3" stroke-linecap="round"/>
    <line x1="380" y1="210" x2="430" y2="210" stroke="#049FD9" stroke-width="3" stroke-linecap="round"/>
    <line x1="380" y1="210" x2="430" y2="240" stroke="#049FD9" stroke-width="3" stroke-linecap="round"/>
    <g id="viz-fleet">
      <g>
    <rect x="430" y="132" width="80" height="56" rx="10" fill="#081827" stroke="#12b5e5" stroke-width="2"/>
    <path d="M450 172h40M470 152v40" stroke="#12b5e5" stroke-width="2" stroke-linecap="round"/>
    <text x="470" y="204" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" text-anchor="middle">SW1</text>
  </g>
      <g>
    <rect x="430" y="182" width="80" height="56" rx="10" fill="#081827" stroke="#12b5e5" stroke-width="2"/>
    <path d="M450 222h40M470 202v40" stroke="#12b5e5" stroke-width="2" stroke-linecap="round"/>
    <text x="470" y="254" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" text-anchor="middle">SW2</text>
  </g>
      <g>
    <rect x="430" y="232" width="80" height="56" rx="10" fill="#081827" stroke="#12b5e5" stroke-width="2"/>
    <path d="M450 272h40M470 252v40" stroke="#12b5e5" stroke-width="2" stroke-linecap="round"/>
    <text x="470" y="304" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" text-anchor="middle">SW3</text>
  </g>
    </g>
    <g id="viz-git">
      <rect x="200" y="320" width="320" height="44" rx="10" fill="#0b2237" stroke="#12b5e5" stroke-width="1.5"/>
      <text x="360" y="348" fill="#12b5e5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="700" text-anchor="middle">Version in Git — one change updates all</text>
    </g>
  </g>
