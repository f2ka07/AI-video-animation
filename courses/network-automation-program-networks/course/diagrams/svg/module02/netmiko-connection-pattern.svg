<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 640" role="img" aria-label="Netmiko four-step rhythm">
  <rect width="720" height="640" fill="#0b1f33"/>
  <circle cx="620" cy="80" r="120" fill="#049FD9" opacity="0.07"/>
  <circle cx="90" cy="560" r="130" fill="#6CC04A" opacity="0.06"/>
  <g id="viz-main">
    <rect x="24" y="24" width="672" height="592" rx="24" fill="#0b1728" stroke="#203a56" stroke-width="1.5"/>
    
    <g id="viz-step-1">
    <rect x="50" y="180" width="100" height="64" rx="14" fill="#081827" stroke="#12b5e5" stroke-width="2"/>
    <text x="100" y="217" fill="#12b5e5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="700" text-anchor="middle">1. Connect</text>
  </g>
    <line x1="150" y1="212" x2="190" y2="212" stroke="#049FD9" stroke-width="3" stroke-linecap="round"/>
    <rect x="190" y="198" width="56" height="28" rx="6" fill="#2a1f08" stroke="#f59e0b" stroke-width="2"/>
    <text x="218" y="216" fill="#f59e0b" font-family="monospace" font-size="10" text-anchor="middle">SSH</text>
    <line x1="246" y1="212" x2="286" y2="212" stroke="#049FD9" stroke-width="3" stroke-linecap="round"/>
    <g id="viz-switch">
    <rect x="286" y="184" width="80" height="56" rx="10" fill="#081827" stroke="#12b5e5" stroke-width="2"/>
    <path d="M306 224h40M326 204v40" stroke="#12b5e5" stroke-width="2" stroke-linecap="round"/>
    <text x="326" y="256" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" text-anchor="middle">SW</text>
  </g>
    <line x1="366" y1="212" x2="406" y2="212" stroke="#049FD9" stroke-width="3" stroke-linecap="round"/>
    <g id="viz-step-2">
    <rect x="406" y="180" width="110" height="64" rx="14" fill="#081827" stroke="#6CC04A" stroke-width="2"/>
    <text x="461" y="217" fill="#6CC04A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="700" text-anchor="middle">2. Show/Config</text>
  </g>
    <line x1="516" y1="212" x2="556" y2="212" stroke="#049FD9" stroke-width="3" stroke-linecap="round"/>
    <g id="viz-step-3">
    <rect x="556" y="180" width="100" height="64" rx="14" fill="#081827" stroke="#f59e0b" stroke-width="2"/>
    <text x="606" y="217" fill="#f59e0b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="700" text-anchor="middle">3. Verify</text>
  </g>
    <g id="viz-step-4">
      <rect x="280" y="300" width="160" height="56" rx="12" fill="#081827" stroke="#a78bfa" stroke-width="2"/>
      <text x="360" y="334" fill="#a78bfa" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="700" text-anchor="middle">4. disconnect()</text>
    </g>
    <line x1="461" y1="244" x2="400" y2="300" stroke="#a78bfa" stroke-width="3" stroke-linecap="round"/>
    <text x="336" y="400" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" text-anchor="middle">Same discipline as a CCNA lab session</text>
  </g>
</svg>
