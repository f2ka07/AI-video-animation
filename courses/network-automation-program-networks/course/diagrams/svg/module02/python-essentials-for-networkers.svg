<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 640" role="img" aria-label="Four Python building blocks">
  <rect width="720" height="640" fill="#0b1f33"/>
  <circle cx="620" cy="80" r="120" fill="#049FD9" opacity="0.07"/>
  <circle cx="90" cy="560" r="130" fill="#6CC04A" opacity="0.06"/>
  <g id="viz-main">
    <rect x="24" y="24" width="672" height="592" rx="24" fill="#0b1728" stroke="#203a56" stroke-width="1.5"/>
    
    <g id="viz-vars">
      <rect x="56" y="90" width="290" height="120" rx="14" fill="#081827" stroke="#12b5e5" stroke-width="2"/>
      <text x="201" y="122" fill="#12b5e5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="700" text-anchor="middle">Variables</text>
      <text x="201" y="152" fill="#9fb3c8" font-family="monospace" font-size="11" text-anchor="middle">host = "192.168.1.10"</text>
      <text x="201" y="178" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">IPs, VLAN IDs, credentials</text>
    </g>
    <g id="viz-func">
      <rect x="374" y="90" width="290" height="120" rx="14" fill="#081827" stroke="#6CC04A" stroke-width="2"/>
      <text x="519" y="122" fill="#6CC04A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="700" text-anchor="middle">Functions</text>
      <text x="519" y="152" fill="#9fb3c8" font-family="monospace" font-size="11" text-anchor="middle">def connect(): ...</text>
      <text x="519" y="178" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">Reusable steps by name</text>
    </g>
    <g id="viz-indent">
      <rect x="56" y="230" width="290" height="130" rx="14" fill="#081827" stroke="#f59e0b" stroke-width="2"/>
      <text x="76" y="258" fill="#f59e0b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="700">Indentation</text>
      <text x="76" y="282" fill="#f59e0b" font-family="monospace" font-size="11">if link_up:</text>
      <text x="92" y="300" fill="#9fb3c8" font-family="monospace" font-size="11">send_config()</text>
      <text x="76" y="318" fill="#f59e0b" font-family="monospace" font-size="11">else:</text>
      <text x="92" y="336" fill="#9fb3c8" font-family="monospace" font-size="11">log_error()</text>
      <text x="201" y="352" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">Groups code like IOS sub-modes</text>
    </g>
    <g id="viz-import">
      <rect x="374" y="230" width="290" height="130" rx="14" fill="#081827" stroke="#a78bfa" stroke-width="2"/>
      <text x="394" y="258" fill="#a78bfa" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="700">import</text>
      <text x="394" y="282" fill="#a78bfa" font-family="monospace" font-size="10">from netmiko import</text>
      <text x="394" y="300" fill="#a78bfa" font-family="monospace" font-size="10">  ConnectHandler</text>
      <text x="519" y="340" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">Loads libraries at the top</text>
    </g>
  </g>
</svg>
