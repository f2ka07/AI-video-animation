  <circle cx="90" cy="560" r="130" fill="#6CC04A" opacity="0.06"/>
  <g id="viz-main">
    <rect x="24" y="24" width="672" height="592" rx="24" fill="#0b1728" stroke="#203a56" stroke-width="1.5"/>
    
    <g id="viz-python">
      <rect x="276" y="200" width="120" height="100" rx="16" fill="#2a1f08" stroke="#f59e0b" stroke-width="2"/>
      <text x="336" y="248" fill="#f59e0b" font-family="monospace" font-size="22" font-weight="900" text-anchor="middle">Python</text>
      <text x="336" y="272" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" text-anchor="middle">read · change · debug</text>
    </g>
    <line x1="336" y1="200" x2="336" y2="130" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>
    <g id="viz-ansible">
