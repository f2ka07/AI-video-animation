    <path d="M316 432h40M336 412v40" stroke="#12b5e5" stroke-width="2" stroke-linecap="round"/>
    <text x="336" y="464" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" text-anchor="middle">Lab SW</text>
  </g>
    <text x="336" y="500" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" text-anchor="middle">One language — many automation paths</text>
