    <text x="336" y="110" fill="#6CC04A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="700" text-anchor="middle">Ansible modules</text>
  </g>
    <line x1="396" y1="250" x2="470" y2="200" stroke="#12b5e5" stroke-width="3" stroke-linecap="round"/>
    <g id="viz-netmiko">
    <rect x="470" y="170" width="120" height="60" rx="14" fill="#081827" stroke="#12b5e5" stroke-width="2"/>
    <text x="530" y="205" fill="#12b5e5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="700" text-anchor="middle">Netmiko</text>
  </g>
    <line x1="276" y1="250" x2="200" y2="200" stroke="#a78bfa" stroke-width="3" stroke-linecap="round"/>
