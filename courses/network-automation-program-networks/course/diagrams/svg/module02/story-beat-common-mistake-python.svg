<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 640" role="img" aria-label="Hard-coded secrets vs safe pattern">
  <rect width="720" height="640" fill="#0b1f33"/>
  <circle cx="620" cy="80" r="120" fill="#049FD9" opacity="0.07"/>
  <circle cx="90" cy="560" r="130" fill="#6CC04A" opacity="0.06"/>
  <g id="viz-main">
    <rect x="24" y="24" width="672" height="592" rx="24" fill="#0b1728" stroke="#203a56" stroke-width="1.5"/>
    
    <g id="viz-bad">
      <rect x="60" y="110" width="240" height="150" rx="14" fill="#1a1215" stroke="#ef4444" stroke-width="2"/>
      <text x="180" y="140" fill="#ef4444" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="800" text-anchor="middle">Production script</text>
      <text x="80" y="168" fill="#f8fafc" font-family="monospace" font-size="10">password = "admin123"</text>
      <line x1="75" y1="178" x2="285" y2="178" stroke="#ef4444" stroke-width="2"/>
      <text x="180" y="210" fill="#ef4444" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" text-anchor="middle">Secrets in Git</text>
      <text x="180" y="232" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" text-anchor="middle">No try/except</text>
    </g>
    <line x1="310" y1="185" x2="380" y2="185" stroke="#049FD9" stroke-width="3" stroke-linecap="round"/>
    <g id="viz-good">
      <rect x="400" y="110" width="240" height="150" rx="14" fill="#112115" stroke="#6CC04A" stroke-width="2"/>
      <text x="520" y="140" fill="#6CC04A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="800" text-anchor="middle">Safer pattern</text>
      <text x="420" y="168" fill="#9fb3c8" font-family="monospace" font-size="10">password = os.getenv(...)</text>
      <text x="420" y="192" fill="#9fb3c8" font-family="monospace" font-size="10">try: connect()</text>
      <text x="420" y="216" fill="#9fb3c8" font-family="monospace" font-size="10">except: log(host)</text>
      <text x="520" y="245" fill="#6CC04A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" text-anchor="middle">Vault / env vars</text>
    </g>
  </g>
</svg>
