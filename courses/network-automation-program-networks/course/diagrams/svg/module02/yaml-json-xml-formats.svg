<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 640" role="img" aria-label="Config formats feed Python">
  <rect width="720" height="640" fill="#0b1f33"/>
  <circle cx="620" cy="80" r="120" fill="#049FD9" opacity="0.07"/>
  <circle cx="90" cy="560" r="130" fill="#6CC04A" opacity="0.06"/>
  <g id="viz-main">
    <rect x="24" y="24" width="672" height="592" rx="24" fill="#0b1728" stroke="#203a56" stroke-width="1.5"/>
    
    <g id="viz-yaml">
    <rect x="60" y="120" width="160" height="76" rx="10" fill="#081827" stroke="#6CC04A" stroke-width="2"/>
    <text x="74" y="140" fill="#6CC04A" font-family="monospace" font-size="12" font-weight="700">devices.yaml</text>
    <text x="74" y="156" fill="#9fb3c8" font-family="monospace" font-size="11">host: 10.0.0.1</text><text x="74" y="174" fill="#9fb3c8" font-family="monospace" font-size="11">vlan: 100</text>
  </g>
    <g id="viz-json">
    <rect x="280" y="120" width="160" height="76" rx="10" fill="#081827" stroke="#12b5e5" stroke-width="2"/>
    <text x="294" y="140" fill="#12b5e5" font-family="monospace" font-size="12" font-weight="700">api.json</text>
    <text x="294" y="156" fill="#9fb3c8" font-family="monospace" font-size="11">{ vlan: 100 }</text><text x="294" y="174" fill="#9fb3c8" font-family="monospace" font-size="11">state: up</text>
  </g>
    <g id="viz-xml">
    <rect x="500" y="120" width="160" height="58" rx="10" fill="#081827" stroke="#a78bfa" stroke-width="2"/>
    <text x="514" y="140" fill="#a78bfa" font-family="monospace" font-size="12" font-weight="700">netconf.xml</text>
    <text x="514" y="156" fill="#9fb3c8" font-family="monospace" font-size="11"><vlan-id>100</vlan-id></text>
  </g>
    <line x1="220" y1="200" x2="280" y2="260" stroke="#6CC04A" stroke-width="3" stroke-linecap="round"/>
    <line x1="360" y1="200" x2="336" y2="260" stroke="#12b5e5" stroke-width="3" stroke-linecap="round"/>
    <line x1="500" y1="200" x2="392" y2="260" stroke="#a78bfa" stroke-width="3" stroke-linecap="round"/>
    <g id="viz-python-dict">
      <rect x="240" y="260" width="192" height="90" rx="14" fill="#2a1f08" stroke="#f59e0b" stroke-width="2"/>
      <text x="336" y="295" fill="#f59e0b" font-family="monospace" font-size="13" font-weight="700" text-anchor="middle">Python dict</text>
      <text x="336" y="318" fill="#9fb3c8" font-family="monospace" font-size="11" text-anchor="middle">load → loop → configure</text>
    </g>
    <line x1="336" y1="350" x2="336" y2="400" stroke="#049FD9" stroke-width="3" stroke-linecap="round"/>
    <g id="viz-switch">
    <rect x="296" y="412" width="80" height="56" rx="10" fill="#081827" stroke="#12b5e5" stroke-width="2"/>
    <path d="M316 452h40M336 432v40" stroke="#12b5e5" stroke-width="2" stroke-linecap="round"/>
    <text x="336" y="484" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" text-anchor="middle">SW</text>
  </g>
    <text x="336" y="510" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" text-anchor="middle">Store data in files — not magic numbers in scripts</text>
  </g>
</svg>
