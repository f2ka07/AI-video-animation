<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 640" role="img" aria-label="Auth gate and rate limit">
  <rect width="720" height="640" fill="#0b1f33"/>
  <circle cx="620" cy="80" r="120" fill="#049FD9" opacity="0.07"/>
  <circle cx="90" cy="560" r="130" fill="#6CC04A" opacity="0.06"/>
  <g id="viz-main">
    <rect x="24" y="24" width="672" height="592" rx="24" fill="#0b1728" stroke="#203a56" stroke-width="1.5"/>
    
    <g id="viz-client">
      <g id="viz-script">
    <rect x="80" y="120" width="160" height="88" rx="12" fill="#2a1f08" stroke="#f59e0b" stroke-width="2"/>
    <text x="160" y="146" fill="#f59e0b" font-family="monospace" font-size="11" font-weight="700" text-anchor="middle">restconf.py</text>
    <text x="160" y="164" fill="#9fb3c8" font-family="monospace" font-size="9" text-anchor="middle">auth=BasicAuth(...)</text>
    <text x="160" y="180" fill="#9fb3c8" font-family="monospace" font-size="9" text-anchor="middle">requests.get(...)</text>
  </g>
      <line x1="240" y1="164" x2="300" y2="164" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>
    </g>
    <g id="viz-gate">
      <rect x="300" y="120" width="120" height="88" rx="14" fill="#081827" stroke="#f59e0b" stroke-width="2"/>
      <text x="360" y="152" fill="#f59e0b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="800" text-anchor="middle">Auth</text>
      <text x="360" y="174" fill="#9fb3c8" font-family="monospace" font-size="9" text-anchor="middle">Basic / token</text>
      <text x="360" y="192" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" text-anchor="middle">Lab vs prod</text>
    </g>
    <line x1="420" y1="164" x2="480" y2="164" stroke="#6CC04A" stroke-width="3" stroke-linecap="round"/>
    <g id="viz-device">
    <rect x="480" y="136" width="80" height="56" rx="10" fill="#081827" stroke="#12b5e5" stroke-width="2"/>
    <path d="M500 176h40M520 156v40" stroke="#12b5e5" stroke-width="2" stroke-linecap="round"/>
    <text x="520" y="208" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" text-anchor="middle">API</text>
  </g>
    <g id="viz-rate">
      <rect x="200" y="260" width="320" height="100" rx="14" fill="#1a1215" stroke="#ef4444" stroke-width="2"/>
      <text x="360" y="292" fill="#ef4444" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="800" text-anchor="middle">429 Too Many Requests</text>
      <text x="360" y="318" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" text-anchor="middle">Backoff + log — not tight loops</text>
      <text x="360" y="340" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">Secrets in env / vault, not source code</text>
    </g>
  </g>
</svg>
