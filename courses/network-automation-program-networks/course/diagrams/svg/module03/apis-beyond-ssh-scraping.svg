<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 640" role="img" aria-label="Screen scraping vs structured API">
  <rect width="720" height="640" fill="#0b1f33"/>
  <circle cx="620" cy="80" r="120" fill="#049FD9" opacity="0.07"/>
  <circle cx="90" cy="560" r="130" fill="#6CC04A" opacity="0.06"/>
  <g id="viz-main">
    <rect x="24" y="24" width="672" height="592" rx="24" fill="#0b1728" stroke="#203a56" stroke-width="1.5"/>
    
    <g id="viz-scrape">
      <rect x="56" y="90" width="240" height="200" rx="14" fill="#1a1215" stroke="#ef4444" stroke-width="2"/>
      <text x="176" y="118" fill="#ef4444" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="800" text-anchor="middle">SSH + regex</text>
      <text x="76" y="148" fill="#9fb3c8" font-family="monospace" font-size="9">Vlan100  DATA_VLAN active</text>
      <text x="76" y="166" fill="#9fb3c8" font-family="monospace" font-size="9">Vlan200  VOICE      active</text>
      <text x="76" y="190" fill="#64748b" font-family="monospace" font-size="9">... reformatted output ...</text>
      <line x1="70" y1="210" x2="282" y2="210" stroke="#ef4444" stroke-width="2"/>
      <text x="176" y="238" fill="#ef4444" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" text-anchor="middle">Vendor changes format</text>
      <text x="176" y="258" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">Script breaks silently</text>
    </g>
    <g id="viz-vs">
      <text x="336" y="200" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="900" text-anchor="middle">vs</text>
    </g>
    <g id="viz-api">
      <rect x="376" y="90" width="240" height="200" rx="14" fill="#112115" stroke="#6CC04A" stroke-width="2"/>
      <text x="496" y="118" fill="#6CC04A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="800" text-anchor="middle">RESTCONF GET</text>
      <text x="396" y="152" fill="#9fb3c8" font-family="monospace" font-size="9">{</text>
      <text x="408" y="170" fill="#6CC04A" font-family="monospace" font-size="9">"id": 100,</text>
      <text x="408" y="188" fill="#6CC04A" font-family="monospace" font-size="9">"name": "DATA_VLAN"</text>
      <text x="396" y="206" fill="#9fb3c8" font-family="monospace" font-size="9">}</text>
      <text x="496" y="248" fill="#6CC04A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" text-anchor="middle">Typed fields from YANG</text>
      <text x="496" y="268" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">Predictable automation</text>
    </g>
    <text x="336" y="340" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" text-anchor="middle">Request objects — not paragraphs to parse</text>
  </g>
</svg>
