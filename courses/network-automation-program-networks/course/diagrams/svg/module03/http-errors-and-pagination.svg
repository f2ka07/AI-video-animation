<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 640" role="img" aria-label="Status codes and pagination">
  <rect width="720" height="640" fill="#0b1f33"/>
  <circle cx="620" cy="80" r="120" fill="#049FD9" opacity="0.07"/>
  <circle cx="90" cy="560" r="130" fill="#6CC04A" opacity="0.06"/>
  <g id="viz-main">
    <rect x="24" y="24" width="672" height="592" rx="24" fill="#0b1728" stroke="#203a56" stroke-width="1.5"/>
    
    <g id="viz-4xx">
      <rect x="56" y="100" width="260" height="130" rx="14" fill="#1a1215" stroke="#ef4444" stroke-width="2"/>
      <text x="186" y="130" fill="#ef4444" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="800" text-anchor="middle">4xx — your request</text>
      <g>
    <rect x="80" y="148" width="88" height="52" rx="10" fill="#081827" stroke="#ef4444" stroke-width="2"/>
    <text x="124" y="172" fill="#ef4444" font-family="monospace" font-size="16" font-weight="900" text-anchor="middle">400</text>
    <text x="124" y="190" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" text-anchor="middle">Bad JSON</text>
  </g>
      <g>
    <rect x="186" y="148" width="88" height="52" rx="10" fill="#081827" stroke="#f59e0b" stroke-width="2"/>
    <text x="230" y="172" fill="#f59e0b" font-family="monospace" font-size="16" font-weight="900" text-anchor="middle">403</text>
    <text x="230" y="190" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" text-anchor="middle">No permission</text>
  </g>
      <text x="186" y="218" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">Fix payload before retry</text>
    </g>
    <g id="viz-5xx">
      <rect x="356" y="100" width="260" height="130" rx="14" fill="#081827" stroke="#a78bfa" stroke-width="2"/>
      <text x="486" y="130" fill="#a78bfa" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="800" text-anchor="middle">5xx — server trouble</text>
      <g>
    <rect x="400" y="148" width="88" height="52" rx="10" fill="#081827" stroke="#a78bfa" stroke-width="2"/>
    <text x="444" y="172" fill="#a78bfa" font-family="monospace" font-size="16" font-weight="900" text-anchor="middle">500</text>
    <text x="444" y="190" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" text-anchor="middle">Server error</text>
  </g>
      <text x="486" y="218" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">Investigate before blind retry</text>
    </g>
    <g id="viz-pages">
      <rect x="140" y="270" width="160" height="70" rx="10" fill="#081827" stroke="#12b5e5" stroke-width="2"/>
      <text x="220" y="300" fill="#12b5e5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="700" text-anchor="middle">Page 1</text>
      <text x="220" y="322" fill="#9fb3c8" font-family="monospace" font-size="9" text-anchor="middle">10 of 500 hosts</text>
      <line x1="300" y1="305" x2="360" y2="305" stroke="#049FD9" stroke-width="3" stroke-linecap="round"/>
      <rect x="360" y="270" width="160" height="70" rx="10" fill="#081827" stroke="#6CC04A" stroke-width="2"/>
      <text x="440" y="300" fill="#6CC04A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="700" text-anchor="middle">Page 2</text>
      <text x="440" y="322" fill="#9fb3c8" font-family="monospace" font-size="9" text-anchor="middle">follow next link</text>
    </g>
    <text x="336" y="390" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" text-anchor="middle">Log like syslog — decide if retry is safe</text>
  </g>
</svg>
