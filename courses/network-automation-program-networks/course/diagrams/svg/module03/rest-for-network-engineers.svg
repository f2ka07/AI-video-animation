<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 640" role="img" aria-label="REST mapped to CLI habits">
  <rect width="720" height="640" fill="#0b1f33"/>
  <circle cx="620" cy="80" r="120" fill="#049FD9" opacity="0.07"/>
  <circle cx="90" cy="560" r="130" fill="#6CC04A" opacity="0.06"/>
  <g id="viz-main">
    <rect x="24" y="24" width="672" height="592" rx="24" fill="#0b1728" stroke="#203a56" stroke-width="1.5"/>
    
    <g id="viz-get-map">
      <rect x="56" y="100" width="260" height="140" rx="14" fill="#081827" stroke="#12b5e5" stroke-width="2"/>
      <text x="186" y="132" fill="#12b5e5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="800" text-anchor="middle">GET request</text>
      <text x="186" y="162" fill="#9fb3c8" font-family="monospace" font-size="10" text-anchor="middle">structured show vlan</text>
      <text x="186" y="188" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">JSON fields, not screen text</text>
      <text x="186" y="218" fill="#6CC04A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="700" text-anchor="middle">Read state</text>
    </g>
    <g id="viz-patch-map">
      <rect x="356" y="100" width="260" height="140" rx="14" fill="#081827" stroke="#f59e0b" stroke-width="2"/>
      <text x="486" y="132" fill="#f59e0b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="800" text-anchor="middle">PATCH request</text>
      <text x="486" y="162" fill="#9fb3c8" font-family="monospace" font-size="10" text-anchor="middle">targeted configure delta</text>
      <text x="486" y="188" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">One object, not full config</text>
      <text x="486" y="218" fill="#f59e0b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="700" text-anchor="middle">Change state</text>
    </g>
    <line x1="186" y1="240" x2="186" y2="290" stroke="#12b5e5" stroke-width="3" stroke-linecap="round"/>
    <line x1="486" y1="240" x2="486" y2="290" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>
    <g>
    <rect x="146" y="302" width="80" height="56" rx="10" fill="#081827" stroke="#12b5e5" stroke-width="2"/>
    <path d="M166 342h40M186 322v40" stroke="#12b5e5" stroke-width="2" stroke-linecap="round"/>
    <text x="186" y="374" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" text-anchor="middle">SW1</text>
  </g>
    <g>
    <rect x="446" y="302" width="80" height="56" rx="10" fill="#081827" stroke="#12b5e5" stroke-width="2"/>
    <path d="M466 342h40M486 322v40" stroke="#12b5e5" stroke-width="2" stroke-linecap="round"/>
    <text x="486" y="374" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" text-anchor="middle">SW1</text>
  </g>
    <g id="viz-judgment">
      <rect x="160" y="390" width="352" height="44" rx="10" fill="#112115" stroke="#a78bfa" stroke-width="1.5"/>
      <text x="336" y="418" fill="#a78bfa" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="700" text-anchor="middle">CCNA judgment still decides what should exist</text>
    </g>
  </g>
</svg>
