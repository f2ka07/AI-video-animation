<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 640" role="img" aria-label="Two transports to structured data">
  <rect width="720" height="640" fill="#0b1f33"/>
  <circle cx="620" cy="80" r="120" fill="#049FD9" opacity="0.07"/>
  <circle cx="90" cy="560" r="130" fill="#6CC04A" opacity="0.06"/>
  <g id="viz-main">
    <rect x="24" y="24" width="672" height="592" rx="24" fill="#0b1728" stroke="#203a56" stroke-width="1.5"/>
    
    <g id="viz-restconf">
      <rect x="56" y="100" width="260" height="220" rx="16" fill="#081827" stroke="#6CC04A" stroke-width="2"/>
      <text x="186" y="132" fill="#6CC04A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="800" text-anchor="middle">RESTCONF</text>
      <text x="186" y="162" fill="#9fb3c8" font-family="monospace" font-size="10" text-anchor="middle">HTTP + JSON</text>
      <rect x="96" y="180" width="180" height="56" rx="8" fill="#112115" stroke="#12b5e5" stroke-width="1.5"/>
      <text x="186" y="214" fill="#12b5e5" font-family="monospace" font-size="10" text-anchor="middle">requests.get()</text>
      <text x="186" y="260" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">Python / Postman friendly</text>
      <text x="186" y="296" fill="#6CC04A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">RFC 8040</text>
    </g>
    <g id="viz-netconf">
      <rect x="356" y="100" width="260" height="220" rx="16" fill="#081827" stroke="#a78bfa" stroke-width="2"/>
      <text x="486" y="132" fill="#a78bfa" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="800" text-anchor="middle">NETCONF</text>
      <text x="486" y="162" fill="#9fb3c8" font-family="monospace" font-size="10" text-anchor="middle">XML over SSH</text>
      <rect x="396" y="180" width="180" height="56" rx="8" fill="#1f1b2e" stroke="#a78bfa" stroke-width="1.5"/>
      <text x="486" y="214" fill="#a78bfa" font-family="monospace" font-size="10" text-anchor="middle">&lt;rpc&gt; ... &lt;/rpc&gt;</text>
      <text x="486" y="260" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">SP / orchestrator stacks</text>
      <text x="486" y="296" fill="#a78bfa" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">Mature pipeline integrations</text>
    </g>
    <g id="viz-yang-shared">
      <rect x="200" y="350" width="272" height="50" rx="12" fill="#0b2237" stroke="#12b5e5" stroke-width="2"/>
      <text x="336" y="372" fill="#12b5e5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="700" text-anchor="middle">Same YANG models underneath</text>
      <text x="336" y="390" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">Different vehicle, same map</text>
    </g>
  </g>
</svg>
