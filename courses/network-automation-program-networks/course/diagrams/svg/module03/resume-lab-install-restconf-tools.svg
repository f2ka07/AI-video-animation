<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 640" role="img" aria-label="Prepare lab for RESTCONF">
  <rect width="720" height="640" fill="#0b1f33"/>
  <circle cx="620" cy="80" r="120" fill="#049FD9" opacity="0.07"/>
  <circle cx="90" cy="560" r="130" fill="#6CC04A" opacity="0.06"/>
  <g id="viz-main">
    <rect x="24" y="24" width="672" height="592" rx="24" fill="#0b1728" stroke="#203a56" stroke-width="1.5"/>
    
    <g id="viz-term">
    <rect x="80" y="80" width="512" height="220" rx="16" fill="#020617" stroke="#12b5e5" stroke-width="2"/>
    <circle cx="108" cy="108" r="6" fill="#ef4444"/><circle cx="128" cy="108" r="6" fill="#f59e0b"/><circle cx="148" cy="108" r="6" fill="#6CC04A"/>
    <text x="100" y="128" fill="#6CC04A" font-family="monospace" font-size="12">$ cd automation_project</text>
    <text x="100" y="152" fill="#6CC04A" font-family="monospace" font-size="12">$ source env/bin/activate</text>
    <text x="100" y="176" fill="#6CC04A" font-family="monospace" font-size="12">(env) $ pip install requests</text>
    <text x="100" y="200" fill="#6CC04A" font-family="monospace" font-size="12">(env) $ ping 192.168.1.10</text>
  </g>
    <g id="viz-https">
      <rect x="140" y="330" width="392" height="56" rx="12" fill="#112115" stroke="#6CC04A" stroke-width="2"/>
      <text x="336" y="354" fill="#6CC04A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="700" text-anchor="middle">HTTPS reachability before RESTCONF</text>
      <text x="336" y="374" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">Lab only: verify=False for self-signed certs</text>
    </g>
  </g>
</svg>
