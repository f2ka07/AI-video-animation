<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 640" role="img" aria-label="REST building blocks">
  <rect width="720" height="640" fill="#0b1f33"/>
  <circle cx="620" cy="80" r="120" fill="#049FD9" opacity="0.07"/>
  <circle cx="90" cy="560" r="130" fill="#6CC04A" opacity="0.06"/>
  <g id="viz-main">
    <rect x="24" y="24" width="672" height="592" rx="24" fill="#0b1728" stroke="#203a56" stroke-width="1.5"/>
    
    <g id="viz-url">
      <rect x="80" y="88" width="512" height="44" rx="10" fill="#0b2237" stroke="#12b5e5" stroke-width="2"/>
      <text x="336" y="116" fill="#12b5e5" font-family="monospace" font-size="11" text-anchor="middle">https://device/restconf/data/native/vlan</text>
      <text x="336" y="148" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">URL identifies the resource</text>
    </g>
    <g id="viz-verbs">
      <g id="viz-get">
    <rect x="100" y="180" width="56" height="32" rx="8" fill="#0b2237" stroke="#6CC04A" stroke-width="2"/>
    <text x="128" y="201" fill="#6CC04A" font-family="monospace" font-size="12" font-weight="700" text-anchor="middle">GET</text>
  </g>
      <g>
    <rect x="200" y="180" width="65" height="32" rx="8" fill="#0b2237" stroke="#f59e0b" stroke-width="2"/>
    <text x="232.5" y="201" fill="#f59e0b" font-family="monospace" font-size="12" font-weight="700" text-anchor="middle">PATCH</text>
  </g>
      <g>
    <rect x="310" y="180" width="56" height="32" rx="8" fill="#0b2237" stroke="#12b5e5" stroke-width="2"/>
    <text x="338" y="201" fill="#12b5e5" font-family="monospace" font-size="12" font-weight="700" text-anchor="middle">POST</text>
  </g>
      <g>
    <rect x="410" y="180" width="74" height="32" rx="8" fill="#0b2237" stroke="#ef4444" stroke-width="2"/>
    <text x="447" y="201" fill="#ef4444" font-family="monospace" font-size="12" font-weight="700" text-anchor="middle">DELETE</text>
  </g>
      <text x="336" y="232" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" text-anchor="middle">HTTP verbs tell the server what to do</text>
    </g>
    <g id="viz-status">
      <g>
    <rect x="120" y="270" width="88" height="52" rx="10" fill="#081827" stroke="#6CC04A" stroke-width="2"/>
    <text x="164" y="294" fill="#6CC04A" font-family="monospace" font-size="16" font-weight="900" text-anchor="middle">200</text>
    <text x="164" y="312" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" text-anchor="middle">OK</text>
  </g>
      <g>
    <rect x="280" y="270" width="88" height="52" rx="10" fill="#081827" stroke="#f59e0b" stroke-width="2"/>
    <text x="324" y="294" fill="#f59e0b" font-family="monospace" font-size="16" font-weight="900" text-anchor="middle">401</text>
    <text x="324" y="312" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" text-anchor="middle">Auth fail</text>
  </g>
      <g>
    <rect x="440" y="270" width="88" height="52" rx="10" fill="#081827" stroke="#ef4444" stroke-width="2"/>
    <text x="484" y="294" fill="#ef4444" font-family="monospace" font-size="16" font-weight="900" text-anchor="middle">404</text>
    <text x="484" y="312" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" text-anchor="middle">Not found</text>
  </g>
      <text x="336" y="360" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" text-anchor="middle">Status codes signal success or failure</text>
    </g>
  </g>
</svg>
