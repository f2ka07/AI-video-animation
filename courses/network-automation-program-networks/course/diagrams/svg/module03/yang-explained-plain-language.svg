<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 640" role="img" aria-label="YANG is the map; RESTCONF is the vehicle">
  <rect width="720" height="640" fill="#0b1f33"/>
  <circle cx="620" cy="80" r="120" fill="#049FD9" opacity="0.07"/>
  <circle cx="90" cy="560" r="130" fill="#6CC04A" opacity="0.06"/>
  <g id="viz-main">
    <rect x="24" y="24" width="672" height="592" rx="24" fill="#0b1728" stroke="#203a56" stroke-width="1.5"/>
    
    <g id="viz-map">
      <rect x="80" y="100" width="360" height="240" rx="16" fill="#0b2237" stroke="#12b5e5" stroke-width="2"/>
      <text x="260" y="130" fill="#12b5e5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="800" text-anchor="middle">YANG model (schema)</text>
      <rect x="120" y="150" width="120" height="70" rx="8" fill="#081827" stroke="#6CC04A" stroke-width="1.5"/>
      <text x="180" y="178" fill="#6CC04A" font-family="monospace" font-size="10" text-anchor="middle">vlan-list</text>
      <text x="180" y="198" fill="#9fb3c8" font-family="monospace" font-size="9" text-anchor="middle">id, name</text>
      <rect x="280" y="150" width="120" height="70" rx="8" fill="#081827" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="340" y="178" fill="#f59e0b" font-family="monospace" font-size="10" text-anchor="middle">interface</text>
      <text x="340" y="198" fill="#9fb3c8" font-family="monospace" font-size="9" text-anchor="middle">mode, vlan</text>
      <text x="260" y="260" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">Containers you already configure by hand</text>
      <text x="260" y="310" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">Cisco-IOS-XE-native on lab IOS-XE</text>
    </g>
    <g id="viz-vehicle">
      <rect x="480" y="180" width="120" height="80" rx="12" fill="#112115" stroke="#6CC04A" stroke-width="2"/>
      <text x="540" y="218" fill="#6CC04A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="800" text-anchor="middle">RESTCONF</text>
      <text x="540" y="240" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">HTTP ride</text>
      <line x1="440" y1="220" x2="480" y2="220" stroke="#6CC04A" stroke-width="3" stroke-linecap="round"/>
    </g>
    <text x="336" y="390" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" text-anchor="middle">Find the container — do not memorize the whole tree</text>
  </g>
</svg>
