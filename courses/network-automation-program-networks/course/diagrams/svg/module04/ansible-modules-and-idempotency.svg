<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 640" role="img" aria-label="Modules, roles, and check mode">
  <rect width="720" height="640" fill="#0b1f33"/>
  <circle cx="620" cy="80" r="120" fill="#049FD9" opacity="0.07"/>
  <circle cx="90" cy="560" r="130" fill="#6CC04A" opacity="0.06"/>
  <g id="viz-main">
    <rect x="24" y="24" width="672" height="592" rx="24" fill="#0b1728" stroke="#203a56" stroke-width="1.5"/>
    
    <g id="viz-desired">
      <rect x="56" y="100" width="240" height="100" rx="14" fill="#112115" stroke="#6CC04A" stroke-width="2"/>
      <text x="176" y="130" fill="#6CC04A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="800" text-anchor="middle">Desired state</text>
      <text x="176" y="158" fill="#9fb3c8" font-family="monospace" font-size="10" text-anchor="middle">vlan_id: 100, name: DATA</text>
      <text x="176" y="182" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">ios_vlans computes diff</text>
    </g>
    <g id="viz-check">
      <rect x="356" y="100" width="240" height="100" rx="14" fill="#081827" stroke="#f59e0b" stroke-width="2"/>
      <text x="476" y="130" fill="#f59e0b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="800" text-anchor="middle">--check</text>
      <text x="476" y="158" fill="#9fb3c8" font-family="monospace" font-size="10" text-anchor="middle">ansible-playbook --check</text>
      <text x="476" y="182" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">Dry run before apply</text>
    </g>
    <g id="viz-roles">
      <rect x="120" y="240" width="160" height="70" rx="10" fill="#081827" stroke="#a78bfa" stroke-width="2"/>
      <text x="200" y="272" fill="#a78bfa" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="700" text-anchor="middle">Roles</text>
      <text x="200" y="294" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">Reuse task bundles</text>
    </g>
    <g id="viz-handlers">
      <rect x="320" y="240" width="160" height="70" rx="10" fill="#081827" stroke="#12b5e5" stroke-width="2"/>
      <text x="400" y="272" fill="#12b5e5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="700" text-anchor="middle">Handlers</text>
      <text x="400" y="294" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">Notify on change only</text>
    </g>
    <text x="336" y="360" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" text-anchor="middle">Run twice — no duplicate VLANs</text>
  </g>
</svg>
