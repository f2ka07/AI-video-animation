<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 640" role="img" aria-label="Match the tool to the scenario">
  <rect width="720" height="640" fill="#0b1f33"/>
  <circle cx="620" cy="80" r="120" fill="#049FD9" opacity="0.07"/>
  <circle cx="90" cy="560" r="130" fill="#6CC04A" opacity="0.06"/>
  <g id="viz-main">
    <rect x="24" y="24" width="672" height="592" rx="24" fill="#0b1728" stroke="#203a56" stroke-width="1.5"/>

    <g id="viz-fork">
      <rect x="236" y="72" width="200" height="44" rx="12" fill="#0b2237" stroke="#12b5e5" stroke-width="2"/>
      <text x="336" y="100" fill="#12b5e5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="800" text-anchor="middle">What is the job?</text>
      <path d="M 336 116 L 196 150" fill="none" stroke="#6CC04A" stroke-width="2"/>
      <path d="M 336 116 L 476 150" fill="none" stroke="#f59e0b" stroke-width="2"/>
    </g>

    <g id="viz-ansible-path">
      <rect x="56" y="150" width="280" height="200" rx="16" fill="#081827" stroke="#6CC04A" stroke-width="2"/>
      <text x="196" y="178" fill="#6CC04A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="800" text-anchor="middle">Repeatable fleet change</text>

      <rect x="72" y="208" width="78" height="50" rx="8" fill="#112115" stroke="#6CC04A" stroke-width="1.5"/>
      <text x="111" y="230" fill="#6CC04A" font-family="monospace" font-size="10" font-weight="700" text-anchor="middle">site.yml</text>
      <text x="111" y="246" fill="#9fb3c8" font-family="monospace" font-size="8" text-anchor="middle">ios_vlans</text>

      <path d="M 150 218 L 164 218" fill="none" stroke="#6CC04A" stroke-width="2"/>
      <path d="M 150 225 L 164 225" fill="none" stroke="#6CC04A" stroke-width="2"/>
      <path d="M 150 232 L 164 232" fill="none" stroke="#6CC04A" stroke-width="2"/>
      <path d="M 164 218 L 164 232" fill="none" stroke="#6CC04A" stroke-width="2"/>
      <path d="M 164 218 L 172 210" fill="none" stroke="#6CC04A" stroke-width="2"/>
      <path d="M 164 225 L 172 225" fill="none" stroke="#6CC04A" stroke-width="2"/>
      <path d="M 164 232 L 172 240" fill="none" stroke="#6CC04A" stroke-width="2"/>

      <rect x="172" y="198" width="54" height="54" rx="10" fill="#081827" stroke="#12b5e5" stroke-width="2"/>
      <path d="M192 225h14M199 218v14" stroke="#12b5e5" stroke-width="2" stroke-linecap="round"/>
      <text x="199" y="268" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" text-anchor="middle">SW1</text>

      <rect x="238" y="198" width="54" height="54" rx="10" fill="#081827" stroke="#12b5e5" stroke-width="2"/>
      <path d="M258 225h14M265 218v14" stroke="#12b5e5" stroke-width="2" stroke-linecap="round"/>
      <text x="265" y="268" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" text-anchor="middle">SW2</text>

      <rect x="302" y="214" width="24" height="22" rx="4" fill="#081827" stroke="#6CC04A" stroke-width="1.5"/>
      <text x="314" y="229" fill="#6CC04A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" font-weight="700" text-anchor="middle">+N</text>

      <text x="196" y="320" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">One playbook, many targets</text>
    </g>

    <g id="viz-python-path">
      <rect x="384" y="150" width="280" height="200" rx="16" fill="#2a1f08" stroke="#f59e0b" stroke-width="2"/>
      <text x="524" y="178" fill="#f59e0b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="800" text-anchor="middle">One-off or custom logic</text>

      <g id="viz-sw-single">
        <rect x="404" y="208" width="70" height="56" rx="10" fill="#081827" stroke="#12b5e5" stroke-width="2"/>
        <path d="M424 236h20M434 226v20" stroke="#12b5e5" stroke-width="2" stroke-linecap="round"/>
        <text x="434" y="282" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" text-anchor="middle">SW</text>
      </g>

      <path d="M 474 236 L 488 236" fill="none" stroke="#f59e0b" stroke-width="2"/>

      <rect x="488" y="196" width="160" height="90" rx="8" fill="#020617" stroke="#203a56" stroke-width="1.5"/>
      <text x="502" y="216" fill="#64748b" font-family="monospace" font-size="8">% odd show format...</text>
      <text x="502" y="232" fill="#9fb3c8" font-family="monospace" font-size="8">Vlan100  DATA  active</text>
      <text x="502" y="248" fill="#9fb3c8" font-family="monospace" font-size="8">* VLAN0100  data_vlan</text>
      <text x="502" y="264" fill="#f59e0b" font-family="monospace" font-size="8">if "Vlan" in line: ...</text>

      <text x="524" y="320" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">Parse, glue, troubleshoot once</text>
    </g>

    <g id="viz-rest-hint">
      <rect x="200" y="380" width="272" height="44" rx="10" fill="#0b2237" stroke="#12b5e5" stroke-width="1.5"/>
      <text x="336" y="402" fill="#12b5e5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="700" text-anchor="middle">Strong HTTP API?</text>
      <text x="336" y="418" fill="#9fb3c8" font-family="monospace" font-size="9" text-anchor="middle">RESTCONF path (module 3)</text>
    </g>
  </g>
</svg>
