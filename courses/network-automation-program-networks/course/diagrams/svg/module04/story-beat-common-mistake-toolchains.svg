<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 640" role="img" aria-label="Skipping check mode scales mistakes">
  <rect width="720" height="640" fill="#0b1f33"/>
  <circle cx="620" cy="80" r="120" fill="#049FD9" opacity="0.07"/>
  <circle cx="90" cy="560" r="130" fill="#6CC04A" opacity="0.06"/>
  <g id="viz-main">
    <rect x="24" y="24" width="672" height="592" rx="24" fill="#0b1728" stroke="#203a56" stroke-width="1.5"/>
    
    <g id="viz-bad">
      <rect x="56" y="110" width="260" height="150" rx="14" fill="#1a1215" stroke="#ef4444" stroke-width="2"/>
      <text x="186" y="140" fill="#ef4444" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="800" text-anchor="middle">Skip --check</text>
      <text x="76" y="172" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11">Stale IP in inventory</text>
      <text x="76" y="196" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11">Prod + lab in one group</text>
      <text x="76" y="220" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11">Playbook worked once</text>
      <text x="186" y="248" fill="#ef4444" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" text-anchor="middle">VLAN on wrong switch</text>
    </g>
    <line x1="326" y1="185" x2="390" y2="185" stroke="#049FD9" stroke-width="3" stroke-linecap="round"/>
    <g id="viz-good">
      <rect x="400" y="110" width="240" height="150" rx="14" fill="#112115" stroke="#6CC04A" stroke-width="2"/>
      <text x="520" y="140" fill="#6CC04A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="800" text-anchor="middle">Safer pattern</text>
      <text x="420" y="172" fill="#6CC04A" font-family="monospace" font-size="10">--check --limit switch1</text>
      <text x="420" y="196" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11">Review inventory diffs</text>
      <text x="420" y="220" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11">Archive check output</text>
      <text x="520" y="248" fill="#6CC04A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" text-anchor="middle">Like routing table changes</text>
    </g>
  </g>
</svg>
