<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 640" role="img" aria-label="From scripts to production toolchains">
  <rect width="720" height="640" fill="#0b1f33"/>
  <circle cx="620" cy="80" r="120" fill="#049FD9" opacity="0.07"/>
  <circle cx="90" cy="560" r="130" fill="#6CC04A" opacity="0.06"/>
  <g id="viz-main">
    <rect x="24" y="24" width="672" height="592" rx="24" fill="#0b1728" stroke="#203a56" stroke-width="1.5"/>
    
    <g id="viz-scripts">
      <rect x="80" y="160" width="140" height="80" rx="14" fill="#2a1f08" stroke="#f59e0b" stroke-width="2"/>
      <text x="150" y="196" fill="#f59e0b" font-family="monospace" font-size="12" font-weight="700" text-anchor="middle">Python</text>
      <text x="150" y="218" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">SSH / RESTCONF</text>
    </g>
    <line x1="220" y1="200" x2="280" y2="200" stroke="#049FD9" stroke-width="3" stroke-linecap="round"/>
    <g id="viz-toolchain">
      <rect x="280" y="130" width="160" height="140" rx="16" fill="#081827" stroke="#12b5e5" stroke-width="2"/>
      <text x="360" y="168" fill="#12b5e5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="800" text-anchor="middle">Toolchain</text>
      <text x="360" y="194" fill="#6CC04A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" text-anchor="middle">Ansible playbooks</text>
      <text x="360" y="216" fill="#a78bfa" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" text-anchor="middle">Terraform plan</text>
      <text x="360" y="238" fill="#f59e0b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" text-anchor="middle">Inventory in Git</text>
    </g>
    <line x1="440" y1="200" x2="500" y2="200" stroke="#049FD9" stroke-width="3" stroke-linecap="round"/>
    <g id="viz-fleet">
    <rect x="500" y="172" width="80" height="56" rx="10" fill="#081827" stroke="#12b5e5" stroke-width="2"/>
    <path d="M520 212h40M540 192v40" stroke="#12b5e5" stroke-width="2" stroke-linecap="round"/>
    <text x="540" y="244" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" text-anchor="middle">Fleet</text>
  </g>
    <text x="336" y="320" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" text-anchor="middle">Repeatable workflows a teammate can run</text>
  </g>
</svg>
