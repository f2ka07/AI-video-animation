<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 640" role="img" aria-label="Ansible fits network teams">
  <rect width="720" height="640" fill="#0b1f33"/>
  <circle cx="620" cy="80" r="120" fill="#049FD9" opacity="0.07"/>
  <circle cx="90" cy="560" r="130" fill="#6CC04A" opacity="0.06"/>
  <g id="viz-main">
    <rect x="24" y="24" width="672" height="592" rx="24" fill="#0b1728" stroke="#203a56" stroke-width="1.5"/>
    
    <g id="viz-inventory">
      <rect x="60" y="100" width="180" height="120" rx="14" fill="#081827" stroke="#6CC04A" stroke-width="2"/>
      <text x="150" y="130" fill="#6CC04A" font-family="monospace" font-size="11" font-weight="700" text-anchor="middle">inventory.yml</text>
      <text x="80" y="156" fill="#9fb3c8" font-family="monospace" font-size="10">lab_switches:</text>
      <text x="90" y="174" fill="#9fb3c8" font-family="monospace" font-size="10">  switch1: .10</text>
      <text x="90" y="192" fill="#9fb3c8" font-family="monospace" font-size="10">  switch2: .11</text>
    </g>
    <line x1="240" y1="160" x2="290" y2="160" stroke="#049FD9" stroke-width="3" stroke-linecap="round"/>
    <g id="viz-playbook">
      <rect x="290" y="100" width="180" height="120" rx="14" fill="#081827" stroke="#12b5e5" stroke-width="2"/>
      <text x="380" y="130" fill="#12b5e5" font-family="monospace" font-size="11" font-weight="700" text-anchor="middle">site.yml</text>
      <text x="310" y="156" fill="#9fb3c8" font-family="monospace" font-size="10">- ios_vlans:</text>
      <text x="310" y="174" fill="#9fb3c8" font-family="monospace" font-size="10">- ios_config:</text>
      <text x="310" y="192" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9">YAML in Git for review</text>
    </g>
    <line x1="470" y1="160" x2="520" y2="160" stroke="#049FD9" stroke-width="3" stroke-linecap="round"/>
    <g id="viz-modules">
      <rect x="520" y="120" width="100" height="80" rx="12" fill="#112115" stroke="#f59e0b" stroke-width="2"/>
      <text x="570" y="156" fill="#f59e0b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="700" text-anchor="middle">Modules</text>
      <text x="570" y="178" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" text-anchor="middle">idempotent</text>
    </g>
    <g id="viz-agentless">
      <rect x="160" y="280" width="352" height="50" rx="12" fill="#0b2237" stroke="#6CC04A" stroke-width="2"/>
      <text x="336" y="302" fill="#6CC04A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="700" text-anchor="middle">Agentless — SSH or API, no daemon on switches</text>
      <text x="336" y="320" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">Objective 1.1: VLANs, interfaces, OSPF, ACLs</text>
    </g>
  </g>
</svg>
