<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 640" role="img" aria-label="Four capstone files">
  <rect width="720" height="640" fill="#0b1f33"/>
  <circle cx="620" cy="80" r="120" fill="#049FD9" opacity="0.07"/>
  <circle cx="90" cy="560" r="130" fill="#6CC04A" opacity="0.06"/>
  <g id="viz-main">
    <rect x="24" y="24" width="672" height="592" rx="24" fill="#0b1728" stroke="#203a56" stroke-width="1.5"/>
    
    <g id="viz-inv">
      <rect x="60" y="120" width="240" height="80" rx="12" fill="#081827" stroke="#6CC04A" stroke-width="2"/>
      <text x="180" y="150" fill="#6CC04A" font-family="monospace" font-size="11" font-weight="700" text-anchor="middle">branch.yml</text>
      <text x="180" y="176" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">Who to connect to</text>
    </g>
    <g id="viz-play">
      <rect x="360" y="120" width="240" height="80" rx="12" fill="#081827" stroke="#12b5e5" stroke-width="2"/>
      <text x="480" y="150" fill="#12b5e5" font-family="monospace" font-size="11" font-weight="700" text-anchor="middle">branch_site.yml</text>
      <text x="480" y="176" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">What to configure</text>
    </g>
    <g id="viz-verify">
      <rect x="60" y="240" width="240" height="80" rx="12" fill="#081827" stroke="#f59e0b" stroke-width="2"/>
      <text x="180" y="270" fill="#f59e0b" font-family="monospace" font-size="11" font-weight="700" text-anchor="middle">verify_branch.py</text>
      <text x="180" y="296" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">CLI check after apply</text>
    </g>
    <g id="viz-rest">
      <rect x="360" y="240" width="240" height="80" rx="12" fill="#081827" stroke="#a78bfa" stroke-width="2"/>
      <text x="480" y="270" fill="#a78bfa" font-family="monospace" font-size="11" font-weight="700" text-anchor="middle">restconf_validate.py</text>
      <text x="480" y="296" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">Optional JSON cross-check</text>
    </g>
    <text x="336" y="370" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" text-anchor="middle">Next slides show each file line by line</text>
  </g>
</svg>
