<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 640" role="img" aria-label="Six steps in order">
  <rect width="720" height="640" fill="#0b1f33"/>
  <circle cx="620" cy="80" r="120" fill="#049FD9" opacity="0.07"/>
  <circle cx="90" cy="560" r="130" fill="#6CC04A" opacity="0.06"/>
  <g id="viz-main">
    <rect x="24" y="24" width="672" height="592" rx="24" fill="#0b1728" stroke="#203a56" stroke-width="1.5"/>
    
    <g id="viz-s1">
    <rect x="80" y="90" width="100" height="44" rx="14" fill="#081827" stroke="#12b5e5" stroke-width="2"/>
    <text x="130" y="117" fill="#12b5e5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="700" text-anchor="middle">1. venv</text>
  </g>
    <g id="viz-s2">
    <rect x="200" y="90" width="100" height="44" rx="14" fill="#081827" stroke="#12b5e5" stroke-width="2"/>
    <text x="250" y="117" fill="#12b5e5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="700" text-anchor="middle">2. inventory</text>
  </g>
    <g id="viz-s3">
    <rect x="320" y="90" width="100" height="44" rx="14" fill="#081827" stroke="#f59e0b" stroke-width="2"/>
    <text x="370" y="117" fill="#f59e0b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="700" text-anchor="middle">3. --check</text>
  </g>
    <g id="viz-s4">
    <rect x="440" y="90" width="100" height="44" rx="14" fill="#081827" stroke="#6CC04A" stroke-width="2"/>
    <text x="490" y="117" fill="#6CC04A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="700" text-anchor="middle">4. apply</text>
  </g>
    <g id="viz-s5">
    <rect x="200" y="160" width="120" height="44" rx="14" fill="#081827" stroke="#f59e0b" stroke-width="2"/>
    <text x="260" y="187" fill="#f59e0b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="700" text-anchor="middle">5. verify.py</text>
  </g>
    <g id="viz-s6">
    <rect x="340" y="160" width="140" height="44" rx="14" fill="#081827" stroke="#a78bfa" stroke-width="2"/>
    <text x="410" y="187" fill="#a78bfa" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" font-weight="700" text-anchor="middle">6. REST optional</text>
  </g>
    <line x1="180" y1="112" x2="200" y2="112" stroke="#049FD9" stroke-width="3" stroke-linecap="round"/>
    <line x1="300" y1="112" x2="320" y2="112" stroke="#049FD9" stroke-width="3" stroke-linecap="round"/>
    <line x1="420" y1="112" x2="440" y2="112" stroke="#049FD9" stroke-width="3" stroke-linecap="round"/>
    <line x1="490" y1="134" x2="380" y2="160" stroke="#049FD9" stroke-width="3" stroke-linecap="round"/>
    <line x1="320" y1="182" x2="340" y2="182" stroke="#049FD9" stroke-width="3" stroke-linecap="round"/>
    <g id="viz-limit">
      <rect x="140" y="250" width="392" height="56" rx="12" fill="#112115" stroke="#ef4444" stroke-width="1.5"/>
      <text x="336" y="274" fill="#ef4444" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="700" text-anchor="middle">First run: --limit branch-sw1</text>
      <text x="336" y="294" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">Test one switch before both</text>
    </g>
  </g>
