  </g>
      <line x1="170" y1="125" x2="210" y2="125" stroke="#049FD9" stroke-width="3" stroke-linecap="round"/>
      <g id="viz-m2">
    <rect x="210" y="100" width="110" height="50" rx="14" fill="#081827" stroke="#f59e0b" stroke-width="2"/>
