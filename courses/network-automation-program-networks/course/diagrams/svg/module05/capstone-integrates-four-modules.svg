  </g>
      <line x1="470" y1="125" x2="510" y2="125" stroke="#049FD9" stroke-width="3" stroke-linecap="round"/>
      <g id="viz-m4">
    <rect x="510" y="100" width="110" height="50" rx="14" fill="#081827" stroke="#a78bfa" stroke-width="2"/>
