      <text x="360" y="232" fill="#12b5e5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="800" text-anchor="middle">Capstone sequence</text>
      <text x="360" y="258" fill="#a78bfa" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" text-anchor="middle">Ansible apply (M4)</text>
