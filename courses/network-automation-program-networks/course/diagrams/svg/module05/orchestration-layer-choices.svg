<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 640" role="img" aria-label="Apply left, verify right">
  <rect width="720" height="640" fill="#0b1f33"/>
  <circle cx="620" cy="80" r="120" fill="#049FD9" opacity="0.07"/>
  <circle cx="90" cy="560" r="130" fill="#6CC04A" opacity="0.06"/>
  <g id="viz-main">
    <rect x="24" y="24" width="672" height="592" rx="24" fill="#0b1728" stroke="#203a56" stroke-width="1.5"/>
    
    <g id="viz-apply-side">
      <rect x="56" y="100" width="260" height="200" rx="16" fill="#112115" stroke="#a78bfa" stroke-width="2"/>
      <text x="186" y="132" fill="#a78bfa" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="800" text-anchor="middle">Apply (M4)</text>
      <text x="186" y="168" fill="#9fb3c8" font-family="monospace" font-size="10" text-anchor="middle">inventory/branch.yml</text>
      <text x="186" y="192" fill="#9fb3c8" font-family="monospace" font-size="10" text-anchor="middle">playbooks/branch_site.yml</text>
      <text x="186" y="220" fill="#f59e0b" font-family="monospace" font-size="10" text-anchor="middle">--check then apply</text>
      <text x="186" y="270" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">Ansible pushes config</text>
    </g>
    <g id="viz-verify-side">
      <rect x="356" y="100" width="260" height="200" rx="16" fill="#081827" stroke="#6CC04A" stroke-width="2"/>
      <text x="486" y="132" fill="#6CC04A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="800" text-anchor="middle">Verify (M2 + M3)</text>
      <text x="486" y="168" fill="#9fb3c8" font-family="monospace" font-size="10" text-anchor="middle">verify_branch.py</text>
      <text x="486" y="192" fill="#9fb3c8" font-family="monospace" font-size="10" text-anchor="middle">show vlan brief</text>
      <text x="486" y="220" fill="#12b5e5" font-family="monospace" font-size="10" text-anchor="middle">restconf_validate.py</text>
      <text x="486" y="270" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">Read output before stopping</text>
    </g>
    <text x="336" y="350" fill="#ef4444" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" text-anchor="middle">Never skip check mode or verify output</text>
  </g>
</svg>
