  <circle cx="90" cy="560" r="130" fill="#6CC04A" opacity="0.06"/>
  <g id="viz-main">
    <rect x="24" y="24" width="672" height="592" rx="24" fill="#0b1728" stroke="#203a56" stroke-width="1.5"/>
    
    <line x1="80" y1="200" x2="580" y2="200" stroke="#049FD9" stroke-width="3" stroke-linecap="round"/>
    <g id="viz-check-1">
    <rect x="60" y="170" width="100" height="60" rx="14" fill="#081827" stroke="#12b5e5" stroke-width="2"/>
    <text x="110" y="205" fill="#12b5e5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="700" text-anchor="middle">2 SW</text>
  </g>
    <g id="viz-check-2">
