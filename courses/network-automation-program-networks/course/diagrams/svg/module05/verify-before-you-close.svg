<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 640" role="img" aria-label="Read verify output">
  <rect width="720" height="640" fill="#0b1f33"/>
  <circle cx="620" cy="80" r="120" fill="#049FD9" opacity="0.07"/>
  <circle cx="90" cy="560" r="130" fill="#6CC04A" opacity="0.06"/>
  <g id="viz-main">
    <rect x="24" y="24" width="672" height="592" rx="24" fill="#0b1728" stroke="#203a56" stroke-width="1.5"/>
    
    <g id="viz-script">
    <rect x="180" y="90" width="280" height="100" rx="12" fill="#2a1f08" stroke="#f59e0b" stroke-width="2"/>
    <text x="320" y="116" fill="#f59e0b" font-family="monospace" font-size="11" font-weight="700" text-anchor="middle">verify_branch.py</text>
    <text x="320" y="134" fill="#9fb3c8" font-family="monospace" font-size="9" text-anchor="middle">show vlan brief</text>
    <text x="320" y="150" fill="#9fb3c8" font-family="monospace" font-size="9" text-anchor="middle">VLAN 100 on both</text>
  </g>
    <g id="viz-output">
      <rect x="100" y="220" width="472" height="120" rx="14" fill="#020617" stroke="#6CC04A" stroke-width="2"/>
      <text x="120" y="252" fill="#64748b" font-family="monospace" font-size="10">--- 192.168.1.10 show vlan brief ---</text>
      <text x="120" y="274" fill="#6CC04A" font-family="monospace" font-size="10">100   DATA_VLAN    active</text>
      <text x="120" y="300" fill="#64748b" font-family="monospace" font-size="10">--- 192.168.1.11 show vlan brief ---</text>
      <text x="120" y="322" fill="#6CC04A" font-family="monospace" font-size="10">100   DATA_VLAN    active</text>
    </g>
    <text x="336" y="380" fill="#ef4444" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" text-anchor="middle">Missing VLAN on either switch = lab not done</text>
  </g>
</svg>
