<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 640" role="img" aria-label="Dial-out vs dial-in telemetry">
  <rect width="720" height="640" fill="#0b1f33"/>
  <circle cx="620" cy="80" r="120" fill="#049FD9" opacity="0.07"/>
  <circle cx="90" cy="560" r="130" fill="#6CC04A" opacity="0.06"/>
  <g id="viz-main">
    <rect x="24" y="24" width="672" height="592" rx="24" fill="#0b1728" stroke="#203a56" stroke-width="1.5"/>
    
    <text x="48" y="58" fill="#049FD9" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="800" letter-spacing="0.14em">COMPARE</text>
    <text x="48" y="84" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="800">Dial-out vs dial-in telemetry</text>
    <g id="viz-dial-out">
    <rect x="48" y="108" width="296" height="248" rx="16" fill="#112115" stroke="#6CC04A" stroke-width="2"/>
    <text x="196" y="136" fill="#6CC04A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="800" text-anchor="middle">Dial-out (push)</text>
    <text x="72" y="148" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="700">Device connects to collector</text><text x="72" y="170" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10">Destination IP + port</text><text x="72" y="192" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10">IOS XE MDT subscription</text><text x="72" y="214" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10">Firewall: egress from device</text>
  </g><g id="viz-dial-in">
    <rect x="376" y="108" width="296" height="248" rx="16" fill="#081827" stroke="#12b5e5" stroke-width="2"/>
    <text x="524" y="136" fill="#12b5e5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="800" text-anchor="middle">Dial-in (subscribe)</text>
    <text x="400" y="148" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="700">Collector connects to device</text><text x="400" y="170" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10">gNMI client to :57400</text><text x="400" y="192" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10">Client opens subscription</text><text x="400" y="214" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10">Firewall: inbound to device</text>
  </g>
  </g>
</svg>
