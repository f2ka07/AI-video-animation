<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 640" role="img" aria-label="Why snapshots are not enough">
  <rect width="720" height="640" fill="#0b1f33"/>
  <circle cx="620" cy="80" r="120" fill="#049FD9" opacity="0.07"/>
  <circle cx="90" cy="560" r="130" fill="#6CC04A" opacity="0.06"/>
  <g id="viz-main">
    <rect x="24" y="24" width="672" height="592" rx="24" fill="#0b1728" stroke="#203a56" stroke-width="1.5"/>
    
    
    <text x="48" y="52" fill="#049FD9" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="800" letter-spacing="0.14em">COURSE 3</text>
    <text x="48" y="74" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="800">Operate what you deployed — health after deploy</text>
    <g id="viz-snapshot">
    <rect x="48" y="92" width="296" height="168" rx="16" fill="#1a1215" stroke="#ef4444" stroke-width="2"/>
    <text x="196" y="120" fill="#ef4444" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="800" text-anchor="middle">Show command snapshot</text>
    <rect x="72" y="124" width="248" height="72" rx="10" fill="#020617" stroke="#35536f" stroke-width="1.5"/><text x="88" y="148" fill="#6CC04A" font-family="monospace" font-size="9">$ show int | inc errors</text><text x="88" y="166" fill="#9fb3c8" font-family="monospace" font-size="9">T+0 OK  T+5 OK</text><text x="88" y="184" fill="#64748b" font-family="monospace" font-size="9"># spike missed at T+2</text>
      <text x="196" y="244" fill="#ef4444" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="700" text-anchor="middle">Silent drift between polls</text>
  </g>
    <g id="viz-stream">
    <rect x="376" y="92" width="296" height="168" rx="16" fill="#081827" stroke="#12b5e5" stroke-width="2"/>
    <text x="524" y="120" fill="#12b5e5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="800" text-anchor="middle">Model-driven telemetry</text>
    <rect x="400" y="124" width="248" height="72" rx="10" fill="#020617" stroke="#35536f" stroke-width="1.5"/><text x="416" y="148" fill="#9fb3c8" font-family="monospace" font-size="9">device --gRPC--> collector</text><text x="416" y="166" fill="#9fb3c8" font-family="monospace" font-size="9">YANG: interfaces-state</text><text x="416" y="184" fill="#9fb3c8" font-family="monospace" font-size="9">push on change</text>
      <text x="524" y="244" fill="#12b5e5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="700" text-anchor="middle">Live structured state</text>
  </g>
    <g id="viz-objective">
    <rect x="48" y="388" width="624" height="44" rx="12" fill="#0b2237" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="360" y="408" fill="#f59e0b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="700" text-anchor="middle">Exam 3.1 — telemetry architecture</text>
    <text x="360" y="424" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">Prove health after deploy — not just config push</text>
  </g>
  </g>
</svg>
