<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 640" role="img" aria-label="CCNP exam alignment">
  <rect width="720" height="640" fill="#0b1f33"/>
  <circle cx="620" cy="80" r="120" fill="#049FD9" opacity="0.07"/>
  <circle cx="90" cy="560" r="130" fill="#6CC04A" opacity="0.06"/>
  <g id="viz-main">
    <rect x="24" y="24" width="672" height="592" rx="24" fill="#0b1728" stroke="#203a56" stroke-width="1.5"/>
    
    
    <text x="48" y="58" fill="#049FD9" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="800" letter-spacing="0.14em">EXAM ALIGN</text>
    <text x="48" y="84" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="800">CCNP Automation domain 3.x</text>
    
    <line id="viz-exam-line" x1="120" y1="200" x2="540" y2="200" stroke="#049FD9" stroke-width="3" stroke-linecap="round"/>
    <g id="viz-exam-1"><circle cx="160" cy="200" r="32" fill="#082f49" stroke="#12b5e5" stroke-width="3"/>
      <text x="160" y="248" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="700" text-anchor="middle">Learn</text></g>
    <g id="viz-exam-2"><circle cx="360" cy="200" r="32" fill="#163119" stroke="#6CC04A" stroke-width="3"/>
      <text x="360" y="248" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="700" text-anchor="middle">Lab</text></g>
    <g id="viz-exam-3"><circle cx="560" cy="200" r="32" fill="#3a2508" stroke="#f59e0b" stroke-width="3"/>
      <text x="560" y="248" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="700" text-anchor="middle">Exam</text></g>
    <g id="viz-badge">
      <rect x="200" y="290" width="320" height="88" rx="16" fill="#0b2237" stroke="#12b5e5" stroke-width="2"/>
      <text x="360" y="322" fill="#12b5e5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="900" text-anchor="middle">AUTOCOR objective 3.2</text>
      <text x="360" y="348" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" text-anchor="middle">Mapped to lab workflow end to end</text>
    </g>
  </g>
</svg>
