<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 640" role="img" aria-label="Diagnose automation from logs">
  <rect width="720" height="640" fill="#0b1f33"/>
  <circle cx="620" cy="80" r="120" fill="#049FD9" opacity="0.07"/>
  <circle cx="90" cy="560" r="130" fill="#6CC04A" opacity="0.06"/>
  <g id="viz-main">
    <rect x="24" y="24" width="672" height="592" rx="24" fill="#0b1728" stroke="#203a56" stroke-width="1.5"/>
    
    
    <text x="48" y="58" fill="#049FD9" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="800" letter-spacing="0.14em">DEBUG</text>
    <text x="48" y="84" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="800">Trace the failed run</text>
    
  <g id="viz-log"><rect x="80" y="130" width="560" height="140" rx="10" fill="#020617" stroke="#35536f" stroke-width="1.5"/><text x="96" y="154" fill="#9fb3c8" font-family="monospace" font-size="9">{"run_id":"a91f","device":"R1",</text><text x="96" y="172" fill="#9fb3c8" font-family="monospace" font-size="9"> "task":"vlan_push","status":"failed",</text><text x="96" y="190" fill="#9fb3c8" font-family="monospace" font-size="9"> "error":"RESTCONF 409 conflict"}</text><text x="96" y="208" fill="#64748b" font-family="monospace" font-size="9"># search: run_id=a91f</text></g>
    <g id="viz-fix"><rect x="200" y="300" width="320" height="64" rx="12" fill="#112115" stroke="#6CC04A" stroke-width="2"/>
      <text x="360" y="338" fill="#6CC04A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="700" text-anchor="middle">Replay + fix idempotency</text></g>
  </g>
</svg>
