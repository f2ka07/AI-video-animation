<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 640" role="img" aria-label="Event workflows for automation">
  <rect width="720" height="640" fill="#0b1f33"/>
  <circle cx="620" cy="80" r="120" fill="#049FD9" opacity="0.07"/>
  <circle cx="90" cy="560" r="130" fill="#6CC04A" opacity="0.06"/>
  <g id="viz-main">
    <rect x="24" y="24" width="672" height="592" rx="24" fill="#0b1728" stroke="#203a56" stroke-width="1.5"/>
    
    
    <text x="48" y="58" fill="#049FD9" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="800" letter-spacing="0.14em">WORKFLOW</text>
    <text x="48" y="84" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="800">Log event triggers action</text>
    
    <g id="viz-trigger"><rect x="80" y="170" width="140" height="64" rx="12" fill="#1a1215" stroke="#ef4444" stroke-width="2"/>
      <text x="150" y="208" fill="#ef4444" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="700" text-anchor="middle">Alert: error spike</text></g>
    <line x1="220" y1="202" x2="280" y2="202" stroke="#049FD9" stroke-width="3" stroke-linecap="round"/>
    <g id="viz-enrich"><rect x="280" y="170" width="140" height="64" rx="12" fill="#081827" stroke="#f59e0b" stroke-width="2"/>
      <text x="350" y="208" fill="#f59e0b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="700" text-anchor="middle">Correlate logs</text></g>
    <line x1="420" y1="202" x2="480" y2="202" stroke="#049FD9" stroke-width="3" stroke-linecap="round"/>
    <g id="viz-action"><rect x="480" y="170" width="140" height="64" rx="12" fill="#112115" stroke="#6CC04A" stroke-width="2"/>
      <text x="550" y="208" fill="#6CC04A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="700" text-anchor="middle">Run playbook</text></g>
  </g>
</svg>
