<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 640" role="img" aria-label="Logging architecture components">
  <rect width="720" height="640" fill="#0b1f33"/>
  <circle cx="620" cy="80" r="120" fill="#049FD9" opacity="0.07"/>
  <circle cx="90" cy="560" r="130" fill="#6CC04A" opacity="0.06"/>
  <g id="viz-main">
    <rect x="24" y="24" width="672" height="592" rx="24" fill="#0b1728" stroke="#203a56" stroke-width="1.5"/>
    
    <text x="48" y="58" fill="#049FD9" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="800" letter-spacing="0.14em">ARCHITECTURE</text>
    <text x="48" y="84" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="800">Logging architecture components</text>
    <line x1="150" y1="200" x2="200" y2="200" stroke="#049FD9" stroke-width="3" stroke-linecap="round"/>
      <g id="viz-source">
        <circle cx="100" cy="200" r="34" fill="#082f49" stroke="#12b5e5" stroke-width="3"/>
        <text x="100" y="206" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="800" text-anchor="middle">1</text>
        <text x="100" y="256" fill="#12b5e5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="700" text-anchor="middle">Sources</text>
      </g><line x1="300" y1="200" x2="350" y2="200" stroke="#049FD9" stroke-width="3" stroke-linecap="round"/>
      <g id="viz-agent">
        <circle cx="250" cy="200" r="34" fill="#082f49" stroke="#6CC04A" stroke-width="3"/>
        <text x="250" y="206" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="800" text-anchor="middle">2</text>
        <text x="250" y="256" fill="#6CC04A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="700" text-anchor="middle">Forwarder</text>
      </g><line x1="450" y1="200" x2="500" y2="200" stroke="#049FD9" stroke-width="3" stroke-linecap="round"/>
      <g id="viz-store">
        <circle cx="400" cy="200" r="34" fill="#082f49" stroke="#f59e0b" stroke-width="3"/>
        <text x="400" y="206" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="800" text-anchor="middle">3</text>
        <text x="400" y="256" fill="#f59e0b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="700" text-anchor="middle">Store</text>
      </g>
      <g id="viz-query">
        <circle cx="550" cy="200" r="34" fill="#082f49" stroke="#a78bfa" stroke-width="3"/>
        <text x="550" y="206" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="800" text-anchor="middle">4</text>
        <text x="550" y="256" fill="#a78bfa" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="700" text-anchor="middle">Query</text>
      </g>
    <text x="360" y="320" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" text-anchor="middle">Devices + runners → Fluent Bit → index → search/alert</text>
  </g>
</svg>
