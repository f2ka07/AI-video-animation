<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 640" role="img" aria-label="Metrics without logs blind spots">
  <rect width="720" height="640" fill="#0b1f33"/>
  <circle cx="620" cy="80" r="120" fill="#049FD9" opacity="0.07"/>
  <circle cx="90" cy="560" r="130" fill="#6CC04A" opacity="0.06"/>
  <g id="viz-main">
    <rect x="24" y="24" width="672" height="592" rx="24" fill="#0b1728" stroke="#203a56" stroke-width="1.5"/>
    
    
    <text x="48" y="58" fill="#049FD9" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="800" letter-spacing="0.14em">GAP</text>
    <text x="48" y="84" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="800">Counters without context</text>
    
    <g id="viz-metrics">
    <rect x="48" y="120" width="296" height="200" rx="16" fill="#081827" stroke="#12b5e5" stroke-width="2"/>
    <text x="196" y="148" fill="#12b5e5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="800" text-anchor="middle">Prometheus metrics</text>
    <text x="196" y="168" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">CPU 42%  errors 0</text>
      <text x="196" y="196" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">Green dashboard</text>
      <text x="196" y="224" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">No who/what/when</text>
  </g>
    <g id="viz-blind">
    <rect x="376" y="120" width="296" height="200" rx="16" fill="#1a1215" stroke="#ef4444" stroke-width="2"/>
    <text x="524" y="148" fill="#ef4444" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="800" text-anchor="middle">Missing log context</text>
    <text x="524" y="168" fill="#ef4444" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="700" text-anchor="middle">Automation failed at 02:14</text>
      <text x="524" y="196" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">Which playbook? Which device?</text>
      <text x="524" y="224" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">Metrics did not explain why</text>
  </g>
    <g id="viz-objective">
    <rect x="48" y="480" width="624" height="52" rx="12" fill="#0b2237" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="360" y="504" fill="#f59e0b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="700" text-anchor="middle">Exam 3.2 — logging strategy</text>
    <text x="360" y="522" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">Correlate events to automation runs</text>
  </g>
  </g>
</svg>
