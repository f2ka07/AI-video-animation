<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 640" role="img" aria-label="Structured vs unstructured logs">
  <rect width="720" height="640" fill="#0b1f33"/>
  <circle cx="620" cy="80" r="120" fill="#049FD9" opacity="0.07"/>
  <circle cx="90" cy="560" r="130" fill="#6CC04A" opacity="0.06"/>
  <g id="viz-main">
    <rect x="24" y="24" width="672" height="592" rx="24" fill="#0b1728" stroke="#203a56" stroke-width="1.5"/>
    
    
    <text x="48" y="58" fill="#049FD9" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="800" letter-spacing="0.14em">FORMAT</text>
    <text x="48" y="84" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="800">Parse once — query many times</text>
    
    <g id="viz-unstructured">
    <rect x="48" y="120" width="296" height="200" rx="16" fill="#081827" stroke="#ef4444" stroke-width="2"/>
    <text x="196" y="148" fill="#ef4444" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="800" text-anchor="middle">Unstructured</text>
    <rect x="72" y="156" width="248" height="72" rx="10" fill="#020617" stroke="#35536f" stroke-width="1.5"/><text x="88" y="180" fill="#9fb3c8" font-family="monospace" font-size="9">ERROR: vlan push failed</text><text x="88" y="198" fill="#9fb3c8" font-family="monospace" font-size="9">on SW2 - check output</text>
      <text x="196" y="260" fill="#ef4444" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">Regex fragile</text>
  </g>
    <g id="viz-structured">
    <rect x="376" y="120" width="296" height="200" rx="16" fill="#112115" stroke="#6CC04A" stroke-width="2"/>
    <text x="524" y="148" fill="#6CC04A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="800" text-anchor="middle">Structured JSON</text>
    <rect x="400" y="156" width="248" height="88" rx="10" fill="#020617" stroke="#35536f" stroke-width="1.5"/><text x="416" y="180" fill="#9fb3c8" font-family="monospace" font-size="9">{"device":"SW2",</text><text x="416" y="198" fill="#9fb3c8" font-family="monospace" font-size="9"> "vlan":100,</text><text x="416" y="216" fill="#9fb3c8" font-family="monospace" font-size="9"> "result":"failed"}</text>
      <text x="524" y="260" fill="#6CC04A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">Filter by field</text>
  </g>
  </g>
</svg>
