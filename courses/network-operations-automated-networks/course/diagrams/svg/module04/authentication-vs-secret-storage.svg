<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 640" role="img" aria-label="Authentication vs secret storage">
  <rect width="720" height="640" fill="#0b1f33"/>
  <circle cx="620" cy="80" r="120" fill="#049FD9" opacity="0.07"/>
  <circle cx="90" cy="560" r="130" fill="#6CC04A" opacity="0.06"/>
  <g id="viz-main">
    <rect x="24" y="24" width="672" height="592" rx="24" fill="#0b1728" stroke="#203a56" stroke-width="1.5"/>
    
    <text x="48" y="58" fill="#049FD9" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="800" letter-spacing="0.14em">COMPARE</text>
    <text x="48" y="84" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="800">Authentication vs secret storage</text>
    <g id="viz-authn">
    <rect x="48" y="108" width="296" height="248" rx="16" fill="#081827" stroke="#12b5e5" stroke-width="2"/>
    <text x="196" y="136" fill="#12b5e5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="800" text-anchor="middle">Authentication</text>
    <text x="72" y="148" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="700">Who is calling API?</text><text x="72" y="170" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10">Tokens / certs / RBAC</text><text x="72" y="192" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10">Per-service identity</text><text x="72" y="214" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10">Short-lived creds</text>
  </g><g id="viz-secrets">
    <rect x="376" y="108" width="296" height="248" rx="16" fill="#081827" stroke="#a78bfa" stroke-width="2"/>
    <text x="524" y="136" fill="#a78bfa" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="800" text-anchor="middle">Secret storage</text>
    <text x="400" y="148" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="700">Where passwords live</text><text x="400" y="170" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10">Vault / CI variables</text><text x="400" y="192" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10">Never in Git</text><text x="400" y="214" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10">Rotation policy</text>
  </g>
  </g>
</svg>
