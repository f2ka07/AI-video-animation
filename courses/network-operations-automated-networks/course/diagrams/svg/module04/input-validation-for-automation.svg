<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 640" role="img" aria-label="Input validation for automation">
  <rect width="720" height="640" fill="#0b1f33"/>
  <circle cx="620" cy="80" r="120" fill="#049FD9" opacity="0.07"/>
  <circle cx="90" cy="560" r="130" fill="#6CC04A" opacity="0.06"/>
  <g id="viz-main">
    <rect x="24" y="24" width="672" height="592" rx="24" fill="#0b1728" stroke="#203a56" stroke-width="1.5"/>
    
    
    <text x="48" y="58" fill="#049FD9" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="800" letter-spacing="0.14em">VALIDATE INPUT</text>
    <text x="48" y="84" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="800">Never trust inventory blindly</text>
    
    <g id="viz-input"><rect x="80" y="130" width="260" height="100" rx="10" fill="#020617" stroke="#35536f" stroke-width="1.5"/><text x="96" y="154" fill="#9fb3c8" font-family="monospace" font-size="9">device: SW2</text><text x="96" y="172" fill="#9fb3c8" font-family="monospace" font-size="9">vlan: 9999</text><text x="96" y="190" fill="#9fb3c8" font-family="monospace" font-size="9">interface: ../../etc</text></g>
    <line x1="340" y1="180" x2="400" y2="180" stroke="#049FD9" stroke-width="3" stroke-linecap="round"/>
    <g id="viz-guard"><rect x="400" y="130" width="260" height="100" rx="10" fill="#020617" stroke="#35536f" stroke-width="1.5"/><text x="416" y="154" fill="#9fb3c8" font-family="monospace" font-size="9">schema.validate()</text><text x="416" y="172" fill="#9fb3c8" font-family="monospace" font-size="9">vlan 1-4094 only</text><text x="416" y="190" fill="#9fb3c8" font-family="monospace" font-size="9">reject path traversal</text></g>
  </g>
</svg>
