<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 640" role="img" aria-label="Plaintext secrets risk">
  <rect width="720" height="640" fill="#0b1f33"/>
  <circle cx="620" cy="80" r="120" fill="#049FD9" opacity="0.07"/>
  <circle cx="90" cy="560" r="130" fill="#6CC04A" opacity="0.06"/>
  <g id="viz-main">
    <rect x="24" y="24" width="672" height="592" rx="24" fill="#0b1728" stroke="#203a56" stroke-width="1.5"/>
    
    
    <text x="48" y="58" fill="#049FD9" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="800" letter-spacing="0.14em">RISK</text>
    <text x="48" y="84" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="800">Secrets in Git and logs</text>
    
    <g id="viz-bad">
    <rect x="48" y="120" width="296" height="220" rx="16" fill="#1a1215" stroke="#ef4444" stroke-width="2"/>
    <text x="196" y="148" fill="#ef4444" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="800" text-anchor="middle">Anti-pattern</text>
    <rect x="72" y="156" width="248" height="100" rx="10" fill="#020617" stroke="#35536f" stroke-width="1.5"/><text x="88" y="180" fill="#9fb3c8" font-family="monospace" font-size="9">password: admin123</text><text x="88" y="198" fill="#9fb3c8" font-family="monospace" font-size="9">api_key=sk-live-...</text><text x="88" y="216" fill="#64748b" font-family="monospace" font-size="9"># committed to Git</text>
      <text x="196" y="280" fill="#ef4444" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="700" text-anchor="middle">Audit fail + leak</text>
  </g>
    <g id="viz-good">
    <rect x="376" y="120" width="296" height="220" rx="16" fill="#112115" stroke="#6CC04A" stroke-width="2"/>
    <text x="524" y="148" fill="#6CC04A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="800" text-anchor="middle">Secure pattern</text>
    <rect x="400" y="156" width="248" height="100" rx="10" fill="#020617" stroke="#35536f" stroke-width="1.5"/><text x="416" y="180" fill="#9fb3c8" font-family="monospace" font-size="9">vault read secret/data/net</text><text x="416" y="198" fill="#9fb3c8" font-family="monospace" font-size="9">env: NET_USER from CI var</text><text x="416" y="216" fill="#9fb3c8" font-family="monospace" font-size="9">TLS verify=True</text>
      <text x="524" y="280" fill="#6CC04A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="700" text-anchor="middle">Secrets outside repo</text>
  </g>
  </g>
</svg>
