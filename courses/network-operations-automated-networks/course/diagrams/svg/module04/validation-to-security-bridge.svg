<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 640" role="img" aria-label="Security bridge">
  <rect width="720" height="640" fill="#0b1f33"/>
  <circle cx="620" cy="80" r="120" fill="#049FD9" opacity="0.07"/>
  <circle cx="90" cy="560" r="130" fill="#6CC04A" opacity="0.06"/>
  <g id="viz-main">
    <rect x="24" y="24" width="672" height="592" rx="24" fill="#0b1728" stroke="#203a56" stroke-width="1.5"/>
    
    
    <text x="48" y="58" fill="#049FD9" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="800" letter-spacing="0.14em">COURSE 3</text>
    <text x="48" y="84" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="800">Security bridge</text>
    
    <g id="viz-from">
      <rect x="56" y="120" width="180" height="100" rx="14" fill="#112115" stroke="#6CC04A" stroke-width="2"/>
      <text x="146" y="158" fill="#6CC04A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="800" text-anchor="middle">Validation gates</text>
      <text x="146" y="182" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">Courses 1-2 complete</text>
    </g>
    <line id="viz-bridge-line" x1="236" y1="170" x2="300" y2="170" stroke="#049FD9" stroke-width="3" stroke-linecap="round"/>
    <g id="viz-bridge">
      <rect x="300" y="120" width="180" height="100" rx="14" fill="#0b2237" stroke="#12b5e5" stroke-width="2"/>
      <text x="390" y="158" fill="#12b5e5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="800" text-anchor="middle">TLS + vault</text>
      <text x="390" y="182" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">New question</text>
    </g>
    <g id="viz-to">
      <rect x="500" y="120" width="180" height="100" rx="14" fill="#112115" stroke="#f59e0b" stroke-width="2"/>
      <text x="590" y="158" fill="#f59e0b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="800" text-anchor="middle">Plaintext OK?</text>
      <text x="590" y="182" fill="#9fb3c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">Operate domain 3.x</text>
    </g>
    <rect x="72" y="280" width="576" height="52" rx="12" fill="#0b2237" stroke="#049FD9" stroke-width="1.5"/>
    <text x="360" y="312" fill="#12b5e5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="700" text-anchor="middle">Deploy success is not proof of health</text>
  </g>
</svg>
