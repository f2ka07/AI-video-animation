<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 640" role="img" aria-label="Two-repo capstone layout">
  <rect width="720" height="640" fill="#0b1f33"/>
  <circle cx="620" cy="80" r="120" fill="#049FD9" opacity="0.07"/>
  <circle cx="90" cy="560" r="130" fill="#6CC04A" opacity="0.06"/>
  <g id="viz-main">
    <rect x="24" y="24" width="672" height="592" rx="24" fill="#0b1728" stroke="#203a56" stroke-width="1.5"/>
    
    
    <text x="48" y="58" fill="#049FD9" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="800" letter-spacing="0.14em">LAYOUT</text>
    <text x="48" y="84" fill="#f8fafc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="800">Separate IaC from observe/validate</text>
    
    <g id="viz-iac">
    <rect x="48" y="120" width="280" height="200" rx="16" fill="#081827" stroke="#6CC04A" stroke-width="2"/>
    <text x="188" y="148" fill="#6CC04A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="800" text-anchor="middle">netops_iac_lab (C2)</text>
    <text x="188" y="168" fill="#9fb3c8" font-family="monospace" font-size="10" text-anchor="middle">playbooks/</text>
      <text x="188" y="190" fill="#9fb3c8" font-family="monospace" font-size="10" text-anchor="middle">.gitlab-ci.yml</text>
      <text x="188" y="212" fill="#64748b" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" text-anchor="middle">Intent + pipeline</text>
  </g>
    <g id="viz-ops">
    <rect x="392" y="120" width="280" height="200" rx="16" fill="#081827" stroke="#12b5e5" stroke-width="2"/>
    <text x="532" y="148" fill="#12b5e5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="800" text-anchor="middle">netops_ops_lab (C3)</text>
    <text x="532" y="168" fill="#9fb3c8" font-family="monospace" font-size="10" text-anchor="middle">prometheus/</text>
