# Optional overrides when layering on docker-compose.yml (local helpers only).
#
#   docker compose -f docker-compose.yml -f docker-compose.cloud.yml up -d
#   docker compose -f docker-compose.yml -f docker-compose.cloud.yml --profile studio up -d

services:
  gentle:
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O /dev/null http://localhost:8765/ || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  remotion:
    profiles:
      - studio
      - stack

  mfa:
    profiles:
      - mfa
      - stack
