# Production: pull images from registry (used by GitHub Actions deploy)
# Set SLIDES_IMAGE=ghcr.io/owner/repo:latest before running
version: '3.8'

services:
  app:
    image: ${SLIDES_IMAGE:-ghcr.io/owner/my-slides:latest}
    container_name: slides-app
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - GENTLE_URL=http://gentle:8765
      - REMOTION_URL=http://remotion:3000
    volumes:
      - ./public:/app/public
      - ./courses:/app/courses
      - ./out:/app/out
    depends_on:
      - gentle
    restart: unless-stopped
    networks:
      - slides-network

  remotion:
    image: ${SLIDES_IMAGE:-ghcr.io/owner/my-slides:latest}
    container_name: slides-remotion
    command: ["npx", "remotion", "studio", "src/index.tsx"]
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NODE_ENV=production
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./scripts:/app/scripts
    restart: unless-stopped
    networks:
      - slides-network

  gentle:
    image: lowerquality/gentle:latest
    container_name: slides-gentle
    restart: unless-stopped
    networks:
      - slides-network

volumes: {}

networks:
  slides-network:
    driver: bridge
