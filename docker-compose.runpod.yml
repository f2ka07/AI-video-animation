# RunPod / GPU pod profile for docker-compose.prod.yml (full platform deploy only).
#
# Usage:
#   docker compose -f docker-compose.prod.yml -f docker-compose.runpod.yml up -d
#
# Not used with slim docker-compose.yml (local helpers only).

services:
  app:
    network_mode: host
    environment:
      - GENTLE_URL=http://127.0.0.1:8765
      - REMOTION_URL=http://127.0.0.1:3000

  remotion:
    network_mode: host

  gentle:
    network_mode: host
