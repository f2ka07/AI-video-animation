# Build once; remotion reuses the same image (saves disk on RunPod/small VMs)
x-app-image: &app-image
  build:
    context: .
    dockerfile: Dockerfile
  image: slides-app:local
  pull_policy: never

services:
  # Main app: GUI + Remotion (headless render)
  app:
    <<: *app-image
    container_name: slides-app
    ports:
      - "3001:3001"
    shm_size: '2gb'
    environment:
      - NODE_ENV=production
      - GENTLE_URL=http://gentle:8765
      - REMOTION_URL=http://remotion:3000
      - GUI_AUTH_USERNAME=${GUI_AUTH_USERNAME:-}
      - GUI_AUTH_PASSWORD=${GUI_AUTH_PASSWORD:-}
      - GUI_SESSION_SECRET=${GUI_SESSION_SECRET:-}
      - REMOTION_CPU_RESERVE=${REMOTION_CPU_RESERVE:-2}
      - REMOTION_CONCURRENCY=${REMOTION_CONCURRENCY:-}
    volumes:
      - ./public:/app/public
      - ./courses:/app/courses
      - ./out:/app/out
      - ./src:/app/src
      - ./gui:/app/gui
      - ./scripts:/app/scripts
      - ./workspace:/app/workspace
      - ./gui-server.js:/app/gui-server.js
    depends_on:
      gentle:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - slides-network

  # Remotion Studio for preview (optional — use: docker compose --profile studio up -d)
  remotion:
    <<: *app-image
    profiles:
      - studio
    container_name: slides-remotion
    command: ["npx", "remotion", "studio", "src/index.tsx"]
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NODE_ENV=production
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./scripts:/app/scripts
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - slides-network

  # Gentle: word alignment for extract-timings (internal only, not exposed)
  gentle:
    image: lowerquality/gentle:latest
    container_name: slides-gentle
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O /dev/null http://localhost:8765/ || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - slides-network

volumes: {}

networks:
  slides-network:
    driver: bridge
