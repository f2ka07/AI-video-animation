version: '3.8'

services:
  # Main app: GUI + Remotion (headless render)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: slides-app
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - GENTLE_URL=http://gentle:8765
      - REMOTION_URL=http://remotion:3000
    volumes:
      - ./public:/app/public
      - ./courses:/app/courses
      - ./out:/app/out
    depends_on:
      - gentle
    restart: unless-stopped
    networks:
      - slides-network

  # Remotion Studio for preview (localhost only - use SSH tunnel for remote)
  remotion:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: slides-remotion
    command: ["npx", "remotion", "studio", "src/index.tsx"]
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NODE_ENV=production
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./scripts:/app/scripts
    restart: unless-stopped
    networks:
      - slides-network

  # Gentle: word alignment for extract-timings (internal only, not exposed)
  gentle:
    image: lowerquality/gentle:latest
    container_name: slides-gentle
    restart: unless-stopped
    networks:
      - slides-network

volumes: {}

networks:
  slides-network:
    driver: bridge
