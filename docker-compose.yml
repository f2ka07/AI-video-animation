# Local Docker helpers only — NOT the full video platform.
#
# Host GUI (npm run gui) connects to these via localhost ports:
#   Gentle   -> http://127.0.0.1:8765  (GENTLE_URL)
#   Remotion -> http://127.0.0.1:3000  (REMOTION_STUDIO_URL; host npm start OR container)
#   MFA      -> ephemeral jobs only: npm run mfa:download-models / GUI Step 4 (method=mfa)
#
#   docker compose up -d                              # Gentle only
#   docker compose --profile studio up -d --build     # + Remotion container
#   npm run mfa:download-models                       # one-time MFA models (compose run, not up)
#
# Production full platform: docker-compose.prod.yml + SLIDES_IMAGE

services:
  gentle:
    image: lowerquality/gentle:latest
    container_name: slides-gentle
    pull_policy: always
    ports:
      - "127.0.0.1:${GENTLE_HOST_PORT:-8765}:8765"
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O /dev/null http://localhost:8765/ || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - slides-network

  # MFA: never `docker compose up mfa` — scripts use `compose run --rm --entrypoint mfa mfa ...`
  mfa:
    image: mmcauliffe/montreal-forced-aligner:latest
    profiles:
      - mfa
    pull_policy: if_not_present
    volumes:
      - mfa-models:/home/mfauser/Documents/MFA
    environment:
      - MFA_ROOT_DIR=/home/mfauser/Documents/MFA
    networks:
      - slides-network

  remotion:
    build:
      context: .
      dockerfile: Dockerfile.remotion
    image: slides-remotion:local
    pull_policy: never
    container_name: slides-remotion
    profiles:
      - studio
      - stack
    ports:
      - "127.0.0.1:${REMOTION_HOST_PORT:-3000}:3000"
    environment:
      - NODE_ENV=development
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./courses:/app/courses
      - ./scripts:/app/scripts
      - ./remotion.config.ts:/app/remotion.config.ts
      - ./tsconfig.json:/app/tsconfig.json
    restart: unless-stopped
    networks:
      - slides-network

volumes:
  mfa-models: {}

networks:
  slides-network:
    driver: bridge
