<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Git Version Control Machine</title>
    <style>
      body {
        margin: 0;
        background: #020617;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        color: #e5e7eb;
      }

      .visual-wrapper {
        width: 960px;
        height: 540px;
        background: radial-gradient(circle at top left, #111827, #020617);
        border-radius: 24px;
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
        padding: 32px;
        box-sizing: border-box;
        position: relative;
        overflow: hidden;
      }

      .visual {
        width: 100%;
        height: 100%;
      }

      svg {
        width: 100%;
        height: 100%;
      }

      /* Base parts */
      .part {
        transition:
          transform 0.4s ease,
          opacity 0.4s ease,
          filter 0.4s ease;
      }

      .belt {
        transition: stroke 0.4s ease;
      }

      /* Idle (phase 0) */
      [data-phase="0"] .part {
        opacity: 0.9;
      }

      /* Phase 1: input tray highlighted */
      [data-phase="1"] .part-input {
        transform: translateY(-4px);
        filter: drop-shadow(0 0 12px rgba(56, 189, 248, 0.9));
      }

      /* Phase 2: engine active */
      @keyframes cog-rotate {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes belt-flow {
        from {
          stroke-dashoffset: 40;
        }
        to {
          stroke-dashoffset: 0;
        }
      }

      [data-phase="2"] .part-cog {
        animation: cog-rotate 1.4s linear infinite;
        filter: drop-shadow(0 0 12px rgba(96, 165, 250, 0.9));
      }

      [data-phase="2"] .belt {
        stroke-dasharray: 4 4;
        animation: belt-flow 0.6s linear infinite;
        stroke: #38bdf8;
      }

      /* Phase 3: archive glowing (history) */
      [data-phase="3"] .part-archive rect {
        transform: translateY(-2px);
        filter: drop-shadow(0 0 12px rgba(34, 197, 94, 0.9));
      }

      /* Phase 4: output box glowing (current state) */
      [data-phase="4"] .part-output {
        transform: translateY(-4px);
        filter: drop-shadow(0 0 14px rgba(249, 115, 22, 0.9));
      }

      /* Optional tiny debug phase label (you can delete this block later) */
      .phase-label {
        position: absolute;
        bottom: 12px;
        left: 20px;
        font-size: 11px;
        color: #9ca3af;
        pointer-events: none;
      }

      .controls {
        position: absolute;
        bottom: 12px;
        right: 20px;
        display: flex;
        gap: 8px;
        font-size: 11px;
      }

      .controls button {
        border-radius: 999px;
        border: 1px solid #4b5563;
        background: #020617;
        color: #e5e7eb;
        padding: 4px 10px;
        cursor: pointer;
      }

      .controls button:hover {
        border-color: #9ca3af;
      }
    </style>
  </head>
  <body>
    <div class="visual-wrapper" id="vc-visual" data-phase="0">
      <div class="visual">
        <svg viewBox="0 0 380 260">
          <!-- Background halo -->
          <defs>
            <radialGradient id="bgHalo" cx="0.3" cy="0.1" r="0.9">
              <stop offset="0%" stop-color="#1f2937" stop-opacity="1" />
              <stop offset="100%" stop-color="#020617" stop-opacity="0" />
            </radialGradient>
          </defs>
          <rect x="0" y="0" width="380" height="260" fill="url(#bgHalo)" />

          <!-- Ground -->
          <rect
            x="20"
            y="190"
            width="340"
            height="30"
            rx="8"
            fill="#020617"
            stroke="#374151"
            stroke-width="1.3"
          />

          <!-- Input tray (edits) -->
          <g class="part part-input">
            <rect
              x="30"
              y="150"
              width="80"
              height="32"
              rx="6"
              fill="#0f172a"
              stroke="#4b5563"
              stroke-width="1"
            />
            <rect x="36" y="144" width="68" height="10" rx="4" fill="#1f2937" />
            <!-- files -->
            <rect x="38" y="120" width="26" height="18" rx="3" fill="#6b7280" />
            <rect x="62" y="112" width="26" height="18" rx="3" fill="#9ca3af" />
            <rect x="86" y="118" width="26" height="18" rx="3" fill="#6b7280" />
          </g>

          <!-- Belt from input to engine -->
          <line
            class="belt"
            x1="110"
            y1="166"
            x2="160"
            y2="166"
            stroke="#4b5563"
            stroke-width="4"
            stroke-linecap="round"
          />

          <!-- Version control engine (cog) -->
          <g class="part part-cog" transform="translate(190 140)">
            <circle r="30" fill="#111827" stroke="#60a5fa" stroke-width="2" />
            <!-- teeth -->
            <g stroke="#60a5fa" stroke-width="3">
              <line x1="0" y1="-38" x2="0" y2="-30" />
              <line x1="0" y1="38" x2="0" y2="30" />
              <line x1="-38" y1="0" x2="-30" y2="0" />
              <line x1="38" y1="0" x2="30" y2="0" />
              <line x1="26" y1="26" x2="19" y2="19" />
              <line x1="-26" y1="26" x2="-19" y2="19" />
              <line x1="26" y1="-26" x2="19" y2="-19" />
              <line x1="-26" y1="-26" x2="-19" y2="-19" />
            </g>
            <circle r="10" fill="#1d4ed8" />
          </g>

          <!-- Belt from engine to archive/output -->
          <line
            class="belt"
            x1="220"
            y1="166"
            x2="270"
            y2="166"
            stroke="#4b5563"
            stroke-width="4"
            stroke-linecap="round"
          />

          <!-- Archive stack (history) -->
          <g class="part part-archive">
            <rect
              x="260"
              y="70"
              width="80"
              height="20"
              rx="4"
              fill="#111827"
              stroke="#4b5563"
              stroke-width="1"
            />
            <rect x="265" y="76" width="70" height="10" rx="3" fill="#1f2937" />

            <rect
              x="260"
              y="98"
              width="80"
              height="20"
              rx="4"
              fill="#111827"
              stroke="#6b7280"
              stroke-width="1"
            />
            <rect
              x="265"
              y="104"
              width="70"
              height="10"
              rx="3"
              fill="#1f2937"
            />

            <rect
              x="260"
              y="126"
              width="80"
              height="20"
              rx="4"
              fill="#111827"
              stroke="#9ca3af"
              stroke-width="1.2"
            />
            <rect
              x="265"
              y="132"
              width="70"
              height="10"
              rx="3"
              fill="#1f2937"
            />
          </g>

          <!-- Output box (current version) -->
          <g class="part part-output">
            <rect
              x="150"
              y="190"
              width="80"
              height="26"
              rx="6"
              fill="#0f172a"
              stroke="#4b5563"
              stroke-width="1"
            />
            <rect
              x="156"
              y="182"
              width="68"
              height="12"
              rx="4"
              fill="#1f2937"
            />
            <!-- file icon -->
            <rect
              x="168"
              y="176"
              width="22"
              height="14"
              rx="2"
              fill="#f97316"
            />
            <line
              x1="171"
              y1="180"
              x2="187"
              y2="180"
              stroke="#fef3c7"
              stroke-width="2"
              stroke-linecap="round"
            />
          </g>

          <!-- Small labels (spaced so they don't overlap) -->
          <text
            x="70"
            y="210"
            font-size="10"
            fill="#9ca3af"
            text-anchor="middle"
          >
            Edits / commits in
          </text>

          <text
            x="190"
            y="90"
            font-size="10"
            fill="#9ca3af"
            text-anchor="middle"
          >
            Git engine
          </text>

          <text
            x="300"
            y="60"
            font-size="10"
            fill="#9ca3af"
            text-anchor="middle"
          >
            Commit history
          </text>

          <text
            x="190"
            y="232"
            font-size="10"
            fill="#9ca3af"
            text-anchor="middle"
          >
            Clean working copy
          </text>

          <!-- Tiny Git badge so it's clearly on-brand for the course -->
          <g transform="translate(32 36)">
            <rect
              x="0"
              y="0"
              width="90"
              height="20"
              rx="10"
              fill="#0f172a"
              stroke="#4b5563"
              stroke-width="1"
            />
            <circle cx="14" cy="10" r="6" fill="#ef4444" />
            <text x="30" y="13" font-size="9" fill="#e5e7eb">Git machine</text>
          </g>
        </svg>
      </div>

      <!-- Debug: you can delete controls + label once wired to audio -->
      <div class="phase-label">Phase: <span id="phase-value">0</span></div>
      <div class="controls">
        <button onclick="setPhase(0)">Idle</button>
        <button onclick="setPhase(1)">Input</button>
        <button onclick="setPhase(2)">Engine</button>
        <button onclick="setPhase(3)">History</button>
        <button onclick="setPhase(4)">Output</button>
      </div>
    </div>

    <script>
      // Public API for your pipeline
      function setPhase(n) {
        const root = document.getElementById("vc-visual");
        root.dataset.phase = String(n);
        const label = document.getElementById("phase-value");
        if (label) label.textContent = String(n);
      }

      // Example of how you'd drive this with audio / timeline:
      /*
    audio.ontimeupdate = () => {
      const t = audio.currentTime;
      if (t < 4) setPhase(1);       // explain edits/commits
      else if (t < 8) setPhase(2);  // explain engine
      else if (t < 12) setPhase(3); // explain history
      else setPhase(4);             // explain working copy
    };
    */
    </script>
  </body>
</html>
